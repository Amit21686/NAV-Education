<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Search | NAV Education</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #6366f1; --primary-dark: #4f52e0; --secondary: #8b5cf6; --accent: #f43f5e;
            --bg: #020617; --bg-card: rgba(30, 41, 59, 0.8); --bg-card-hover: rgba(51, 65, 85, 0.8);
            --border: rgba(255, 255, 255, 0.08); --text: #f1f5f9; --text-muted: #94a3b8;
            --success: #10b981; --error: #f43f5e; --warning: #f59e0b;
            --space-xs: 4px; --space-sm: 8px; --space-md: 14px; --space-lg: 20px; --space-xl: 24px;
            --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.4); --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
        }

        body.light-theme {
            --bg: #f8fafc; --bg-card: #ffffff; --bg-card-hover: #f1f5f9;
            --border: #e2e8f0; --text: #0f172a; --text-muted: #475569;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: all 0.3s ease; position: relative; }
        body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 70% 30%, rgba(99,102,241,0.12) 0%, transparent 70%); animation: rotateBg 40s linear infinite; pointer-events: none; z-index: 0; }
        @keyframes rotateBg { to { transform: rotate(360deg); } }

        .container { max-width: 100%; width: 100%; padding: var(--space-md); padding-bottom: 110px; position: relative; z-index: 1; }

        .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-lg); }
        .brand h1 { font-size: 1.6rem; font-weight: 600; }
        .brand h1 span { background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .icon-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; color: var(--text); backdrop-filter: blur(10px);}
        .icon-btn:active { transform: scale(0.95); border-color: var(--primary); }

        /* Search Header */
        .search-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-xl); padding: var(--space-xl); color: white; margin-bottom: var(--space-lg); }
        .search-header h2 { font-size: 1.6rem; margin-bottom: 4px; }
        .search-header p { opacity: 0.9; font-size: 0.85rem; margin-bottom: var(--space-lg); }

        /* ======== SEARCH BOX (Updated to include Mic & Clear) ======== */
        .search-input-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
        .search-icon { position: absolute; left: 16px; color: rgba(255,255,255,0.7); z-index: 2; pointer-events: none; }
        
        .search-main-input { width: 100%; padding: 14px 80px 14px 44px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; color: white; font-size: 0.95rem; backdrop-filter: blur(10px); transition: all 0.3s; }
        .search-main-input:focus { outline: none; border-color: white; background: rgba(255,255,255,0.25); }
        .search-main-input::placeholder { color: rgba(255,255,255,0.7); }
        
        .voice-search-btn { position: absolute; right: 40px; padding: 10px; cursor: pointer; color: rgba(255,255,255,0.7); z-index: 2; transition: 0.2s; }
        .voice-search-btn:active { transform: scale(0.9); }
        
        .clear-search { position: absolute; right: 10px; padding: 10px; cursor: pointer; opacity: 0; color: rgba(255,255,255,0.7); z-index: 2; pointer-events: none; transition: opacity 0.2s; }
        .clear-search.visible { opacity: 1; pointer-events: auto; }

        body.light-theme .search-main-input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: var(--text-light); }
        body.light-theme .search-main-input:focus { border-color: var(--primary); }
        body.light-theme .search-main-input::placeholder { color: rgba(0,0,0,0.5); }
        body.light-theme .search-icon, body.light-theme .voice-search-btn, body.light-theme .clear-search { color: rgba(0,0,0,0.5); }
        /* ============================================================= */

        /* Category Pills & Filters */
        .category-pills, .filter-chips { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .category-pills { padding: var(--space-sm) 0 var(--space-md); }
        .filter-chips { flex-wrap: wrap; margin: var(--space-sm) 0 var(--space-md); }
        .category-pills::-webkit-scrollbar { display: none; }
        
        .category-pill, .filter-chip { padding: 8px 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 40px; font-size: 0.85rem; white-space: nowrap; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 6px; }
        .filter-chip { padding: 6px 14px; font-size: 0.8rem; border-radius: 30px; }
        .category-pill.active, .filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; }

        /* Search Stats */
        .search-stats { display: flex; justify-content: space-between; margin: var(--space-sm) 0; font-size: 0.8rem; color: var(--text-muted); }
        .result-count { background: var(--bg-card); padding: 4px 12px; border-radius: 30px; border: 1px solid var(--border); }

        /* Results Grid */
        .results-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin: var(--space-md) 0; }

        /* Result Cards */
        .result-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px); display: flex; gap: 15px; align-items: center; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .result-card:active { transform: scale(0.98); }
        
        .result-icon { width: 50px; height: 50px; background: rgba(99,102,241,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
        .result-content { flex: 1; }
        .result-category { font-size: 0.65rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600;}
        .result-title { font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; line-height: 1.3; margin-bottom: 4px;}
        .result-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 20px; background: var(--border); color: var(--text-muted); border: 1px solid var(--border); }
        .result-description { font-size: 0.75rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px;}
        
        .result-action { color: var(--primary); font-size: 0.8rem; font-weight: 500; display: flex; align-items: center; gap: 4px; }

        /* Specific Type Colors */
        .type-course .result-icon { background: rgba(99,102,241,0.15); color: var(--primary); }
        .type-quiz .result-icon { background: rgba(16,185,129,0.15); color: var(--success); }
        .type-pdf .result-icon { background: rgba(244,63,94,0.15); color: var(--error); }
        .type-notes .result-icon { background: rgba(245,158,11,0.15); color: var(--warning); }

        /* States */
        .no-results { text-align: center; padding: 40px 20px; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); margin: var(--space-xl) 0; }
        .suggestions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .suggestion-chip { padding: 6px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 30px; font-size: 0.8rem; cursor: pointer; }

        /* EXACT MAGIC NAVIGATION CODE (Untouched) */
        .nav-wrapper {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 70px;
            z-index: 1000;
        }
        .magic-mover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }
        .circle {
            position: absolute;
            top: -12px;
            left: 5px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            border: 4px solid var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(99,102,241,0.5);
        }
        .circle ion-icon { font-size: 1.8rem; color: white; }
        .nav-pill-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 35px;
            overflow: hidden;
            z-index: 5;
        }
        .nav-bg-svg {
            position: absolute;
            top: 0;
            left: -465px;
            width: 1000px;
            height: 70px;
            fill: var(--bg-card);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .navigation-items {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 20;
        }
        .list {
            list-style: none;
            flex: 1;
            height: 70px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .list a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 1.4rem;
            color: var(--text-muted);
        }
        .list.active a { opacity: 0; transform: translateY(-20px); }

        @media (max-width: 400px) {
            .nav-wrapper { width: 320px; }
            .circle { width: 55px; height: 55px; top: -10px; left: 2px; }
            .circle ion-icon { font-size: 1.5rem; }
        }
        /* ======================================= */

        /* Loading */
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 30000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: white;}
        .loading-overlay.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-card); backdrop-filter: blur(20px); padding: 10px 20px; border-radius: 40px; font-size: 0.85rem; border: 1px solid var(--border); z-index: 10000; opacity: 0; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight: 500; font-size: 0.9rem;" id="loadingText">Building Search Index...</div>
    </div>

    <div class="container">
        <header class="app-header">
            <div class="brand"><h1>NAV <span>Education</span></h1></div>
            <div class="icon-btn" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i></div>
        </header>

        <div class="search-header">
            <h2>Deep Search</h2>
            <p>Find courses, quizzes, and notes instantly</p>

            <div class="search-input-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="mainSearchInput" class="search-main-input" placeholder="Search physics, mcqs, notes..." autofocus>
                <span class="voice-search-btn" id="voiceSearchBtn" onclick="toggleVoiceSearch()"><i class="fas fa-microphone"></i></span>
                <span class="clear-search" id="clearSearch" onclick="clearSearch()"><i class="fas fa-times-circle"></i></span>
            </div>
        </div>

        <div class="category-pills">
            <div class="category-pill active" data-category="all" onclick="filterByCategory('all', this)"><i class="fas fa-globe"></i> All</div>
            <div class="category-pill" data-category="science" onclick="filterByCategory('science', this)"><i class="fas fa-flask"></i> Science</div>
            <div class="category-pill" data-category="math" onclick="filterByCategory('math', this)"><i class="fas fa-square-root-alt"></i> Math</div>
            <div class="category-pill" data-category="design" onclick="filterByCategory('design', this)"><i class="fas fa-paint-brush"></i> Design</div>
        </div>

        <div class="filter-chips">
            <div class="filter-chip active" data-filter="all" onclick="filterByType('all', this)">Everything</div>
            <div class="filter-chip" data-filter="course" onclick="filterByType('course', this)"><i class="fas fa-book-open"></i> Courses</div>
            <div class="filter-chip" data-filter="quiz" onclick="filterByType('quiz', this)"><i class="fas fa-brain"></i> Quizzes</div>
            <div class="filter-chip" data-filter="document" onclick="filterByType('document', this)"><i class="fas fa-file-pdf"></i> Documents</div>
        </div>

        <div class="search-stats">
            <span class="result-count" id="resultCount">0 results</span>
            <span id="searchStatus" style="color: var(--primary); font-weight: 500;">Index Ready</span>
        </div>

        <div id="resultsGrid" class="results-grid">
            </div>

        <div id="noResults" class="no-results" style="display: none;">
            <div style="font-size:3rem; margin-bottom: 10px;">🔍</div>
            <h4>No results found</h4>
            <p style="color: var(--text-muted); font-size: 0.85rem;">Try adjusting your filters or keywords</p>
            <div class="suggestions">
                <span class="suggestion-chip" onclick="applySuggestion('physics')">Physics</span>
                <span class="suggestion-chip" onclick="applySuggestion('mcq')">MCQs</span>
                <span class="suggestion-chip" onclick="applySuggestion('notes')">Notes</span>
            </div>
        </div>

        <div style="height:20px;"></div>
    </div>

    <div class="nav-wrapper">
        <div class="magic-mover" id="magicMover"><div class="circle"><ion-icon id="indicatorIcon" name="search-outline"></ion-icon></div></div>
        <div class="nav-pill-bg"><svg class="nav-bg-svg" id="navSvg" viewBox="0 0 1000 70"><path d="M0,0 L450,0 C470,0 475,35 500,35 C525,35 530,0 550,0 L1000,0 L1000,70 L0,70 Z" fill="currentColor"></path></svg></div>
        <ul class="navigation-items">
            <li class="list" data-index="0" data-icon="home-outline" data-page="index.html"><a><ion-icon name="home-outline"></ion-icon></a></li>
            <li class="list active" data-index="1" data-icon="search-outline" data-page="search.html"><a><ion-icon name="search-outline"></ion-icon></a></li>
            <li class="list" data-index="2" data-icon="library-outline" data-page="library.html"><a><ion-icon name="library-outline"></ion-icon></a></li>
            <li class="list" data-index="3" data-icon="settings-outline" data-page="settings.html"><a><ion-icon name="settings-outline"></ion-icon></a></li>
            <li class="list" data-index="4" data-icon="person-outline" data-page="profile.html"><a><ion-icon name="person-outline"></ion-icon></a></li>
        </ul>
    </div>

    <div id="toastContainer" class="toast"></div>

    <script>
        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toastContainer');
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function applyTheme() {
            if (localStorage.getItem('nav_darkMode') === 'false') document.body.classList.add('light-theme');
            const accent = localStorage.getItem('nav_accentColor');
            if (accent) document.documentElement.style.setProperty('--primary', accent);
        }

        // ==================== DEEP SEARCH INDEX BUILDER ====================
        let globalSearchData = [];
        let currentFilters = { term: '', category: 'all', type: 'all' };

        // Fallback data in case the folder JSONs are missing
        const fallbackData = [
            { title: "Class 12 Physics", category: "science", type: "course", icon: "⚛️", desc: "Master modern physics concepts.", url: "course.html?id=physics", tags: "physics science ncert" },
            { title: "Kinematics Practice Test", category: "science", type: "quiz", icon: "🧠", desc: "Chapter: Kinematics (Physics)", url: "mcqs.html?file=physics-ch1-mcqs.json", tags: "physics mcq test kinematics" },
            { title: "Kinematics Notes", category: "science", type: "pdf", icon: "📄", desc: "Chapter: Kinematics (Physics)", url: "ch1-notes.pdf", tags: "physics notes pdf kinematics document" }
        ];

        async function buildSearchIndex() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('active');
            let indexData = [];

            try {
                // 1. Fetch main library to get list of courses
                const libRes = await fetch('library.json');
                const lib = await libRes.json();

                for (const course of lib.courses) {
                    indexData.push({
                        title: course.title,
                        category: course.category || "General",
                        type: "course",
                        icon: course.icon || "📚",
                        desc: course.description || `Complete course on ${course.title}`,
                        url: `course.html?id=${course.id}`,
                        tags: (course.tags ? course.tags.join(" ") : "") + ` ${course.title} course`
                    });

                    // 2. Fetch the specific course JSON to index its internal chapters & materials
                    try {
                        const courseRes = await fetch(`${course.id}.json`);
                        if (courseRes.ok) {
                            const courseDetails = await courseRes.json();
                            
                            courseDetails.chapters.forEach(chap => {
                                chap.contents.forEach(mat => {
                                    let matType = 'document';
                                    let icon = '📝';
                                    let url = mat.file;

                                    if (mat.file.endsWith('.json')) { matType = 'quiz'; icon = '🧠'; url = `mcqs.html?file=${mat.file}`; }
                                    else if (mat.file.endsWith('.pdf')) { matType = 'pdf'; icon = '📄'; }
                                    else if (mat.file.endsWith('.html')) { matType = 'notes'; icon = '🌐'; }

                                    indexData.push({
                                        title: mat.title,
                                        category: course.category || "General",
                                        type: matType,
                                        icon: icon,
                                        desc: `Chapter: ${chap.title} (${course.title})`,
                                        url: url,
                                        tags: `${course.title} ${chap.title} ${mat.title} ${matType} ${mat.type || ''}`
                                    });
                                });
                            });
                        }
                    } catch (e) {
                        console.warn(`Could not deep-index course: ${course.id}`);
                    }
                }

                if(lib.materials) {
                    for (const mat of lib.materials) {
                        indexData.push({
                            title: mat.title, category: "material", type: "document", icon: mat.icon || "📘",
                            desc: mat.subtitle || "Study Material", url: mat.file || `${mat.id}.pdf`, tags: `${mat.title} document`
                        });
                    }
                }

                if(indexData.length > 0) {
                    globalSearchData = indexData;
                } else {
                    globalSearchData = fallbackData;
                }

            } catch(e) {
                console.log("No library.json found. Using fallback search data.");
                globalSearchData = fallbackData;
            } finally {
                setTimeout(() => {
                    overlay.classList.remove('active');
                    performSearch();
                }, 400);
            }
        }

        // ==================== SEARCH EXECUTION ====================
        function performSearch() {
            const grid = document.getElementById('resultsGrid');
            const noResults = document.getElementById('noResults');
            grid.innerHTML = '';

            let results = globalSearchData.filter(item => {
                const searchMatch = item.title.toLowerCase().includes(currentFilters.term) || 
                                    item.desc.toLowerCase().includes(currentFilters.term) || 
                                    item.tags.toLowerCase().includes(currentFilters.term);
                
                const categoryMatch = currentFilters.category === 'all' || item.category.toLowerCase() === currentFilters.category.toLowerCase();
                
                let typeMatch = true;
                if (currentFilters.type === 'course') typeMatch = item.type === 'course';
                if (currentFilters.type === 'quiz') typeMatch = item.type === 'quiz';
                if (currentFilters.type === 'document') typeMatch = ['pdf', 'notes', 'document'].includes(item.type);

                return searchMatch && categoryMatch && typeMatch;
            });

            document.getElementById('resultCount').textContent = `${results.length} results`;

            if (results.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                
                const typeLabels = { course: 'Course', quiz: 'Assessment', pdf: 'PDF Document', notes: 'Notes', document: 'Document' };
                const actionLabels = { course: 'Open Course', quiz: 'Start Quiz', pdf: 'Read PDF', notes: 'Read Notes', document: 'Open' };

                results.forEach(item => {
                    const card = document.createElement('div');
                    card.className = `result-card type-${item.type}`;
                    
                    card.innerHTML = `
                        <div class="result-icon">${item.icon}</div>
                        <div class="result-content">
                            <div class="result-category">${item.category}</div>
                            <div class="result-title">${item.title} <span class="result-badge">${typeLabels[item.type] || 'Item'}</span></div>
                            <div class="result-description">${item.desc}</div>
                            <div class="result-action" style="margin-top: 6px;">${actionLabels[item.type] || 'Open'} <i class="fas fa-arrow-right"></i></div>
                        </div>
                    `;
                    
                    card.onclick = () => {
                        showToast(`Opening ${item.title}...`);
                        setTimeout(() => { window.location.href = item.url; }, 300);
                    };
                    
                    grid.appendChild(card);
                });
            }
        }

        // ==================== EVENT LISTENERS ====================
        const searchInput = document.getElementById('mainSearchInput');
        const clearBtn = document.getElementById('clearSearch');

        searchInput.addEventListener('input', (e) => {
            currentFilters.term = e.target.value.toLowerCase().trim();
            clearBtn.classList.toggle('visible', currentFilters.term.length > 0);
            performSearch();
        });

        function clearSearch() {
            searchInput.value = '';
            currentFilters.term = '';
            clearBtn.classList.remove('visible');
            performSearch();
        }

        // Voice Search Logic
        function toggleVoiceSearch() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recog = new SpeechRecognition();
                recog.continuous = false; recog.interimResults = false; recog.lang = 'en-US';
                
                const voiceBtn = document.getElementById('voiceSearchBtn');
                voiceBtn.style.color = '#f43f5e'; // Turn mic red to indicate listening
                
                recog.start();
                
                recog.onresult = (e) => { 
                    const transcript = e.results[0][0].transcript;
                    searchInput.value = transcript; 
                    currentFilters.term = transcript.toLowerCase();
                    clearBtn.classList.add('visible');
                    performSearch(); 
                    voiceBtn.style.color = ''; 
                };
                
                recog.onerror = () => { 
                    voiceBtn.style.color = ''; 
                    showToast('Voice search failed'); 
                };
                
                recog.onend = () => { voiceBtn.style.color = ''; };
            } else {
                showToast('Voice search is not supported on this browser');
            }
        }

        function filterByCategory(cat, el) {
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            currentFilters.category = cat;
            performSearch();
        }

        function filterByType(type, el) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentFilters.type = type;
            performSearch();
        }

        function applySuggestion(term) {
            searchInput.value = term;
            currentFilters.term = term.toLowerCase();
            clearBtn.classList.add('visible');
            performSearch();
        }

        // Magic Navigation JS
        const lists = document.querySelectorAll('.list');
        const magicMover = document.getElementById('magicMover');
        const navSvg = document.getElementById('navSvg');
        const indicatorIcon = document.getElementById('indicatorIcon');
        const slotWidth = 70;
        const currentPage = window.location.pathname.split('/').pop() || 'search.html';
        
        lists.forEach(item => {
            const page = item.getAttribute('data-page');
            if (page === currentPage) {
                const idx = parseInt(item.getAttribute('data-index'));
                item.classList.add('active');
                magicMover.style.transform = `translateX(${idx * slotWidth}px)`;
                navSvg.style.transform = `translateX(${idx * slotWidth}px)`;
                indicatorIcon.setAttribute('name', item.getAttribute('data-icon'));
            }
        });
        
        lists.forEach(item => {
            item.addEventListener('click', function() {
                const idx = parseInt(this.getAttribute('data-index'));
                const icon = this.getAttribute('data-icon');
                const page = this.getAttribute('data-page');
                lists.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                magicMover.style.transform = `translateX(${idx * slotWidth}px)`;
                navSvg.style.transform = `translateX(${idx * slotWidth}px)`;
                indicatorIcon.setAttribute('name', icon);
                if (page && page !== currentPage) {
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.3s';
                    setTimeout(() => window.location.href = page, 300);
                }
            });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            applyTheme();
            buildSearchIndex();
        });
    </script>
</body>
</html>
