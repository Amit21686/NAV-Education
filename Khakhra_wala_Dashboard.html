<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Admin Dashboard | Khakhra Wala</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --brand: #E05D26;
        --brand-hover: #BF4A1A;
        --brand-light: #FFF0E8;
        --bg-main: #F4F6F8; 
        --surface: #FFFFFF; 
        --text-dark: #1A1A1A;
        --text-muted: #6B6B6B;
        --border-color: rgba(0,0,0,0.08);
        --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
        --radius-md: 16px;
        --radius-lg: 20px;
        --radius-pill: 50px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg-main); color: var(--text-dark); line-height: 1.6; }
    body.no-scroll { overflow: hidden; }
    
    header { background: var(--surface); padding: 16px 20px; box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color);}
    .brand { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--brand); }
    
    .btn-refresh { background: var(--brand-light); color: var(--brand); border: none; padding: 8px 16px; border-radius: 50px; font-weight: 600; font-family: 'Poppins'; cursor: pointer; display: flex; align-items: center; gap: 6px;}
    .btn-refresh:active { transform: scale(0.95); }

    .container { max-width: 800px; margin: 0 auto; padding: 20px; }

    /* Stats Row */
    .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .stat-box { background: var(--surface); padding: 16px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); text-align: center; border: 1px solid var(--border-color);}
    .stat-val { font-size: 24px; font-weight: 700; color: var(--brand); line-height: 1.2;}
    .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; }

    /* Tabs */
    .tabs { display: flex; background: var(--surface); border-radius: 50px; padding: 4px; margin-bottom: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); overflow-x: auto; scrollbar-width: none;}
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex: 1; min-width: 90px; text-align: center; padding: 10px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 50px; transition: 0.3s; white-space: nowrap; }
    .tab.active { background: var(--brand); color: #fff; box-shadow: 0 4px 10px rgba(224, 93, 38, 0.3); }

    /* Order Cards */
    .order-grid { display: flex; flex-direction: column; gap: 16px; }
    .order-card { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); position: relative; overflow: hidden; }
    
    .oc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .oc-id { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 4px;}
    .oc-date { font-size: 11px; color: var(--text-muted); }
    
    /* Dynamic Status Colors */
    .oc-status { padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .status-Active { background: #E3F2FD; color: #1976D2; }
    .status-Packaging { background: #F3E5F5; color: #7B1FA2; }
    .status-Dispatched { background: #FFF3E0; color: #F57C00; }
    .status-Out { background: #FBE9E7; color: #E64A19; }
    .status-Delivered, .status-Received { background: #E8F5E9; color: #2E7D32; }
    .status-Cancelled, .status-Unable { background: #FFEBEB; color: #D32F2F; }

    .oc-customer { background: var(--bg-main); padding: 12px; border-radius: 12px; margin-bottom: 16px; }
    .c-name { font-weight: 600; font-size: 15px; color: var(--text-dark); display: block; margin-bottom: 2px;}
    .c-phone { font-size: 13px; font-weight: 600; color: var(--brand); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 8px;}
    .c-address { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px;}
    .btn-map { background: #E8F5E9; color: #2E7D32; font-size: 12px; font-weight: 600; text-decoration: none; padding: 6px 12px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px;}

    .oc-items { font-size: 14px; font-weight: 500; color: var(--text-dark); margin-bottom: 16px; line-height: 1.6;}
    
    .oc-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed var(--border-color); padding-top: 16px; }
    .oc-total { font-size: 18px; font-weight: 700; color: var(--brand); }
    
    .oc-reason { margin-top: 12px; font-size: 13px; color: #D32F2F; background: #FFF5F5; padding: 10px; border-radius: 8px; border: 1px dashed #FFCDD2; font-weight: 500;}

    /* STATUS UPDATER UI */
    .status-update-row { display: flex; gap: 8px; margin-top: 16px; align-items: center; border-top: 1px dashed var(--border-color); padding-top: 16px;}
    .status-select { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border-color); font-family: 'Poppins'; font-size: 13px; font-weight: 500; color: var(--text-dark); background: var(--bg-main); outline: none; }
    .status-select:focus { border-color: var(--brand); }
    .btn-update-status { background: var(--brand-light); color: var(--brand); border: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-update-status:hover { background: var(--brand); color: #fff; }

    /* Loader & Empty States */
    .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; color: var(--brand); font-weight: 600;}
    .spinner { border: 4px solid rgba(224, 93, 38, 0.2); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--brand); animation: spin 1s linear infinite; margin-bottom: 16px;}
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .empty-state { text-align: center; color: var(--text-muted); padding: 40px 0; font-weight: 500;}

    /* Modals & Toasts */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 3000; padding: 16px; opacity: 0; transition: opacity 0.3s ease; }
    .modal.show { display: flex; opacity: 1; }
    .modal-content { background: var(--surface); width: 100%; max-width: 400px; border-radius: var(--radius-lg); padding: 30px 24px; position: relative; transform: translateY(20px); transition: transform 0.3s ease; box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center; }
    .modal.show .modal-content { transform: translateY(0); }
    .form-input { width: 100%; padding: 14px 16px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-main); font-family: 'Poppins'; font-size: 14px; margin-bottom: 20px; outline: none;}
    .form-input:focus { border-color: var(--brand); }
    .form-input.error { border-color: #D32F2F; box-shadow: 0 0 0 3px #FFEBEB;}
    
    .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 4000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 90%; max-width: 350px;}
    .toast { background: #222; color: #FFF; padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-lg); animation: toastIn 0.3s forwards, toastOut 0.3s 3s forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
    .btn-primary { background: var(--brand); color: var(--surface); box-shadow: 0 4px 15px rgba(224, 93, 38, 0.25); border:none; border-radius: 8px; font-weight: 600; cursor:pointer;}
</style>
</head>
<body>

<header>
    <div class="brand">Admin Panel</div>
    <button class="btn-refresh" onclick="fetchOrders()"><span>🔄</span> Sync</button>
</header>

<div class="container">
    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-val" id="statActive">0</div>
            <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-box" style="opacity: 0.7;">
            <div class="stat-val" id="statCancelled" style="color: #D32F2F;">0</div>
            <div class="stat-label">Failed / Cancelled</div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="filterOrders('All', this)">All</div>
        <div class="tab" onclick="filterOrders('InProgress', this)">In Progress</div>
        <div class="tab" onclick="filterOrders('Completed', this)">Completed</div>
        <div class="tab" onclick="filterOrders('Failed', this)">Failed</div>
    </div>

    <div id="dashboardData">
        <div class="loader-container">
            <div class="spinner"></div>
            <div>Syncing with server...</div>
        </div>
    </div>
</div>

<div class="modal" id="reasonModal">
    <div class="modal-content">
        <div style="font-size: 40px; margin-bottom: 12px;">🚫</div>
        <h2 style="font-size: 20px; color: var(--text-dark); margin-bottom: 8px;">Delivery Failed</h2>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">Please provide a reason why this order could not be delivered.</p>
        
        <textarea id="failureReasonInput" class="form-input" style="height: 70px;" placeholder="Reason (e.g. Customer not responding, Address wrong)"></textarea>
        
        <div style="display: flex; gap: 12px;">
            <button class="btn-refresh" style="flex: 1; justify-content: center; height: 46px; border-radius: 8px; background: var(--bg-main); color: var(--text-dark);" onclick="closeReasonModal()">Cancel</button>
            <button class="btn-primary" style="flex: 1; height: 46px; background: #D32F2F; box-shadow: none;" onclick="confirmFailedDelivery()">Confirm Failure</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastBox"></div>

<script>
// ==========================================
// ⚠️ PASTE YOUR GOOGLE SCRIPT WEB APP URL BELOW
// ==========================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM7XOoD5bB6W5vwMy_7uzh-MU8gwXvF-LsN8tJbIjP7bAoflN81F8OAUFoEFHM-i8/exec";

let allOrders = [];
let pendingUpdateOrderId = null;

const IN_PROGRESS = ['Active', 'Packaging Done', 'Dispatched', 'Out for Delivery'];
const COMPLETED = ['Delivered', 'Received'];
const FAILED = ['Cancelled', 'Unable to Deliver'];

window.onload = fetchOrders;

function showToast(msg) {
    const box = document.getElementById('toastBox');
    const t = document.createElement('div');
    t.className = 'toast'; t.innerHTML = msg;
    box.appendChild(t);
    setTimeout(() => t.remove(), 3300);
}

function fetchOrders() {
    const dash = document.getElementById('dashboardData');
    dash.innerHTML = `<div class="loader-container"><div class="spinner"></div><div>Syncing with server...</div></div>`;

    fetch(SCRIPT_URL)
        .then(response => response.json())
        .then(data => {
            allOrders = data;
            updateStats();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.tab').classList.add('active'); // Reset to All
            renderOrders(allOrders); 
        })
        .catch(error => {
            dash.innerHTML = `<div class="empty-state" style="color: #D32F2F;">⚠️ Error syncing data. Please check your internet connection and Script URL.</div>`;
        });
}

function updateStats() {
    const inProgressCount = allOrders.filter(o => IN_PROGRESS.includes(o.status)).length;
    const failedCount = allOrders.filter(o => FAILED.includes(o.status)).length;
    
    document.getElementById('statActive').innerText = inProgressCount;
    document.getElementById('statCancelled').innerText = failedCount;
}

function filterOrders(filterType, tabElement) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tabElement.classList.add('active');

    let filtered = [];
    if(filterType === 'All') filtered = allOrders;
    else if(filterType === 'InProgress') filtered = allOrders.filter(o => IN_PROGRESS.includes(o.status));
    else if(filterType === 'Completed') filtered = allOrders.filter(o => COMPLETED.includes(o.status));
    else if(filterType === 'Failed') filtered = allOrders.filter(o => FAILED.includes(o.status));

    renderOrders(filtered);
}

function getStatusClass(status) {
    if (status.includes('Active')) return 'status-Active';
    if (status.includes('Packaging')) return 'status-Packaging';
    if (status.includes('Dispatched')) return 'status-Dispatched';
    if (status.includes('Out')) return 'status-Out';
    if (status.includes('Delivered') || status.includes('Received')) return 'status-Delivered';
    if (status.includes('Cancelled') || status.includes('Unable')) return 'status-Cancelled';
    return 'status-Active'; // Default
}

function renderOrders(ordersArray) {
    const dash = document.getElementById('dashboardData');
    
    if(!ordersArray || ordersArray.length === 0) {
        dash.innerHTML = `<div class="empty-state">No orders found in this category.</div>`;
        return;
    }

    dash.innerHTML = `<div class="order-grid">` + ordersArray.map(order => {
        const isFailed = FAILED.includes(order.status);
        const cardStyle = isFailed ? 'opacity: 0.85; border-top: 4px solid #D32F2F;' : 
                         (COMPLETED.includes(order.status) ? 'border-top: 4px solid #2E7D32;' : 'border-top: 4px solid #1976D2;');
        
        const mapBtn = order.mapLink && order.mapLink !== "undefined" && order.mapLink !== "" 
            ? `<a href="${order.mapLink}" target="_blank" class="btn-map">📍 Open Map</a>` 
            : `<span style="font-size: 11px; color: var(--text-muted);">No GPS Pinned</span>`;

        const reasonBlock = order.cancelReason 
            ? `<div class="oc-reason"><strong>Reason:</strong> ${order.cancelReason}</div>` 
            : ``;

        const cleanItems = order.items.split(', ').join('<br>• ');

        // Status Updater UI
        const statusUpdaterHTML = `
            <div class="status-update-row">
                <select id="status-${order.orderId}" class="status-select">
                    <option value="Active" ${order.status==='Active'?'selected':''}>Active (New)</option>
                    <option value="Packaging Done" ${order.status==='Packaging Done'?'selected':''}>Packaging Done</option>
                    <option value="Dispatched" ${order.status==='Dispatched'?'selected':''}>Dispatched</option>
                    <option value="Out for Delivery" ${order.status==='Out for Delivery'?'selected':''}>Out for Delivery</option>
                    <option value="Delivered" ${order.status==='Delivered'?'selected':''}>Delivered (Cash Collected)</option>
                    <option value="Received" ${order.status==='Received'?'selected':''}>Received (Done)</option>
                    <option value="Unable to Deliver" ${order.status==='Unable to Deliver'?'selected':''}>Unable to Deliver</option>
                </select>
                <button onclick="initiateStatusUpdate('${order.orderId}')" class="btn-update-status">Update</button>
            </div>
        `;

        return `
            <div class="order-card" style="${cardStyle}">
                <div class="oc-header">
                    <div>
                        <div class="oc-id">ID: ${order.orderId}</div>
                        <div class="oc-date">${order.date}</div>
                    </div>
                    <div class="oc-status ${getStatusClass(order.status)}">${order.status}</div>
                </div>

                <div class="oc-customer">
                    <span class="c-name">${order.name}</span>
                    <a href="tel:${order.phone}" class="c-phone">📞 ${order.phone}</a><br>
                    <div class="c-address">${order.address}</div>
                    ${mapBtn}
                </div>

                <div class="oc-items">
                    <span style="font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px; text-transform: uppercase;">Items Ordered:</span>
                    • ${cleanItems}
                </div>

                <div class="oc-footer">
                    <div style="font-size: 12px; color: var(--text-muted); font-weight: 600;">COD AMOUNT</div>
                    <div class="oc-total">₹${order.total}</div>
                </div>
                
                ${reasonBlock}
                
                ${order.status === 'Cancelled' ? '' : statusUpdaterHTML}
            </div>
        `;
    }).join('') + `</div>`;
}

// --- UPDATE STATUS LOGIC ---
function initiateStatusUpdate(orderId) {
    const selectEl = document.getElementById(`status-${orderId}`);
    const newStatus = selectEl.value;

    if (newStatus === 'Unable to Deliver') {
        pendingUpdateOrderId = orderId;
        document.getElementById('failureReasonInput').value = '';
        document.getElementById('failureReasonInput').classList.remove('error');
        document.getElementById('reasonModal').classList.add('show');
        document.body.classList.add('no-scroll');
    } else {
        executeStatusUpdate(orderId, newStatus, "");
    }
}

function closeReasonModal() {
    document.getElementById('reasonModal').classList.remove('show');
    document.body.classList.remove('no-scroll');
    pendingUpdateOrderId = null;
}

function confirmFailedDelivery() {
    const input = document.getElementById('failureReasonInput');
    const reason = input.value.trim();

    if (!reason) {
        input.classList.add('error');
        showToast("⚠️ Please provide a reason.");
        input.focus();
        return;
    }

    executeStatusUpdate(pendingUpdateOrderId, 'Unable to Deliver', reason);
    closeReasonModal();
}

function executeStatusUpdate(orderId, newStatus, reason) {
    // 1. Update local array for instant UI feedback
    const orderIndex = allOrders.findIndex(o => o.orderId === orderId);
    if (orderIndex > -1) {
        allOrders[orderIndex].status = newStatus;
        if (reason) allOrders[orderIndex].cancelReason = reason;
        
        // Refresh the UI based on current active tab
        const activeTab = document.querySelector('.tab.active').innerText.replace(/\s+/g, ''); 
        filterOrders(activeTab === 'In Progress' ? 'InProgress' : activeTab, document.querySelector('.tab.active'));
        updateStats();
        showToast(`✅ Status updated to: ${newStatus}`);
    }

    // 2. Send to Google Apps Script silently
    fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            type: 'UPDATE_STATUS',
            orderId: orderId,
            newStatus: newStatus,
            reason: reason
        })
    }).catch(e => console.log('Background update sent.'));
}
</script>
</body>
</html>
