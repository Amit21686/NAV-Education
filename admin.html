<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NAV Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js" type="text/javascript" charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ext-searchbox.js" type="text/javascript" charset="utf-8"></script>

    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'none' }, startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #6366f1; --bg: #020617; --card: #1e293b; --text: #f8fafc; --text-muted: #94a3b8; --border: #334155; --danger: #f43f5e; --success: #10b981; --info: #3b82f6;}
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        
        .btn { padding: 12px 15px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: scale(0.96); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-danger { background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); color: var(--danger); }
        .input-field { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; font-size: 0.9rem;}
        
        #authScreen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }

        .app-header { background: var(--card); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: relative; z-index: 10; flex-shrink: 0;}
        .header-title { font-weight: 600; font-size: 1rem; flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px; }
        .header-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.05); cursor: pointer; font-size: 1rem; transition: 0.2s;}
        .header-icon:active { background: rgba(255,255,255,0.2); transform: scale(0.9); }
        
        .view-container { flex: 1; overflow-y: auto; padding: 20px 15px 120px 15px; display: none; }
        .view-container.active { display: block; }

        .list-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .list-item-content { flex: 1; overflow: hidden; cursor: pointer; }
        .list-title { font-weight: 600; font-size: 1rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
        .list-actions { display: flex; gap: 8px; }
        .icon-action { width: 36px; height: 36px; border-radius: 8px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; color: var(--text); border: none; cursor: pointer; transition: 0.2s; }
        .icon-action:active { transform: scale(0.9); }
        .icon-action.code { color: #a5b4fc; }
        .icon-action.edit { color: var(--warning); }
        .icon-action.delete { color: var(--danger); }
        .icon-action.replace { color: var(--info); }
        .icon-action.view { color: var(--success); }

        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 4px 15px rgba(99,102,241,0.4); border: none; cursor: pointer; z-index: 100; transition: transform 0.2s; }
        .fab:active { transform: scale(0.9); }

        /* EDITOR LAYOUT */
        #codeEditorView { display: none; flex-direction: column; height: 100dvh; width: 100vw; position: fixed; top: 0; left: 0; background: var(--bg); z-index: 500; padding-bottom: env(safe-area-inset-bottom); }
        #aceEditorContainer { flex: 1; width: 100%; position: relative; margin-bottom: 30px;} 
        
        .jump-btn-wrapper { position: absolute; bottom: 50px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 510; }
        .jump-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; transition: 0.2s; }
        .jump-btn:active { transform: scale(0.9); background: var(--primary); color: white; border-color: var(--primary); }

        /* VISUAL BUILDER STYLES */
        #visualEditorContainer { flex: 1; width: 100%; overflow-y: auto; padding: 20px; padding-bottom: 250px; display: none; background: var(--bg); }
        .visual-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .v-label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; text-transform: uppercase;}
        .v-textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; font-size: 0.9rem; resize: vertical; min-height: 80px; margin-bottom: 5px; }
        
        .v-preview-box { background: rgba(255,255,255,0.05); border: 1px dashed var(--primary); padding: 12px; border-radius: 8px; font-size: 0.95rem; color: white; min-height: 45px; margin-bottom: 15px; overflow-x: auto; }
        .v-preview-box img { max-width: 100%; height: auto; border-radius: 8px; margin-top: 5px; }
        
        .v-input { width: 100%; padding: 10px 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; font-size: 0.9rem; margin-bottom: 10px; }
        .v-select { width: 100%; padding: 10px; background: #0f172a; border: 1px solid var(--primary); color: white; border-radius: 8px; font-family: inherit; font-size: 0.9rem; margin-bottom: 15px; font-weight: 600;}
        .v-row { display: flex; gap: 10px; align-items: flex-start; }
        .v-del-btn { background: rgba(244,63,94,0.1); color: var(--danger); border: 1px solid rgba(244,63,94,0.3); padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 5px;}
        .v-img-btn { background: rgba(59,130,246,0.1); color: var(--info); border: 1px solid rgba(59,130,246,0.3); padding: 4px 10px; border-radius: 5px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s;}
        .v-img-btn:active { transform: scale(0.95); background: var(--info); color: white;}
        
        /* IN-BLOCK MEDIA THUMBNAILS */
        .inblock-media-row { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .inblock-media-card { background: var(--card); border: 1px solid var(--border); padding: 5px; border-radius: 5px; min-width: 120px; text-align: center; }
        .inblock-media-img { width: 100%; height: 60px; object-fit: cover; border-radius: 4px; margin-bottom: 5px; background: #000; }
        .inblock-media-name { font-size: 0.6rem; color: var(--text-muted); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 110px; }

        .mobile-mockup-wrapper { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px);}
        .mobile-mockup { width: 100%; max-width: 400px; height: 85vh; background: #020617; border: 12px solid #1e293b; border-radius: 35px; overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .mockup-header { background: #1e293b; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 0.9rem; border-bottom: 1px solid var(--border);}
        .mockup-content { flex: 1; overflow-y: auto; padding: 20px; background: #020617; color: #f8fafc; font-size: 0.95rem; line-height: 1.6;}
        
        .mockup-content .m-option { background: rgba(255,255,255,0.1); border: 2px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px;}
        .mockup-content .m-correct { border-color: var(--success); background: rgba(16,185,129,0.15); color: var(--success); }
        .mockup-content h1 { font-size: 1.5rem; margin-bottom: 10px; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px;}
        .mockup-content h2 { font-size: 1.2rem; margin: 15px 0 10px; }
        .mockup-content .m-callout { background: rgba(59,130,246,0.15); border-left: 4px solid var(--info); padding: 15px; border-radius: 0 8px 8px 0; margin: 15px 0; }
        .mockup-content img { max-width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid var(--border);}

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: var(--card); width: 100%; border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(5px); }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .folder-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .folder-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .folder-card:active { transform: scale(0.95); border-color: var(--primary); }
        .folder-icon { font-size: 2.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-box">
            <div style="font-size: 3rem; margin-bottom: 10px;">🛡️</div>
            <h2 style="margin-bottom: 20px;">Admin Login</h2>
            <input type="text" id="ghOwner" class="input-field" placeholder="GitHub Username">
            <input type="text" id="ghRepo" class="input-field" placeholder="Repository Name">
            <input type="password" id="ghToken" class="input-field" placeholder="Personal Access Token (PAT)">
            <button class="btn btn-primary" style="width: 100%;" onclick="loginGH()">Connect Repository</button>
        </div>
    </div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText" style="font-weight: 500;">Processing...</div>
    </div>

    <header class="app-header">
        <div class="header-icon" id="backBtn" onclick="navigateBack()" style="visibility: hidden;"><i class="fas fa-arrow-left"></i></div>
        <div class="header-title" id="appTitle">Courses</div>
        <div class="header-icon" onclick="logoutGH()"><i class="fas fa-sign-out-alt"></i></div>
    </header>

    <div id="viewCourses" class="view-container active">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <div class="list-item" style="flex: 1; background: rgba(16,185,129,0.1); border-color: var(--success); justify-content: center; cursor: pointer; margin: 0; padding: 12px;" onclick="editMasterCatalog()">
                <i class="fas fa-database" style="color: var(--success);"></i> <span style="color: var(--success); font-weight: 600; font-size: 0.85rem;">Catalog</span>
            </div>
            <div class="list-item" style="flex: 1; background: rgba(59,130,246,0.1); border-color: var(--info); justify-content: center; cursor: pointer; margin: 0; padding: 12px;" onclick="initSmartExplorer()">
                <i class="fas fa-folder-tree" style="color: var(--info);"></i> <span style="color: var(--info); font-weight: 600; font-size: 0.85rem;">File Manager</span>
            </div>
        </div>
        <div id="courseList"></div>
        <button class="fab" onclick="openModal('courseModal')"><i class="fas fa-plus"></i></button>
    </div>

    <div id="viewChapters" class="view-container">
        <div class="list-item" style="background: rgba(99,102,241,0.1); border-color: var(--primary); justify-content: center; cursor: pointer; margin-bottom: 20px;" onclick="editCourseCode()">
            <i class="fas fa-code" style="color: var(--primary);"></i> <span style="color: var(--primary); font-weight: 600;">Edit Course Config (JSON)</span>
        </div>
        <div id="chapterList"></div>
        <button class="fab" onclick="openModal('chapterModal')"><i class="fas fa-plus"></i></button>
    </div>

    <div id="viewContents" class="view-container">
        <div id="contentList"></div>
        <button class="fab" onclick="openModal('contentModal')"><i class="fas fa-plus"></i></button>
    </div>

    <div id="viewAllfiles" class="view-container">
        <div id="allFilesList"></div>
    </div>

    <div id="codeEditorView">
        <header class="app-header">
            <div class="header-icon" onclick="closeEditor()"><i class="fas fa-times"></i></div>
            
            <button id="editorModeToggle" class="btn" style="background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid var(--primary); padding: 5px 15px; font-size: 0.8rem;" onclick="toggleEditorMode()" style="display:none;">
                <i class="fas fa-eye"></i> Visual Builder
            </button>
            
            <button id="livePreviewBtn" class="btn" style="background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid var(--success); padding: 5px 15px; font-size: 0.8rem; display:none;" onclick="openLiveAppPreview()">
                <i class="fas fa-mobile-alt"></i> Preview
            </button>

            <div style="display: flex; gap: 10px;">
                <div class="header-icon" id="searchBtn" style="color: var(--info);" onclick="triggerSearch()"><i class="fas fa-search"></i></div>
                <div class="header-icon" style="color: var(--success);" onclick="saveContent()"><i class="fas fa-save"></i></div>
            </div>
        </header>
        
        <input type="hidden" id="editPath">
        <input type="hidden" id="editSha">
        <input type="hidden" id="reloadCourseFlag">
        <input type="hidden" id="currentEditorMode" value="code">
        
        <div id="aceEditorContainer"></div>
        
        <div class="jump-btn-wrapper" id="jumpButtons" style="display: none;">
            <div class="jump-btn" onclick="jumpToTop()"><i class="fas fa-chevron-up"></i></div>
            <div class="jump-btn" onclick="jumpToBottom()"><i class="fas fa-chevron-down"></i></div>
        </div>

        <div id="visualEditorContainer">
            <div id="visualContentArea"></div>
        </div>
    </div>

    <div class="mobile-mockup-wrapper" id="livePreviewModal">
        <div class="mobile-mockup">
            <div class="mockup-header">
                <i class="fas fa-arrow-left" onclick="closeLiveAppPreview()" style="cursor:pointer;"></i>
                <span id="mockupTitle">Live App Preview</span>
                <i class="fas fa-ellipsis-v"></i>
            </div>
            <div class="mockup-content" id="mockupContentArea"></div>
        </div>
    </div>

    <div class="modal-overlay" id="courseModal" onclick="closeModal('courseModal')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 15px;">Create New Course</h3>
            <input type="text" id="newCourseTitle" class="input-field" placeholder="Course Title (e.g., Physics)">
            <input type="text" id="newCourseId" class="input-field" placeholder="Short ID (e.g., physics)">
            <button class="btn btn-primary" style="width: 100%;" onclick="createCourse()">Create Course</button>
        </div>
    </div>

    <div class="modal-overlay" id="chapterModal" onclick="closeModal('chapterModal')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 15px;">Add Chapter</h3>
            <input type="text" id="newChapTitle" class="input-field" placeholder="e.g., Chapter 1: Kinematics">
            <button class="btn btn-primary" style="width: 100%;" onclick="createChapter()">Add Chapter</button>
        </div>
    </div>

    <div class="modal-overlay" id="contentModal" onclick="closeModal('contentModal')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 15px;">Add Material</h3>
            <input type="text" id="newContentTitle" class="input-field" placeholder="Title (e.g., Intro Notes)">
            <select id="newContentType" class="input-field" onchange="toggleContentUpload()">
                <option value="notes">Study Notes (.json)</option>
                <option value="quiz">MCQ Quiz (.json)</option>
                <option value="html">Custom HTML Page (.html)</option>
                <option value="pdf">Handwritten PDF (.pdf)</option>
            </select>
            <div id="pdfUploadDiv" style="display:none; margin-bottom: 15px;">
                <label style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; display:block;">Select PDF File</label>
                <input type="file" id="pdfFileInput" accept="application/pdf" class="input-field" style="padding: 8px;">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="createContent()">Generate / Upload</button>
        </div>
    </div>

    <input type="file" id="hiddenImageUploader" accept="image/*" style="display: none;">
    <input type="hidden" id="currentTargetTextarea">
    
    <input type="file" id="replaceFileUploader" style="display: none;">
    <input type="hidden" id="replaceFilePath">
    <input type="hidden" id="replaceFileSha">

    <script>
        function b64EncodeUnicode(str) { return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) { return String.fromCharCode('0x' + p1); })); }
        function b64DecodeUnicode(str) { return decodeURIComponent(Array.prototype.map.call(atob(str), function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join('')); }

        let gh = { owner: '', repo: '', token: '' };
        let repoFiles = [];
        let currentView = 'courses'; 
        let activeCourse = { path: '', sha: '', data: null };
        let activeChapIndex = -1;
        let editor;
        let parsedVisualData = null; 
        let visualFileType = null; 
        
        // Memory for Folder View
        let currentVirtualFolder = '';

        function jumpToTop() { if (editor) { editor.navigateFileStart(); editor.scrollToLine(0, true, true, function () {}); } }
        function jumpToBottom() { if (editor) { const lastLine = editor.session.getLength(); editor.navigateFileEnd(); editor.scrollToLine(lastLine, true, true, function () {}); } }

        let mathJaxTimeout = null;
        function updateLivePreview(inputId, previewId) {
            const val = document.getElementById(inputId).value;
            const previewBox = document.getElementById(previewId);
            if(!val.trim()) { previewBox.innerHTML = '<span style="color:var(--text-muted); font-style:italic;">Preview will appear here...</span>'; return; }
            previewBox.innerHTML = val;
            clearTimeout(mathJaxTimeout);
            mathJaxTimeout = setTimeout(() => {
                if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) MathJax.typesetPromise([previewBox]).catch(e => console.log(e));
            }, 600);
        }

        function initAceEditor() {
            editor = ace.edit("aceEditorContainer");
            editor.setTheme("ace/theme/twilight");
            editor.session.setMode("ace/mode/json");
            editor.setOptions({ fontSize: "14px", showLineNumbers: true, showGutter: true, wrap: true, useWorker: false, scrollPastEnd: 0.8 });
        }

        window.onload = () => {
            initAceEditor();
            if (localStorage.getItem('ghToken')) {
                gh = { owner: localStorage.getItem('ghOwner'), repo: localStorage.getItem('ghRepo'), token: localStorage.getItem('ghToken') };
                document.getElementById('authScreen').style.display = 'none';
                loadCourses();
            }
        };

        function loginGH() {
            gh.owner = document.getElementById('ghOwner').value.trim(); gh.repo = document.getElementById('ghRepo').value.trim(); gh.token = document.getElementById('ghToken').value.trim();
            if(!gh.token) return alert("Token required!");
            localStorage.setItem('ghOwner', gh.owner); localStorage.setItem('ghRepo', gh.repo); localStorage.setItem('ghToken', gh.token);
            document.getElementById('authScreen').style.display = 'none'; loadCourses();
        }

        function logoutGH() { localStorage.clear(); window.location.reload(); }

        async function api(endpoint, method = 'GET', body = null) {
            const url = `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${endpoint}`;
            const opt = { method, headers: { 'Authorization': `token ${gh.token}`, 'Accept': 'application/vnd.github.v3+json' } };
            if (body) opt.body = JSON.stringify(body);
            const res = await fetch(url, opt);
            if (!res.ok) throw new Error(await res.text());
            return await res.json();
        }

        function showLoading(msg) { document.getElementById('loadingText').textContent = msg; document.getElementById('loadingOverlay').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

        function switchView(viewId, title, showBack) {
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.getElementById('appTitle').textContent = title;
            document.getElementById('backBtn').style.visibility = showBack ? 'visible' : 'hidden';
            currentView = viewId.replace('view', '').toLowerCase();
        }

        function navigateBack() {
            if (currentView === 'contents') { renderChapters(); } 
            else if (currentView === 'chapters' || currentView === 'allfiles') { loadCourses(); }
        }

        // ==========================================
        // 🔥 SMART VIRTUAL FILE MANAGER WITH MEMORY 🔥
        // ==========================================
        function initSmartExplorer() {
            currentVirtualFolder = ''; 
            const list = document.getElementById('allFilesList');
            list.innerHTML = `
                <div class="folder-grid">
                    <div class="folder-card" style="border-color: #10b981;" onclick="openVirtualFolder('images')">
                        <div class="folder-icon" style="color: #10b981;"><i class="fas fa-images"></i></div>
                        <div style="font-weight:600; font-size:0.9rem;">Images</div>
                    </div>
                    <div class="folder-card" style="border-color: #f43f5e;" onclick="openVirtualFolder('pdfs')">
                        <div class="folder-icon" style="color: #f43f5e;"><i class="fas fa-file-pdf"></i></div>
                        <div style="font-weight:600; font-size:0.9rem;">PDFs</div>
                    </div>

            else if (category === 'notes') filtered = repoFiles.filter(f => f.name.match(/n\d+\.\d+\.json$/));

                    for (let chap of courseData.chapters) {

                                } catch(err) {}
                            }
                        }

                }
                await api(path, 'DELETE', { message: `Deleted course ${path}`, sha: sha });
                try {
                    const libData = await api('library.json'); let libraryObj = JSON.parse(b64DecodeUnicode(libData.content));
                    if(libraryObj.courses) {
                        libraryObj.courses = libraryObj.courses.filter(c => c.id !== path.split('.')[0]);
                        await api('library.json', 'PUT', { message: `Removed from library`, content: b64EncodeUnicode(JSON.stringify(libraryObj, null, 2)), sha: libData.sha });

                } catch(err) {}
                loadCourses();
            } catch(e) { alert("Failed to delete."); }
            hideLoading();
        }

        function generateInBlockMediaHTML(text, targetId) {
            if(!text) return '';
            const regex = /img_\d+\.(?:jpg|jpeg|png|gif|svg)/gi;
            let matches = [...new Set(text.match(regex) || [])];
            if(matches.length === 0) return '';

            let html = `<div class="inblock-media-row">`;
            matches.forEach(img => {
                let url = `https://raw.githubusercontent.com/${gh.owner}/${gh.repo}/main/${img}?t=${Date.now()}`; // Cache buster
                html += `
                    <div class="inblock-media-card">
                        <img src="${url}" class="inblock-media-img">
                        <div class="inblock-media-name">${img}</div>
                        <div style="display:flex; gap:5px;">
                            <button class="btn btn-outline" style="padding:2px 5px; flex:1; color:var(--info); border-color:var(--info);" onclick="triggerInBlockReplace('${img}', '${targetId}')" title="Replace"><i class="fas fa-sync-alt"></i></button>
                            <button class="btn btn-danger" style="padding:2px 5px; flex:1; margin:0;" onclick="triggerInBlockDelete('${img}', '${targetId}')" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            return html;
        }

        async function triggerInBlockDelete(imgName, targetId) {
            if(!confirm(`Delete ${imgName} from repo and this block?`)) return;
            showLoading("Deleting Image...");
            try {
                try { const fileData = await api(imgName); await api(imgName, 'DELETE', { message: `Deleted ${imgName}`, sha: fileData.sha }); } catch(e) {}
                
                let textarea = document.getElementById(targetId);
                let val = textarea.value;
                // Safer Regex to remove the entire img tag regardless of parameters
                let tagRegex = new RegExp(`(?:<br>\\s*)?<img[^>]*src=["'][^"']*${imgName}[^"']*["'][^>]*>(?:\\s*<br>)?`, 'g');
                val = val.replace(tagRegex, '');
                val = val.replace(new RegExp(imgName, 'g'), ''); // Fallback
                textarea.value = val;
                
                if(visualFileType === 'quiz') extractVisualQuizData(); else extractVisualNotesData();
                if(visualFileType === 'quiz') buildVisualQuizUI(); else buildVisualNotesUI();
            } catch(e) { alert("Failed to delete image."); }
            hideLoading();
        }

        document.getElementById('hiddenImageUploader').addEventListener('change', async function(e) {
            let file = e.target.files[0]; if (!file) return;
            showLoading("Uploading Image...");
            try {
                let reader = new FileReader();
                reader.onload = async function(event) {
                    try {
                        let base64 = event.target.result.split(',')[1]; let ext = file.name.split('.').pop(); let newFilename = `img_${Date.now()}.${ext}`;
                        await api(newFilename, 'PUT', { message: `Uploaded image ${newFilename}`, content: base64 });
                        
                        let instruction = document.getElementById('currentTargetTextarea').value; 
                        let imgUrl = `https://raw.githubusercontent.com/${gh.owner}/${gh.repo}/main/${newFilename}?t=${Date.now()}`;
                        
                        if(instruction.startsWith('INBLOCK_SWAP:')) {
                            let parts = instruction.split(':');
                            let targetId = parts[1];
                            let oldImgName = parts[2];
                            
                            try { const oldFileData = await api(oldImgName); await api(oldImgName, 'DELETE', { message: `Deleted old image`, sha: oldFileData.sha }); } catch(err) {}
                            
                            let textarea = document.getElementById(targetId);
                            // Replace old filename (ignoring parameters) with new filename + cache buster
                            textarea.value = textarea.value.replace(new RegExp(oldImgName + '(\\?t=\\d+)?', 'g'), newFilename + `?t=${Date.now()}`);
                            alert("Image Replaced!");
                        } else {
                            let targetId = instruction;
                            let textarea = document.getElementById(targetId);
                            textarea.value += ` <br><img src="${imgUrl}" style="max-width:100%; border-radius:8px;"> <br>`;
                            alert("Image Attached!");
                        }
                        
                        if(visualFileType === 'quiz') extractVisualQuizData(); else extractVisualNotesData();
                        if(visualFileType === 'quiz') buildVisualQuizUI(); else buildVisualNotesUI();

                    } catch(err) { alert("Error handling image."); }
                    hideLoading(); document.getElementById('hiddenImageUploader').value = ''; 
                };
                reader.readAsDataURL(file);
            } catch(err) { hideLoading(); alert("File read failed."); }
        });


        // ==========================================
        // 🔥 HYBRID EDITOR & LIVE PREVIEW 🔥
        // ==========================================
        async function openEditor(path, sha, reloadCourseOnSave = false) {
            if (path.endsWith('.pdf')) { alert("PDFs cannot be edited here."); return; }
            
            showLoading("Loading Editor...");
            try {
                let codeStr = "";
                if(!sha) { const fileData = await api(path); sha = fileData.sha; codeStr = b64DecodeUnicode(fileData.content); } 
                else { const fileData = await api(path); codeStr = b64DecodeUnicode(fileData.content); }
                
                document.getElementById('editPath').value = path;
                document.getElementById('editSha').value = sha;
                document.getElementById('reloadCourseFlag').value = reloadCourseOnSave;
                
                if(path.endsWith('.html')) editor.session.setMode("ace/mode/html");
                else if(path.endsWith('.css')) editor.session.setMode("ace/mode/css");
                else if(path.endsWith('.js')) editor.session.setMode("ace/mode/javascript");
                else editor.session.setMode("ace/mode/json");
                editor.setValue(codeStr, -1); 

                const toggleBtn = document.getElementById('editorModeToggle');
                const previewBtn = document.getElementById('livePreviewBtn');
                
                if (path.match(/q\d+\.\d+\.json$/)) {
                    visualFileType = 'quiz'; toggleBtn.style.display = 'block'; previewBtn.style.display = 'block';
                    toggleBtn.innerHTML = '<i class="fas fa-eye"></i> Visual Builder'; document.getElementById('currentEditorMode').value = 'visual'; syncCodeToVisual();
                } else if (path.match(/n\d+\.\d+\.json$/)) {
                    visualFileType = 'notes'; toggleBtn.style.display = 'block'; previewBtn.style.display = 'block';
                    toggleBtn.innerHTML = '<i class="fas fa-eye"></i> Visual Builder'; document.getElementById('currentEditorMode').value = 'visual'; syncCodeToVisual();
                } else {
                    visualFileType = null; toggleBtn.style.display = 'none'; previewBtn.style.display = 'none';
                    document.getElementById('currentEditorMode').value = 'code'; showCodeMode();
                }
                document.getElementById('codeEditorView').style.display = 'flex'; editor.resize(); 
            } catch(e) { alert("Failed to load file content."); }
            hideLoading();
        }

        function closeEditor() { document.getElementById('codeEditorView').style.display = 'none'; }
        function triggerSearch() { if(document.getElementById('currentEditorMode').value === 'code') editor.execCommand("find"); }

        function toggleEditorMode() {
            const currentMode = document.getElementById('currentEditorMode').value;
            const toggleBtn = document.getElementById('editorModeToggle');
            const previewBtn = document.getElementById('livePreviewBtn');
            if (currentMode === 'code') {
                if (!syncCodeToVisual()) return; 
                document.getElementById('currentEditorMode').value = 'visual'; toggleBtn.innerHTML = '<i class="fas fa-code"></i> Raw Code';
                previewBtn.style.display = 'block';
            } else {
                syncVisualToCode(); document.getElementById('currentEditorMode').value = 'code'; toggleBtn.innerHTML = '<i class="fas fa-eye"></i> Visual Builder'; showCodeMode();
                previewBtn.style.display = 'none';
            }
        }

        function showCodeMode() { 
            document.getElementById('visualEditorContainer').style.display = 'none'; 
            document.getElementById('aceEditorContainer').style.display = 'block'; 
            document.getElementById('searchBtn').style.display = 'block'; 
            document.getElementById('jumpButtons').style.display = 'flex'; 
            editor.resize(); 
        }
        
        function showVisualMode() { 
            document.getElementById('aceEditorContainer').style.display = 'none'; 
            document.getElementById('visualEditorContainer').style.display = 'block'; 
            document.getElementById('searchBtn').style.display = 'none'; 
            document.getElementById('jumpButtons').style.display = 'none'; 
            if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) { setTimeout(() => { MathJax.typesetPromise(); }, 200); }
        }

        function syncCodeToVisual() {
            try { parsedVisualData = JSON.parse(editor.getValue()); if (visualFileType === 'quiz') buildVisualQuizUI(); else if (visualFileType === 'notes') buildVisualNotesUI(); showVisualMode(); return true; } 
            catch(e) { alert("Syntax errors in JSON. Fix them in Code View before switching."); return false; }
        }
        function syncVisualToCode() {
            if (visualFileType === 'quiz') extractVisualQuizData(); else if (visualFileType === 'notes') extractVisualNotesData();
            editor.setValue(JSON.stringify(parsedVisualData, null, 2), -1);
        }

        // --- FULL APP PREVIEW LOGIC ---
        function openLiveAppPreview() {
            if (visualFileType === 'quiz') extractVisualQuizData(); else if (visualFileType === 'notes') extractVisualNotesData();
            const modal = document.getElementById('livePreviewModal'); const contentArea = document.getElementById('mockupContentArea'); let html = '';
            if (visualFileType === 'quiz') {
                html += `<div style="text-align:center; color:var(--primary); margin-bottom:20px; font-weight:600;"><i class="fas fa-brain"></i> Quiz Preview</div>`;
                parsedVisualData.forEach((q, i) => {
                    html += `<div style="margin-bottom: 30px;"><strong>Q${i+1}.</strong> <div style="margin-bottom:15px; font-size:1.1rem; font-weight:600;">${q.question || ''}</div>`;
                    const labels = ['A', 'B', 'C', 'D'];
                    (q.options || []).forEach((opt, oIdx) => {
                        const isCorrect = q.correctIndex === oIdx ? 'm-correct' : '';
                        const icon = q.correctIndex === oIdx ? '<i class="fas fa-check-circle" style="float:right;"></i>' : '';
                        html += `<div class="m-option ${isCorrect}"><strong>${labels[oIdx]}.</strong> <div style="flex:1;">${opt}</div> ${icon}</div>`;
                    });
                    if(q.explanation) { html += `<div class="m-callout" style="font-size:0.85rem;"><strong style="display:block; margin-bottom:5px;"><i class="fas fa-lightbulb"></i> Explanation</strong>${q.explanation}</div>`; }
                    html += `</div><hr style="border-color:rgba(255,255,255,0.1); margin:20px 0;">`;
                });
            } else if (visualFileType === 'notes') {
                if(parsedVisualData.topic) html += `<div style="color:var(--primary); font-weight:700; text-transform:uppercase; font-size:0.8rem; margin-bottom:5px;">${parsedVisualData.topic}</div>`;
                if(parsedVisualData.title) html += `<h1>${parsedVisualData.title}</h1>`;
                (parsedVisualData.blocks || []).forEach(b => {
                    if (b.type === 'h1') html += `<h1>${b.content}</h1>`; else if (b.type === 'h2') html += `<h2>${b.content}</h2>`;
                    else if (b.type === 'paragraph') html += `<p style="margin-bottom:15px;">${b.content}</p>`; else if (b.type === 'callout') html += `<div class="m-callout"><strong><i class="fas fa-info-circle"></i> Info</strong><br>${b.content}</div>`;
                });
            }
            contentArea.innerHTML = html; modal.style.display = 'flex';
            if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) { MathJax.typesetPromise([contentArea]).catch(e => console.log(e)); }
        }

        function closeLiveAppPreview() { document.getElementById('livePreviewModal').style.display = 'none'; }

        // --- UI BUILDERS ---
        function buildVisualQuizUI() {
            const container = document.getElementById('visualContentArea');
            container.innerHTML = `<h3 style="margin-bottom: 20px; color: var(--primary);"><i class="fas fa-brain"></i> Quiz Builder</h3>`;
            if(!Array.isArray(parsedVisualData)) parsedVisualData = [];
            
            parsedVisualData.forEach((q, i) => {
                container.innerHTML += `
                    <div class="visual-card" id="qCard_${i}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                            <h4>Question ${i+1}</h4>
                            <button class="v-del-btn" onclick="deleteVisualItem(${i})"><i class="fas fa-trash"></i></button>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <label class="v-label">Question Text</label><button class="v-img-btn" onclick="startImageUpload('vq_${i}')"><i class="fas fa-image"></i> Image</button>
                        </div>
                        <textarea class="v-textarea" id="vq_${i}" oninput="updateLivePreview('vq_${i}', 'vq_${i}_prev')">${q.question || ''}</textarea>
                        ${generateInBlockMediaHTML(q.question, `vq_${i}`)}
                        <div class="v-preview-box" id="vq_${i}_prev">${q.question || '<span style="color:var(--text-muted); font-style:italic;">Preview will appear here...</span>'}</div>
                        
                        <div class="v-row">
                            <div style="flex:1;"><label class="v-label">Option A</label><input class="v-input" id="vo_${i}_0" value="${q.options?.[0] || ''}"><label class="v-label">Option B</label><input class="v-input" id="vo_${i}_1" value="${q.options?.[1] || ''}"></div>
                            <div style="flex:1;"><label class="v-label">Option C</label><input class="v-input" id="vo_${i}_2" value="${q.options?.[2] || ''}"><label class="v-label">Option D</label><input class="v-input" id="vo_${i}_3" value="${q.options?.[3] || ''}"></div>
                        </div>

                        <label class="v-label" style="margin-top:10px;">Correct Answer</label>
                        <select class="v-select" id="vc_${i}">
                            <option value="0" ${q.correctIndex===0?'selected':''}>Option A</option><option value="1" ${q.correctIndex===1?'selected':''}>Option B</option>
                            <option value="2" ${q.correctIndex===2?'selected':''}>Option C</option><option value="3" ${q.correctIndex===3?'selected':''}>Option D</option>
                        </select>

                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <label class="v-label">Explanation</label><button class="v-img-btn" onclick="startImageUpload('ve_${i}')"><i class="fas fa-image"></i> Image</button>
                        </div>
                        <textarea class="v-textarea" id="ve_${i}" style="min-height:50px;" oninput="updateLivePreview('ve_${i}', 've_${i}_prev')">${q.explanation || ''}</textarea>
                        ${generateInBlockMediaHTML(q.explanation, `ve_${i}`)}
                        <div class="v-preview-box" id="ve_${i}_prev">${q.explanation || '<span style="color:var(--text-muted); font-style:italic;">Preview will appear here...</span>'}</div>
                    </div>
                `;
            });
            container.innerHTML += `<button class="btn btn-outline" style="width:100%; border-style:dashed;" onclick="addVisualQuizItem()"><i class="fas fa-plus"></i> Add Question</button>`;
            if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) { setTimeout(() => { MathJax.typesetPromise(); }, 200); }
        }

        function extractVisualQuizData() {
            let newData = [];
            for (let i = 0; i < parsedVisualData.length; i++) {
                if(!document.getElementById(`qCard_${i}`)) continue;
                newData.push({
                    question: document.getElementById(`vq_${i}`).value,
                    options: [ document.getElementById(`vo_${i}_0`).value, document.getElementById(`vo_${i}_1`).value, document.getElementById(`vo_${i}_2`).value, document.getElementById(`vo_${i}_3`).value ],
                    correctIndex: parseInt(document.getElementById(`vc_${i}`).value),
                    explanation: document.getElementById(`ve_${i}`).value
                });
            }
            parsedVisualData = newData;
        }

        function addVisualQuizItem() { extractVisualQuizData(); parsedVisualData.push({ question: "", options: ["", "", "", ""], correctIndex: 0, explanation: "" }); buildVisualQuizUI(); }

        function buildVisualNotesUI() {
            const container = document.getElementById('visualContentArea');
            container.innerHTML = `<h3 style="margin-bottom: 20px; color: var(--info);"><i class="fas fa-book-open"></i> Notes Builder</h3>`;
            if(!parsedVisualData.blocks) parsedVisualData = { title: "", topic: "", blocks: [] };

            container.innerHTML += `
                <div style="margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
                    <label class="v-label">Main Title</label><input class="v-input" id="vn_title" value="${parsedVisualData.title || ''}">
                    <label class="v-label">Sub-Topic / Chapter</label><input class="v-input" id="vn_topic" value="${parsedVisualData.topic || ''}">
                </div>
                <div id="blocksContainer"></div>
            `;

            let blocksHtml = '';
            parsedVisualData.blocks.forEach((b, i) => {
                blocksHtml += `
                    <div class="visual-card" id="bCard_${i}" style="padding: 15px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <select class="v-select" id="bType_${i}" style="margin:0; width:150px;">
                                <option value="h1" ${b.type==='h1'?'selected':''}>Main Heading</option><option value="h2" ${b.type==='h2'?'selected':''}>Sub Heading</option>
                                <option value="paragraph" ${b.type==='paragraph'?'selected':''}>Paragraph</option><option value="callout" ${b.type==='callout'?'selected':''}>Info Box</option>
                            </select>
                            <button class="v-del-btn" onclick="deleteVisualItem(${i})" style="margin:0;"><i class="fas fa-trash"></i></button>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px; align-items: center;">
                            <span style="font-size:0.8rem; color:var(--text-muted);">Block ${i+1}</span><button class="v-img-btn" onclick="startImageUpload('bContent_${i}')"><i class="fas fa-image"></i> Attach Image</button>
                        </div>
                        <textarea class="v-textarea" id="bContent_${i}" style="margin-bottom:5px;" placeholder="Type content here..." oninput="updateLivePreview('bContent_${i}', 'bContent_${i}_prev')">${b.content || ''}</textarea>
                        ${generateInBlockMediaHTML(b.content, `bContent_${i}`)}
                        <div class="v-preview-box" id="bContent_${i}_prev">${b.content || '<span style="color:var(--text-muted); font-style:italic;">Preview will appear here...</span>'}</div>
                    </div>
                `;
            });
            document.getElementById('blocksContainer').innerHTML = blocksHtml;
            container.innerHTML += `<button class="btn btn-outline" style="width:100%; border-style:dashed;" onclick="addVisualNoteBlock()"><i class="fas fa-plus"></i> Add Text Block</button>`;
            if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) { setTimeout(() => { MathJax.typesetPromise(); }, 200); }
        }

        function extractVisualNotesData() {
            let newBlocks = [];
            for (let i = 0; i < parsedVisualData.blocks.length; i++) {
                if(!document.getElementById(`bCard_${i}`)) continue;
                let bType = document.getElementById(`bType_${i}`).value; let bContent = document.getElementById(`bContent_${i}`).value;
                let blockObj = { type: bType, content: bContent }; if (bType === 'callout') { blockObj.style = "info"; blockObj.icon = "fas fa-info-circle"; }
                newBlocks.push(blockObj);
            }
            parsedVisualData.title = document.getElementById('vn_title').value; parsedVisualData.topic = document.getElementById('vn_topic').value; parsedVisualData.blocks = newBlocks;
        }

        function addVisualNoteBlock() { extractVisualNotesData(); parsedVisualData.blocks.push({ type: "paragraph", content: "" }); buildVisualNotesUI(); }
        function deleteVisualItem(index) {
            if(!confirm("Remove this item?")) return;
            if (visualFileType === 'quiz') { extractVisualQuizData(); parsedVisualData.splice(index, 1); buildVisualQuizUI(); } 
            else { extractVisualNotesData(); parsedVisualData.blocks.splice(index, 1); buildVisualNotesUI(); }
        }

        async function saveContent() {
            if (document.getElementById('currentEditorMode').value === 'visual') syncVisualToCode(); 
            showLoading("Saving...");
            const path = document.getElementById('editPath').value; const sha = document.getElementById('editSha').value; const code = editor.getValue(); const reloadCourse = document.getElementById('reloadCourseFlag').value === 'true';
            try {
                if(path.endsWith('.json')) JSON.parse(code); 
                const res = await api(path, 'PUT', { message: `Admin manual edit: ${path}`, content: b64EncodeUnicode(code), sha: sha });
                alert("Saved Successfully!");
                if(reloadCourse) { activeCourse.data = JSON.parse(code); activeCourse.sha = res.content.sha; renderChapters(); }
                document.getElementById('editSha').value = res.content.sha;
            } catch(e) { alert("Save failed! Check JSON syntax."); }
            hideLoading();
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
