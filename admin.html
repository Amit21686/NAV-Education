            const path = document.getElementById('sysReplacePath').value; const sha = document.getElementById('sysReplaceSha').value;
            UI.showLoading("Replacing File...");
            let reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    let base64 = event.target.result; base64 = base64.includes(',') ? base64.split(',')[1] : base64;
                    await API.createOrUpdate(path, base64, `Replaced ${path}`, sha); State.repoFiles = await API.request('');
                    if(State.currentHash === 'contents') { CourseEngine.renderContents(); } else { FileManager.renderFolder(State.fmFolder); } UI.showToast("File Replaced!");
                } catch(err) { alert("Replace failed."); } UI.hideLoading(); document.getElementById('sysReplaceUploader').value = '';
            }; reader.readAsDataURL(file);
        });

        // ==========================================
        // 7. HYBRID EDITOR ENGINE
        // ==========================================
        let aceEditor;
        const EditorEngine = {
            init: () => {
                if (typeof ace !== 'undefined') {
                    aceEditor = ace.edit("aceEditorContainer"); aceEditor.setTheme("ace/theme/twilight"); aceEditor.session.setMode("ace/mode/json");
                    aceEditor.setOptions({ fontSize: "14px", showLineNumbers: true, showGutter: true, wrap: true, useWorker: false, scrollPastEnd: 0.8 });
                }
            },
            open: async (path, sha, reloadCourse = false) => {
                if (path.endsWith('.pdf')) return alert("PDFs cannot be edited here. Use Replace button.");
                UI.showLoading("Loading Editor...");
                try {
                    let codeStr = "";
                    if (!sha) { const fData = await API.request(path); sha = fData.sha; codeStr = Utils.b64Decode(fData.content); } 
                    else { const fData = await API.request(path); codeStr = Utils.b64Decode(fData.content); }
                    
                    document.getElementById('editPath').value = path; document.getElementById('editSha').value = sha; State.reloadCourseOnSave = reloadCourse;
                    State.originalCode = codeStr; 
                    
                    if (aceEditor) {
                        let ext = Utils.getExt(path);
                        if(ext === 'html') aceEditor.session.setMode("ace/mode/html"); else if(ext === 'css') aceEditor.session.setMode("ace/mode/css"); else if(ext === 'js') aceEditor.session.setMode("ace/mode/javascript"); else aceEditor.session.setMode("ace/mode/json");
                        aceEditor.setValue(codeStr, -1); 
                    }

                    const tBtn = document.getElementById('editorModeToggle'); const pBtn = document.getElementById('livePreviewBtn');
                    
                    if (path.match(/q\d+\.\d+\.json$/)) { State.editorFileType = 'quiz'; tBtn.style.display = 'block'; pBtn.style.display = 'block'; tBtn.innerHTML = '<i class="fas fa-eye"></i> Visual'; State.editorMode = 'visual'; VisualBuilder.syncToVisual(); } 
                    else if (path.match(/n\d+\.\d+\.json$/)) { State.editorFileType = 'notes'; tBtn.style.display = 'block'; pBtn.style.display = 'block'; tBtn.innerHTML = '<i class="fas fa-eye"></i> Visual'; State.editorMode = 'visual'; VisualBuilder.syncToVisual(); } 
                    else { State.editorFileType = null; tBtn.style.display = 'none'; pBtn.style.display = 'none'; State.editorMode = 'code'; EditorEngine.showCodeUI(); }
                    
                    Nav.push('editor');
                } catch(e) { alert(`Load Error. The file may be corrupt or empty.`); } finally { UI.hideLoading(); }
            },

            triggerSearch: () => { if(State.editorMode === 'code' && aceEditor) aceEditor.execCommand("find"); },
            jumpToTop: () => { if(aceEditor) { aceEditor.navigateFileStart(); aceEditor.scrollToLine(0, true, true, ()=>{}); } },
            jumpToBottom: () => { if(aceEditor) { const ll = aceEditor.session.getLength(); aceEditor.navigateFileEnd(); aceEditor.scrollToLine(ll, true, true, ()=>{}); } },
            
            toggleMode: () => {
                const tBtn = document.getElementById('editorModeToggle'); const pBtn = document.getElementById('livePreviewBtn');
                if (State.editorMode === 'code') { if (!VisualBuilder.syncToVisual()) return; State.editorMode = 'visual'; tBtn.innerHTML = '<i class="fas fa-code"></i> Code'; pBtn.style.display = 'block'; } 
                else { VisualBuilder.syncToCode(); State.editorMode = 'code'; tBtn.innerHTML = '<i class="fas fa-eye"></i> Visual'; pBtn.style.display = 'none'; EditorEngine.showCodeUI(); }
            },

            showCodeUI: () => { document.getElementById('visualEditorContainer').style.display = 'none'; document.getElementById('aceEditorContainer').style.display = 'block'; document.getElementById('searchBtn').style.display = 'block'; document.getElementById('jumpButtons').style.display = 'flex'; if(aceEditor) aceEditor.resize(); },
            showVisualUI: () => { document.getElementById('aceEditorContainer').style.display = 'none'; document.getElementById('visualEditorContainer').style.display = 'block'; document.getElementById('searchBtn').style.display = 'none'; document.getElementById('jumpButtons').style.display = 'none'; if (window.MathJax) setTimeout(() => MathJax.typesetPromise(), 200); },

            save: async (silent = false) => {
                if (State.editorMode === 'visual') { VisualBuilder.syncToCode(); }
                const currentCode = aceEditor ? aceEditor.getValue() : '';
                if (currentCode === State.originalCode) { if (!silent) UI.showToast("No changes detected."); return; }
                
                if (!silent) UI.showLoading("Saving..."); else UI.showToast("Auto-saving draft...");
                const path = document.getElementById('editPath').value; const sha = document.getElementById('editSha').value;
                
                try {
                    if(path.endsWith('.json')) JSON.parse(currentCode); 
                    const res = await API.createOrUpdate(path, Utils.b64Encode(currentCode), `Admin edit: ${path}`, sha);
                    document.getElementById('editSha').value = res.content.sha; State.originalCode = currentCode; 
                    
                    if(State.reloadCourseOnSave) { State.activeCourse.data = JSON.parse(currentCode); State.activeCourse.sha = res.content.sha; CourseEngine.renderChapters(); }
                    
                    if(path.toLowerCase() === 'quotes.json') {
                         State.quotesSha = res.content.sha;
                         State.quotesData = JSON.parse(currentCode);
                    }

                    if(!silent) UI.showToast("Changes Saved!");
                } catch(e) { if(!silent) alert("Save failed! Please check for JSON syntax errors."); else UI.showToast("Auto-save skipped: Syntax error!"); } 
                finally { if(!silent) UI.hideLoading(); }
            }
        };

        // ==========================================
        // 8. VISUAL BUILDER
        // ==========================================
        const VisualBuilder = {
            syncToVisual: () => {
                try {
                    const val = aceEditor ? aceEditor.getValue() : ''; State.visualData = val.trim() === "" ? (State.editorFileType === 'quiz' ? [] : {}) : JSON.parse(val);
                    if (State.editorFileType === 'quiz') VisualBuilder.buildQuiz(); else if (State.editorFileType === 'notes') VisualBuilder.buildNotes();
                    EditorEngine.showVisualUI(); return true;
                } catch(e) { alert("Syntax errors found in JSON. Fix them in Code View before switching to Visual Mode."); return false; }
            },
            syncToCode: () => {
                if (State.editorFileType === 'quiz') VisualBuilder.extractQuiz(); else if (State.editorFileType === 'notes') VisualBuilder.extractNotes();
                if(aceEditor) aceEditor.setValue(JSON.stringify(State.visualData, null, 2), -1);
            },
            liveMath: (inputId, prevId) => {
                const val = document.getElementById(inputId).value; const box = document.getElementById(prevId);
                if(!val.trim()) { box.innerHTML = '<span style="color:var(--text-muted); font-style:italic;">Preview...</span>'; return; }
                
                box.innerHTML = val.replace(/\n/g, '<br>');
                
                clearTimeout(State.mathTimeout);
                State.mathTimeout = setTimeout(() => { if(window.MathJax) MathJax.typesetPromise([box]).catch(e => console.log(e)); }, 600);
            },
            buildQuiz: () => {
                const c = document.getElementById('visualContentArea'); c.innerHTML = `<h3 style="margin-bottom: 20px; color: var(--primary);"><i class="fas fa-brain"></i> Quiz Builder</h3>`;
                if(!Array.isArray(State.visualData)) State.visualData = [];
                
                State.visualData.forEach((q, i) => {
                    c.innerHTML += `
                        <div class="visual-card" id="qCard_${i}">
                            <div class="flex justify-between items-center" style="margin-bottom:15px;"><h4>Question ${i+1}</h4><button class="v-del-btn" onclick="VisualBuilder.deleteItem(${i})"><i class="fas fa-trash"></i></button></div>
                            <div class="flex justify-between items-center"><label class="v-label">Question Text</label><button class="v-img-btn" onclick="MediaEngine.openUploader('vq_${i}')"><i class="fas fa-image"></i> Image</button></div>
                            <textarea class="v-textarea" id="vq_${i}" oninput="VisualBuilder.liveMath('vq_${i}', 'vqp_${i}')">${q.question || ''}</textarea>
                            ${MediaEngine.renderInBlockImages(q.question, `vq_${i}`)}
                            <div class="v-preview-box" id="vqp_${i}">${(q.question || '...').replace(/\n/g, '<br>')}</div>
                            <div class="flex gap-2">
                                <div style="flex:1;"><label class="v-label">Opt A</label><input class="v-input" id="vo_${i}_0" value="${q.options?.[0] || ''}"><label class="v-label">Opt B</label><input class="v-input" id="vo_${i}_1" value="${q.options?.[1] || ''}"></div>
                                <div style="flex:1;"><label class="v-label">Opt C</label><input class="v-input" id="vo_${i}_2" value="${q.options?.[2] || ''}"><label class="v-label">Opt D</label><input class="v-input" id="vo_${i}_3" value="${q.options?.[3] || ''}"></div>
                            </div>
                            <label class="v-label" style="margin-top:10px;">Correct Answer</label>
                            <select class="v-select" id="vc_${i}"><option value="0" ${q.correctIndex===0?'selected':''}>Option A</option><option value="1" ${q.correctIndex===1?'selected':''}>Option B</option><option value="2" ${q.correctIndex===2?'selected':''}>Option C</option><option value="3" ${q.correctIndex===3?'selected':''}>Option D</option></select>
                            <div class="flex justify-between items-center"><label class="v-label">Explanation</label><button class="v-img-btn" onclick="MediaEngine.openUploader('ve_${i}')"><i class="fas fa-image"></i> Image</button></div>
                            <textarea class="v-textarea" id="ve_${i}" oninput="VisualBuilder.liveMath('ve_${i}', 'vep_${i}')">${q.explanation || ''}</textarea>
                            ${MediaEngine.renderInBlockImages(q.explanation, `ve_${i}`)}
                            <div class="v-preview-box" id="vep_${i}">${(q.explanation || '...').replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                });
                c.innerHTML += `<button class="btn btn-outline" style="width:100%; border-style:dashed;" onclick="VisualBuilder.addQuizItem()"><i class="fas fa-plus"></i> Add Question</button>`;
                if(window.MathJax) setTimeout(() => MathJax.typesetPromise(), 200);
            },
            extractQuiz: () => {
                let n = [];
                for (let i = 0; i < State.visualData.length; i++) {
                    if(!document.getElementById(`qCard_${i}`)) continue;
                    n.push({ question: document.getElementById(`vq_${i}`).value, options: [ document.getElementById(`vo_${i}_0`).value, document.getElementById(`vo_${i}_1`).value, document.getElementById(`vo_${i}_2`).value, document.getElementById(`vo_${i}_3`).value ], correctIndex: parseInt(document.getElementById(`vc_${i}`).value), explanation: document.getElementById(`ve_${i}`).value });
                } State.visualData = n;
            },
            addQuizItem: () => { VisualBuilder.extractQuiz(); State.visualData.push({ question: "", options: ["", "", "", ""], correctIndex: 0, explanation: "" }); VisualBuilder.buildQuiz(); },
            buildNotes: () => {
                const c = document.getElementById('visualContentArea'); c.innerHTML = `<h3 style="margin-bottom: 20px; color: var(--info);"><i class="fas fa-book-open"></i> Notes Builder</h3>`;
                if(!State.visualData) State.visualData = {}; if(!State.visualData.blocks) State.visualData.blocks = [];
                c.innerHTML += `
                    <div style="margin-bottom:25px; border-bottom:1px solid var(--border); padding-bottom:15px;">
                        <label class="v-label">Main Title</label><input class="v-input" id="vn_title" value="${State.visualData.title || ''}">
                        <label class="v-label">Sub-Topic / Chapter</label><input class="v-input" id="vn_topic" value="${State.visualData.topic || ''}">
                    </div><div id="blocksContainer"></div>
                `;
                let html = '';
                State.visualData.blocks.forEach((b, i) => {
                    html += `
                        <div class="visual-card" id="bCard_${i}" style="padding: 15px;">
                            <div class="flex justify-between items-center" style="margin-bottom:10px;">
                                <select class="v-select" id="bType_${i}" style="margin:0; width:150px;"><option value="h1" ${b.type==='h1'?'selected':''}>Heading 1</option><option value="h2" ${b.type==='h2'?'selected':''}>Heading 2</option><option value="paragraph" ${b.type==='paragraph'?'selected':''}>Paragraph</option><option value="callout" ${b.type==='callout'?'selected':''}>Callout Box</option></select>
                                <button class="v-del-btn" onclick="VisualBuilder.deleteItem(${i})" style="margin:0;"><i class="fas fa-trash"></i></button>
                            </div>
                            <div class="flex justify-between items-center" style="margin-bottom:5px;">
                                <span style="font-size:0.8rem; color:var(--text-muted);">Block ${i+1}</span><button class="v-img-btn" onclick="MediaEngine.openUploader('bContent_${i}')"><i class="fas fa-image"></i> Media</button>
                            </div>
                            <textarea class="v-textarea" id="bContent_${i}" style="margin-bottom:5px;" oninput="VisualBuilder.liveMath('bContent_${i}', 'bContentp_${i}')">${b.content || ''}</textarea>
                            ${MediaEngine.renderInBlockImages(b.content, `bContent_${i}`)}
                            <div class="v-preview-box" id="bContentp_${i}">${(b.content || '...').replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                });
                document.getElementById('blocksContainer').innerHTML = html;
                c.innerHTML += `<button class="btn btn-outline" style="width:100%; border-style:dashed;" onclick="VisualBuilder.addNoteBlock()"><i class="fas fa-plus"></i> Add Block</button>`;
                if(window.MathJax) setTimeout(() => MathJax.typesetPromise(), 200);
            },
            extractNotes: () => {
                let nb = [];
                for (let i = 0; i < State.visualData.blocks.length; i++) {
                    if(!document.getElementById(`bCard_${i}`)) continue;
                    let t = document.getElementById(`bType_${i}`).value; let c = document.getElementById(`bContent_${i}`).value;
                    let obj = { type: t, content: c }; if (t === 'callout') { obj.style = "info"; obj.icon = "fas fa-info-circle"; } nb.push(obj);
                }
                State.visualData.title = document.getElementById('vn_title').value; State.visualData.topic = document.getElementById('vn_topic').value; State.visualData.blocks = nb;
            },
            addNoteBlock: () => { VisualBuilder.extractNotes(); State.visualData.blocks.push({ type: "paragraph", content: "" }); VisualBuilder.buildNotes(); },
            deleteItem: (idx) => {
                if(!confirm("Remove item?")) return;
                if (State.editorFileType === 'quiz') { VisualBuilder.extractQuiz(); State.visualData.splice(idx, 1); VisualBuilder.buildQuiz(); } 
                else { VisualBuilder.extractNotes(); State.visualData.blocks.splice(idx, 1); VisualBuilder.buildNotes(); }
            }
        };

        // ==========================================
        // 9. IN-BLOCK MEDIA ENGINE
        // ==========================================
        const MediaEngine = {
            renderInBlockImages: (text, targetId) => {
                if(!text) return ''; const matches = [...new Set(text.match(/img_\d+\.(?:jpg|jpeg|png|gif|svg)/gi) || [])];
                if(matches.length === 0) return '';
                let html = `<div class="inblock-media-row">`;
                matches.forEach(img => {
                    let url = `https://raw.githubusercontent.com/${State.gh.owner}/${State.gh.repo}/main/${img}?t=${Date.now()}`;
                    html += `
                        <div class="inblock-media-card">
                            <img src="${url}" class="inblock-media-img" loading="lazy">
                            <div class="flex gap-2">
                                <button class="btn btn-outline" style="padding:4px; flex:1; color:var(--info); border-color:var(--info);" onclick="MediaEngine.openUploader('INBLOCK_SWAP:${targetId}:${img}')"><i class="fas fa-sync-alt"></i></button>
                                <button class="btn btn-danger" style="padding:4px; flex:1; margin:0;" onclick="MediaEngine.deleteImage('${img}', '${targetId}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                }); return html + `</div>`;
            },
            deleteImage: async (imgName, targetId) => {
                if(!confirm(`Delete image permanently from GitHub?`)) return; UI.showLoading("Deleting Media...");
                try {
                    try { const fd = await API.request(imgName); await API.deleteFile(imgName, fd.sha, "Del Media"); } catch(e) {}
                    let tArea = document.getElementById(targetId); let v = tArea.value;
                    v = v.replace(new RegExp(`(?:<br>\\s*)?<img[^>]*src=["'][^"']*${imgName}[^"']*["'][^>]*>(?:\\s*<br>)?`, 'g'), '');
                    v = v.replace(new RegExp(imgName, 'g'), ''); tArea.value = v;
                    if(State.editorFileType === 'quiz') { VisualBuilder.extractQuiz(); VisualBuilder.buildQuiz(); } else { VisualBuilder.extractNotes(); VisualBuilder.buildNotes(); }
                    UI.showToast("Media Deleted!");
                } catch(e) { alert("Failed to delete."); } UI.hideLoading();
            },
            openUploader: (targetId) => { document.getElementById('visualTargetId').value = targetId; document.getElementById('visualImgUploader').click(); }
        };

        document.getElementById('visualImgUploader').addEventListener('change', async (e) => {
            let f = e.target.files[0]; if (!f) return; UI.showLoading("Uploading Media...");
            let reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    let b64 = event.target.result.split(',')[1]; let ext = Utils.getExt(f.name); let nFile = `img_${Date.now()}.${ext}`;
                    await API.createOrUpdate(nFile, b64, `Upload media`);
                    let inst = document.getElementById('visualTargetId').value; let imgUrl = `https://raw.githubusercontent.com/${State.gh.owner}/${State.gh.repo}/main/${nFile}?t=${Date.now()}`;
                    if(inst.startsWith('INBLOCK_SWAP:')) {
                        let p = inst.split(':'); let tId = p[1]; let oldImg = p[2];
                        try { const od = await API.request(oldImg); await API.deleteFile(oldImg, od.sha, "Del old"); } catch(err) {}
                        let ta = document.getElementById(tId); ta.value = ta.value.replace(new RegExp(oldImg + '(\\?t=\\d+)?', 'g'), nFile + `?t=${Date.now()}`);
                    } else { let ta = document.getElementById(inst); ta.value += ` <br><img src="${imgUrl}" style="max-width:100%; border-radius:8px;"> <br>`; }
                    if(State.editorFileType === 'quiz') { VisualBuilder.extractQuiz(); VisualBuilder.buildQuiz(); } else { VisualBuilder.extractNotes(); VisualBuilder.buildNotes(); }
                    UI.showToast("Media Saved!");
                } catch(err) { alert("Media upload error."); } UI.hideLoading(); document.getElementById('visualImgUploader').value = ''; 
            }; reader.readAsDataURL(f);
        });

        // ==========================================
        // 10. APP MOCKUP PREVIEW ENGINE
        // ==========================================
        const PreviewEngine = {
            open: () => {
                if (State.editorFileType === 'quiz') VisualBuilder.extractQuiz(); else if (State.editorFileType === 'notes') VisualBuilder.extractNotes();
                const m = document.getElementById('livePreviewModal'); const c = document.getElementById('mockupContentArea'); let h = '';
                if (State.editorFileType === 'quiz') {
                    h += `<div class="text-center" style="color:var(--primary); margin-bottom:20px; font-weight:600;"><i class="fas fa-brain"></i> Quiz UI</div>`;
                    State.visualData.forEach((q, i) => {
                        h += `<div style="margin-bottom:30px;"><strong>Q${i+1}.</strong> <div style="margin-bottom:15px; font-size:1.1rem; font-weight:600;">${(q.question || '').replace(/\n/g, '<br>')}</div>`;
                        ['A','B','C','D'].forEach((lbl, oIdx) => {
                            let ic = q.correctIndex === oIdx ? 'm-correct' : ''; let check = q.correctIndex === oIdx ? '<i class="fas fa-check-circle" style="float:right;"></i>' : '';
                            h += `<div class="m-option ${ic}"><strong>${lbl}.</strong> <div style="flex:1;">${q.options?.[oIdx]||''}</div> ${check}</div>`;
                        });
                        if(q.explanation) h += `<div class="m-callout" style="font-size:0.85rem;"><strong style="display:block; margin-bottom:5px;"><i class="fas fa-lightbulb"></i> Explanation</strong>${(q.explanation).replace(/\n/g, '<br>')}</div>`;
                        h += `</div><hr style="border-color:rgba(255,255,255,0.1); margin:20px 0;">`;
                    });
                } else if (State.editorFileType === 'notes') {
                    if(State.visualData.topic) h += `<div style="color:var(--primary); font-weight:700; text-transform:uppercase; font-size:0.8rem; margin-bottom:5px;">${State.visualData.topic}</div>`;
                    if(State.visualData.title) h += `<h1>${State.visualData.title}</h1>`;
                    (State.visualData.blocks || []).forEach(b => {
                        let content = (b.content || '').replace(/\n/g, '<br>');
                        if (b.type === 'h1') h += `<h1>${content}</h1>`; else if (b.type === 'h2') h += `<h2>${content}</h2>`;
                        else if (b.type === 'paragraph') h += `<p style="margin-bottom:15px;">${content}</p>`; else if (b.type === 'callout') h += `<div class="m-callout"><strong><i class="fas fa-info-circle"></i> Info</strong><br>${content}</div>`;
                    });
                }
                c.innerHTML = h; Nav.push('preview'); if(window.MathJax) MathJax.typesetPromise([c]).catch(e=>console.log(e));
            }
        };

        // BOOT THE APP
        window.onload = App.init;
    </script>
</body>
</html>
