                    const tBtn = document.getElementById('editorModeToggle'), pBtn = document.getElementById('livePreviewBtn');
                    if (path.match(/q\d+\.\d+\.json$/)) {
                        State.editorFileType = 'quiz'; tBtn.style.display = 'block'; pBtn.style.display = 'block';
                        tBtn.innerHTML = '<i class="fas fa-eye"></i> Visual'; State.editorMode = 'visual'; VisualBuilder.syncToVisual();
                    } else if (path.match(/n\d+\.\d+\.json$/)) {
                        State.editorFileType = 'notes'; tBtn.style.display = 'block'; pBtn.style.display = 'block';
                        tBtn.innerHTML = '<i class="fas fa-eye"></i> Visual'; State.editorMode = 'visual'; VisualBuilder.syncToVisual();
                    } else {
                        State.editorFileType = null; tBtn.style.display = 'none'; pBtn.style.display = 'none'; State.editorMode = 'code'; EditorEngine.showCodeUI();
                    }
                    EditorEngine.startAutoSave();
                    Nav.push('editor');
                } catch(e) { alert("Load Error."); } UI.hideLoading();
            },
            startAutoSave: () => {
                clearInterval(State.autoSaveInterval);
                State.autoSaveInterval = setInterval(() => {
                    if (State.editorMode === 'visual') VisualBuilder.syncToCode();
                    const current = aceEditor.getValue();
                    if (current !== State.originalCode) {
                        EditorEngine.save(true);
                    }
                }, 30000);
            },
            /* CUSTOM SEARCH FUNCTIONS */
            triggerSearch: () => {
                const overlay = document.getElementById('aceSearchOverlay');
                overlay.classList.toggle('show');
                if (overlay.classList.contains('show')) {
                    document.getElementById('aceSearchInput').focus();
                } else {
                    aceEditor.find(''); // clear highlights
                }
            },
            closeSearch: () => {
                document.getElementById('aceSearchOverlay').classList.remove('show');
                aceEditor.find('');
            },
            performSearch: (query, backwards = false) => {
                if (!query) return;
                aceEditor.find(query, {
                    backwards: backwards,
                    wrap: true,
                    caseSensitive: State.searchCaseSensitive,
                    wholeWord: false,
                    regExp: false,
                    preventScroll: false
                });
            },
            searchNext: () => {
                const query = document.getElementById('aceSearchInput').value;
                if (!query) return;
                if (State.searchCaseSensitive) {
                    // Re-find with same options
                    aceEditor.find(query, { backwards: false, wrap: true, caseSensitive: true });
                } else {
                    aceEditor.findNext();
                }
            },
            searchPrev: () => {
                const query = document.getElementById('aceSearchInput').value;
                if (!query) return;
                if (State.searchCaseSensitive) {
                    aceEditor.find(query, { backwards: true, wrap: true, caseSensitive: true });
                } else {
                    aceEditor.findPrevious();
                }
            },
            toggleCaseSensitive: () => {
                State.searchCaseSensitive = !State.searchCaseSensitive;
                const btn = document.getElementById('aceCaseBtn');
                btn.classList.toggle('active', State.searchCaseSensitive);
                // Re-run search with new setting
                const query = document.getElementById('aceSearchInput').value;
                if (query) {
                    EditorEngine.performSearch(query);
                }
            },
            /* END CUSTOM SEARCH */
            jumpToTop: () => { if(aceEditor) { aceEditor.navigateFileStart(); aceEditor.scrollToLine(0, true, true, ()=>{}); } },
            jumpToBottom: () => { if(aceEditor) { const ll = aceEditor.session.getLength(); aceEditor.navigateFileEnd(); aceEditor.scrollToLine(ll, true, true, ()=>{}); } },
            toggleMode: () => {
                const tBtn = document.getElementById('editorModeToggle'), pBtn = document.getElementById('livePreviewBtn');
                if (State.editorMode === 'code') {
                    if (!VisualBuilder.syncToVisual()) return;
                    State.editorMode = 'visual'; tBtn.innerHTML = '<i class="fas fa-code"></i> Code'; pBtn.style.display = 'block';
                } else {
                    VisualBuilder.syncToCode(); State.editorMode = 'code'; tBtn.innerHTML = '<i class="fas fa-eye"></i> Visual'; pBtn.style.display = 'none'; EditorEngine.showCodeUI();
                }
            },
            showCodeUI: () => { document.getElementById('visualEditorContainer').style.display = 'none'; document.getElementById('aceEditorContainer').style.display = 'block'; document.getElementById('searchBtn').style.display = 'block'; document.getElementById('jumpButtons').style.display = 'flex'; if(aceEditor) aceEditor.resize(); },
            showVisualUI: () => { document.getElementById('aceEditorContainer').style.display = 'none'; document.getElementById('visualEditorContainer').style.display = 'block'; document.getElementById('searchBtn').style.display = 'none'; document.getElementById('jumpButtons').style.display = 'none'; if (window.MathJax) setTimeout(() => MathJax.typesetPromise(), 200); },
            save: async (silent = false) => {
                if (State.editorMode === 'visual') VisualBuilder.syncToCode();
                const currentCode = aceEditor ? aceEditor.getValue() : '';
                if (currentCode === State.originalCode) { if (!silent) UI.showToast("No changes detected."); return; }
                if (!silent) UI.showLoading("Saving..."); else UI.showToast("Auto-saving...");
                const path = document.getElementById('editPath').value, sha = document.getElementById('editSha').value;
                try {
                    if(path.endsWith('.json')) JSON.parse(currentCode);
                    const res = await API.createOrUpdate(path, Utils.b64Encode(currentCode), `Edit: ${path}`, sha);
                    document.getElementById('editSha').value = res.content.sha; State.originalCode = currentCode;
                    if(State.reloadCourseOnSave) { State.activeCourse.data = JSON.parse(currentCode); State.activeCourse.sha = res.content.sha; CourseEngine.renderChapters(); }
                    if(path.toLowerCase()==='quotes.json') { State.quotesSha = res.content.sha; State.quotesData = JSON.parse(currentCode); }
                    if(!silent) UI.showToast("Changes Saved!");
                } catch(e) { if(!silent) alert("Save failed! Check JSON syntax."); else UI.showToast("Auto-save skipped: syntax error!", 'error'); } 
                if(!silent) UI.hideLoading();
            }
        };

        // Attach search input keydown
        document.getElementById('aceSearchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                EditorEngine.searchNext();
            }
        });

        // ==========================================
        // 9. VISUAL BUILDER (with reorder & duplicate)
        // ==========================================
        const VisualBuilder = {
            syncToVisual: () => {
                try {
                    const val = aceEditor ? aceEditor.getValue() : ''; State.visualData = val.trim() === "" ? (State.editorFileType === 'quiz' ? [] : {}) : JSON.parse(val);
                    if (State.editorFileType === 'quiz') VisualBuilder.buildQuiz(); else if (State.editorFileType === 'notes') VisualBuilder.buildNotes();
                    EditorEngine.showVisualUI(); return true;
                } catch(e) { alert("Syntax errors found. Fix in Code View first."); return false; }
            },
            syncToCode: () => {
                if (State.editorFileType === 'quiz') VisualBuilder.extractQuiz(); else if (State.editorFileType === 'notes') VisualBuilder.extractNotes();
                if(aceEditor) aceEditor.setValue(JSON.stringify(State.visualData, null, 2), -1);
            },
            liveMath: (inputId, prevId) => {
                const val = document.getElementById(inputId).value; const box = document.getElementById(prevId);
                if(!val.trim()) { box.innerHTML = '<span style="color:var(--text-muted);">Preview...</span>'; return; }
                box.innerHTML = val.replace(/\n/g, '<br>');
                clearTimeout(State.mathTimeout);
                State.mathTimeout = setTimeout(() => { if(window.MathJax) MathJax.typesetPromise([box]).catch(e => console.log(e)); }, 600);
            },
            buildQuiz: () => {
                const c = document.getElementById('visualContentArea'); c.innerHTML = `<h3 style="margin-bottom:20px;color:var(--primary);"><i class="fas fa-brain"></i> Quiz Builder</h3>`;
                if(!Array.isArray(State.visualData)) State.visualData = [];
                const sortContainer = document.createElement('div'); sortContainer.id = 'quizSortContainer';
                State.visualData.forEach((q, i) => {
                    sortContainer.innerHTML += `
                        <div class="visual-card" id="qCard_${i}">
                            <div class="flex justify-between items-center" style="margin-bottom:15px;"><span class="drag-handle"><i class="fas fa-grip-vertical"></i></span><h4>Q${i+1}</h4>
                                <div class="flex gap-2">
                                    <button class="v-dup-btn" onclick="VisualBuilder.duplicateQuizItem(${i})"><i class="fas fa-copy"></i></button>
                                    <button class="v-del-btn" onclick="VisualBuilder.deleteItem(${i})"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <div class="flex justify-between"><label class="v-label">Question</label><button class="v-img-btn" onclick="MediaEngine.openUploader('vq_${i}')"><i class="fas fa-image"></i></button></div>
                            <textarea class="v-textarea" id="vq_${i}" oninput="VisualBuilder.liveMath('vq_${i}','vqp_${i}')">${q.question||''}</textarea>
                            ${MediaEngine.renderInBlockImages(q.question, `vq_${i}`)}
                            <div class="v-preview-box" id="vqp_${i}">${(q.question||'...').replace(/\n/g,'<br>')}</div>
                            <div class="flex gap-2">
                                <div style="flex:1;"><label class="v-label">A</label><input class="v-input" id="vo_${i}_0" value="${q.options?.[0]||''}"></div>
                                <div style="flex:1;"><label class="v-label">B</label><input class="v-input" id="vo_${i}_1" value="${q.options?.[1]||''}"></div>
                                <div style="flex:1;"><label class="v-label">C</label><input class="v-input" id="vo_${i}_2" value="${q.options?.[2]||''}"></div>
                                <div style="flex:1;"><label class="v-label">D</label><input class="v-input" id="vo_${i}_3" value="${q.options?.[3]||''}"></div>
                            </div>
                            <label class="v-label">Correct</label><select class="v-select" id="vc_${i}">${['A','B','C','D'].map((a,idx)=>`<option value="${idx}" ${q.correctIndex===idx?'selected':''}>Option ${a}</option>`).join('')}</select>
                            <div class="flex justify-between"><label class="v-label">Explanation</label><button class="v-img-btn" onclick="MediaEngine.openUploader('ve_${i}')"><i class="fas fa-image"></i></button></div>
                            <textarea class="v-textarea" id="ve_${i}" oninput="VisualBuilder.liveMath('ve_${i}','vep_${i}')">${q.explanation||''}</textarea>
                            ${MediaEngine.renderInBlockImages(q.explanation, `ve_${i}`)}
                            <div class="v-preview-box" id="vep_${i}">${(q.explanation||'...').replace(/\n/g,'<br>')}</div>
                        </div>`;
                });
                c.appendChild(sortContainer);
                c.innerHTML += `<button class="btn btn-outline" style="width:100%;border-style:dashed;" onclick="VisualBuilder.addQuizItem()"><i class="fas fa-plus"></i> Add Question</button>`;
                new Sortable(sortContainer, { handle: '.drag-handle', animation: 150, onEnd: VisualBuilder.reorderQuiz });
                if(window.MathJax) setTimeout(() => MathJax.typesetPromise(), 200);
            },
            reorderQuiz: (evt) => {
                const oldIndex = evt.oldIndex, newIndex = evt.newIndex;
                if(oldIndex===newIndex) return;
                VisualBuilder.extractQuiz();
                const [moved] = State.visualData.splice(oldIndex,1);
                State.visualData.splice(newIndex,0,moved);
                VisualBuilder.buildQuiz();
            },
            extractQuiz: () => {
                let n = [];
                for (let i = 0; i < State.visualData.length; i++) {
                    if(!document.getElementById(`qCard_${i}`)) continue;
                    n.push({
                        question: document.getElementById(`vq_${i}`).value,
                        options: [0,1,2,3].map(j=>document.getElementById(`vo_${i}_${j}`).value),
                        correctIndex: parseInt(document.getElementById(`vc_${i}`).value),
                        explanation: document.getElementById(`ve_${i}`).value
                    });
                } State.visualData = n;
            },
            addQuizItem: () => { VisualBuilder.extractQuiz(); State.visualData.push({ question:"", options:["","","",""], correctIndex:0, explanation:"" }); VisualBuilder.buildQuiz(); },
            duplicateQuizItem: (idx) => { VisualBuilder.extractQuiz(); State.visualData.splice(idx+1,0,JSON.parse(JSON.stringify(State.visualData[idx]))); VisualBuilder.buildQuiz(); },
            buildNotes: () => {
                const c = document.getElementById('visualContentArea'); c.innerHTML = `<h3 style="margin-bottom:20px;color:var(--info);"><i class="fas fa-book-open"></i> Notes Builder</h3>`;
                if(!State.visualData) State.visualData = {}; if(!State.visualData.blocks) State.visualData.blocks = [];
                c.innerHTML += `
                    <div style="margin-bottom:25px;border-bottom:1px solid var(--border);padding-bottom:15px;">
                        <label class="v-label">Main Title</label><input class="v-input" id="vn_title" value="${State.visualData.title||''}">
                        <label class="v-label">Sub-Topic</label><input class="v-input" id="vn_topic" value="${State.visualData.topic||''}">
                    </div>`;
                const blocksContainer = document.createElement('div'); blocksContainer.id = 'notesSortContainer';
                State.visualData.blocks.forEach((b, i) => {
                    blocksContainer.innerHTML += `
                        <div class="visual-card" id="bCard_${i}">
                            <div class="flex justify-between items-center" style="margin-bottom:10px;">
                                <span class="drag-handle"><i class="fas fa-grip-vertical"></i></span>
                                <select class="v-select" id="bType_${i}" style="margin:0;width:150px;"><option value="h1" ${b.type==='h1'?'selected':''}>Heading 1</option><option value="h2" ${b.type==='h2'?'selected':''}>Heading 2</option><option value="paragraph" ${b.type==='paragraph'?'selected':''}>Paragraph</option><option value="callout" ${b.type==='callout'?'selected':''}>Callout Box</option></select>
                                <div class="flex gap-2">
                                    <button class="v-dup-btn" onclick="VisualBuilder.duplicateNoteBlock(${i})"><i class="fas fa-copy"></i></button>
                                    <button class="v-del-btn" onclick="VisualBuilder.deleteItem(${i})"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                            <div class="flex justify-between"><span style="font-size:0.8rem;">Block ${i+1}</span><button class="v-img-btn" onclick="MediaEngine.openUploader('bContent_${i}')"><i class="fas fa-image"></i></button></div>
                            <textarea class="v-textarea" id="bContent_${i}" oninput="VisualBuilder.liveMath('bContent_${i}','bContentp_${i}')">${b.content||''}</textarea>
                            ${MediaEngine.renderInBlockImages(b.content, `bContent_${i}`)}
                            <div class="v-preview-box" id="bContentp_${i}">${(b.content||'...').replace(/\n/g,'<br>')}</div>
                        </div>`;
                });
                c.appendChild(blocksContainer);
                c.innerHTML += `<button class="btn btn-outline" style="width:100%;border-style:dashed;" onclick="VisualBuilder.addNoteBlock()"><i class="fas fa-plus"></i> Add Block</button>`;
                new Sortable(blocksContainer, { handle: '.drag-handle', animation: 150, onEnd: VisualBuilder.reorderNotes });
                if(window.MathJax) setTimeout(() => MathJax.typesetPromise(), 200);
            },
            reorderNotes: (evt) => {
                const oldIndex = evt.oldIndex, newIndex = evt.newIndex;
                if(oldIndex===newIndex) return;
                VisualBuilder.extractNotes();
                const [moved] = State.visualData.blocks.splice(oldIndex,1);
                State.visualData.blocks.splice(newIndex,0,moved);
                VisualBuilder.buildNotes();
            },
            extractNotes: () => {
                let nb = [];
                for (let i = 0; i < State.visualData.blocks.length; i++) {
                    if(!document.getElementById(`bCard_${i}`)) continue;
                    nb.push({ type: document.getElementById(`bType_${i}`).value, content: document.getElementById(`bContent_${i}`).value });
                }
                State.visualData.title = document.getElementById('vn_title').value; State.visualData.topic = document.getElementById('vn_topic').value; State.visualData.blocks = nb;
            },
            addNoteBlock: () => { VisualBuilder.extractNotes(); State.visualData.blocks.push({ type:"paragraph", content:"" }); VisualBuilder.buildNotes(); },
            duplicateNoteBlock: (idx) => { VisualBuilder.extractNotes(); State.visualData.blocks.splice(idx+1,0,JSON.parse(JSON.stringify(State.visualData.blocks[idx]))); VisualBuilder.buildNotes(); },
            deleteItem: (idx) => {
                if(!confirm("Remove item?")) return;
                if (State.editorFileType === 'quiz') { VisualBuilder.extractQuiz(); State.visualData.splice(idx,1); VisualBuilder.buildQuiz(); } 
                else { VisualBuilder.extractNotes(); State.visualData.blocks.splice(idx,1); VisualBuilder.buildNotes(); }
            }
        };

        // ==========================================
        // 10. IN-BLOCK MEDIA ENGINE
        // ==========================================
        const MediaEngine = {
            renderInBlockImages: (text, targetId) => {
                if(!text) return ''; const matches = [...new Set(text.match(/img_\d+\.(?:jpg|jpeg|png|gif|svg)/gi) || [])];
                if(!matches.length) return '';
                let html = `<div class="inblock-media-row">`;
                matches.forEach(img => {
                    let url = `https://raw.githubusercontent.com/${State.gh.owner}/${State.gh.repo}/main/${img}?t=${Date.now()}`;
                    html += `
                        <div class="inblock-media-card">
                            <img src="${url}" class="inblock-media-img" loading="lazy">
                            <div class="flex gap-2">
                                <button class="btn btn-outline" style="padding:4px;flex:1;color:var(--info);" onclick="MediaEngine.openUploader('INBLOCK_SWAP:${targetId}:${img}')"><i class="fas fa-sync-alt"></i></button>
                                <button class="btn btn-danger" style="padding:4px;flex:1;" onclick="MediaEngine.deleteImage('${img}','${targetId}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                }); return html + `</div>`;
            },
            deleteImage: async (imgName, targetId) => {
                if(!confirm(`Delete image permanently?`)) return; UI.showLoading("Deleting Media...");
                try {
                    try { const fd = await API.request(imgName); await API.deleteFile(imgName, fd.sha, "Del Media"); } catch(e) {}
                    let tArea = document.getElementById(targetId); let v = tArea.value;
                    v = v.replace(new RegExp(`(?:<br>\\s*)?<img[^>]*src=["'][^"']*${imgName}[^"']*["'][^>]*>(?:\\s*<br>)?`, 'g'), '');
                    v = v.replace(new RegExp(imgName, 'g'), ''); tArea.value = v;
                    if(State.editorFileType==='quiz'){ VisualBuilder.extractQuiz(); VisualBuilder.buildQuiz(); } else { VisualBuilder.extractNotes(); VisualBuilder.buildNotes(); }
                    UI.showToast("Media Deleted!");
                } catch(e) { UI.showToast("Delete failed", 'error'); } UI.hideLoading();
            },
            openUploader: (targetId) => { document.getElementById('visualTargetId').value = targetId; document.getElementById('visualImgUploader').click(); }
        };

        document.getElementById('visualImgUploader').addEventListener('change', async (e) => {
            let f = e.target.files[0]; if (!f) return; UI.showLoading("Uploading Media...");
            let reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    let b64 = event.target.result.split(',')[1]; let ext = Utils.getExt(f.name); let nFile = `img_${Date.now()}.${ext}`;
                    await API.createOrUpdate(nFile, b64, `Upload media`);
                    let inst = document.getElementById('visualTargetId').value; let imgUrl = `https://raw.githubusercontent.com/${State.gh.owner}/${State.gh.repo}/main/${nFile}?t=${Date.now()}`;
                    if(inst.startsWith('INBLOCK_SWAP:')){
                        let p = inst.split(':'); let tId = p[1]; let oldImg = p[2];
                        try { const od = await API.request(oldImg); await API.deleteFile(oldImg, od.sha, "Del old"); } catch(err) {}
                        let ta = document.getElementById(tId); ta.value = ta.value.replace(new RegExp(oldImg+'(\\?t=\\d+)?','g'), nFile+`?t=${Date.now()}`);
                    } else { document.getElementById(inst).value += ` <br><img src="${imgUrl}" style="max-width:100%;border-radius:8px;"> <br>`; }
                    if(State.editorFileType==='quiz'){ VisualBuilder.extractQuiz(); VisualBuilder.buildQuiz(); } else { VisualBuilder.extractNotes(); VisualBuilder.buildNotes(); }
                    UI.showToast("Media Saved!");
                } catch(err) { UI.showToast("Media upload error", 'error'); } UI.hideLoading(); document.getElementById('visualImgUploader').value = ''; 
            }; reader.readAsDataURL(f);
        });

        // ==========================================
        // 11. INSTANT LIVE PREVIEW (Blob Injection)
        // ==========================================
        const PreviewEngine = {
            open: async () => {
                const path = document.getElementById('editPath').value;
                if (!path) return alert("No file selected.");
                UI.showLoading("Generating Instant Preview...");
                try {
                    if (State.editorMode === 'visual') VisualBuilder.syncToCode();
                    const currentJSON = aceEditor ? aceEditor.getValue() : JSON.stringify(State.visualData);
                    let viewerFile = State.editorFileType==='quiz'?'mcqs.html':'sbf.html';
                    const baseUrl = `https://${State.gh.owner}.github.io/${State.gh.repo}`;
                    const res = await fetch(`${baseUrl}/${viewerFile}?t=${Date.now()}`);
                    let html = await res.text();
                    const injection = `
                        <base href="${baseUrl}/">
                        <script>
                            window.PREVIEW_DATA = ${currentJSON};
                            window.PREVIEW_FILE = "${path}";
                            const originalFetch = window.fetch;
                            window.fetch = async function(url, options) {
                                if (typeof url === 'string' && url.includes(window.PREVIEW_FILE)) {
                                    return new Response(JSON.stringify(window.PREVIEW_DATA), {
                                        status: 200,
                                        headers: { 'Content-Type': 'application/json' }
                                    });
                                }
                                return originalFetch.apply(this, arguments);
                            };
                        <\/script>
                    `;
                    html = html.replace(/<head[^>]*>/i, '$&' + injection);
                    const blob = new Blob([html], { type: 'text/html' });
                    window.open(URL.createObjectURL(blob), '_blank');
                } catch(err) { alert("Preview generation failed."); } UI.hideLoading();
            }
        };

        window.onload = App.init;
    </script>
</body>
</html>
