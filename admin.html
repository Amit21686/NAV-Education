                            <textarea class="v-textarea" id="bContent_${i}" style="margin-bottom:5px;" oninput="VisualBuilder.liveMath('bContent_${i}', 'bContentp_${i}')">${b.content || ''}</textarea>
                            ${MediaEngine.renderInBlockImages(b.content, `bContent_${i}`)}
                            <div class="v-preview-box" id="bContentp_${i}">${b.content || '...'}</div>
                        </div>
                    `;
                });
                document.getElementById('blocksContainer').innerHTML = html;
                c.innerHTML += `<button class="btn btn-outline" style="width:100%; border-style:dashed;" onclick="VisualBuilder.addNoteBlock()"><i class="fas fa-plus"></i> Add Block</button>`;
                if(window.MathJax) setTimeout(() => MathJax.typesetPromise(), 200);
            },

            extractNotes: () => {
                let nb = [];
                for (let i = 0; i < State.visualData.blocks.length; i++) {
                    if(!document.getElementById(`bCard_${i}`)) continue;
                    let t = document.getElementById(`bType_${i}`).value;
                    let c = document.getElementById(`bContent_${i}`).value;
                    let obj = { type: t, content: c };
                    if (t === 'callout') { obj.style = "info"; obj.icon = "fas fa-info-circle"; }
                    nb.push(obj);
                }
                State.visualData.title = document.getElementById('vn_title').value;
                State.visualData.topic = document.getElementById('vn_topic').value;
                State.visualData.blocks = nb;
            },

            addNoteBlock: () => {
                VisualBuilder.extractNotes();
                State.visualData.blocks.push({ type: "paragraph", content: "" });
                VisualBuilder.buildNotes();
            },

            deleteItem: (idx) => {
                if(!confirm("Remove item?")) return;
                if (State.editorFileType === 'quiz') {
                    VisualBuilder.extractQuiz();
                    State.visualData.splice(idx, 1);
                    VisualBuilder.buildQuiz();
                } else {
                    VisualBuilder.extractNotes();
                    State.visualData.blocks.splice(idx, 1);
                    VisualBuilder.buildNotes();
                }
            }
        };

        // ==========================================
        // 9. IN-BLOCK MEDIA ENGINE
        // ==========================================
        const MediaEngine = {
            renderInBlockImages: (text, targetId) => {
                if(!text) return '';
                const matches = [...new Set(text.match(/img_\d+\.(?:jpg|jpeg|png|gif|svg)/gi) || [])];
                if(matches.length === 0) return '';
                
                let html = `<div class="inblock-media-row">`;
                matches.forEach(img => {
                    let url = `https://raw.githubusercontent.com/${State.gh.owner}/${State.gh.repo}/main/${img}?t=${Date.now()}`;
                    html += `
                        <div class="inblock-media-card">
                            <img src="${url}" class="inblock-media-img" loading="lazy">
                            <div class="flex gap-2">
                                <button class="btn btn-outline" style="padding:4px; flex:1; color:var(--info); border-color:var(--info);" onclick="MediaEngine.openUploader('INBLOCK_SWAP:${targetId}:${img}')"><i class="fas fa-sync-alt"></i></button>
                                <button class="btn btn-danger" style="padding:4px; flex:1; margin:0;" onclick="MediaEngine.deleteImage('${img}', '${targetId}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
                return html + `</div>`;
            },

            deleteImage: async (imgName, targetId) => {
                if(!confirm(`Delete image permanently from GitHub?`)) return;
                UI.showLoading("Deleting Media...");
                try {
                    try {
                        const fd = await API.request(imgName);
                        await API.deleteFile(imgName, fd.sha, "Del Media");
                    } catch(e) {}
                    
                    let tArea = document.getElementById(targetId);
                    let v = tArea.value;
                    v = v.replace(new RegExp(`(?:<br>\\s*)?<img[^>]*src=["'][^"']*${imgName}[^"']*["'][^>]*>(?:\\s*<br>)?`, 'g'), '');
                    v = v.replace(new RegExp(imgName, 'g'), ''); 
                    tArea.value = v;
                    
                    if(State.editorFileType === 'quiz') { VisualBuilder.extractQuiz(); VisualBuilder.buildQuiz(); }
                    else { VisualBuilder.extractNotes(); VisualBuilder.buildNotes(); }
                    
                    UI.showToast("Media Deleted!");
                } catch(e) {
                    alert("Failed to delete.");
                }
                UI.hideLoading();
            },

            openUploader: (targetId) => {
                document.getElementById('visualTargetId').value = targetId;
                document.getElementById('visualImgUploader').click();
            }
        };

        document.getElementById('visualImgUploader').addEventListener('change', async (e) => {
            let f = e.target.files[0]; if (!f) return;
            UI.showLoading("Uploading Media...");
            
            let reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    let b64 = event.target.result.split(',')[1];
                    let ext = Utils.getExt(f.name);
                    let nFile = `img_${Date.now()}.${ext}`;
                    
                    await API.createOrUpdate(nFile, b64, `Upload media`);
                    
                    let inst = document.getElementById('visualTargetId').value; 
                    let imgUrl = `https://raw.githubusercontent.com/${State.gh.owner}/${State.gh.repo}/main/${nFile}?t=${Date.now()}`;
                    
                    if(inst.startsWith('INBLOCK_SWAP:')) {
                        let p = inst.split(':');
                        let tId = p[1];
                        let oldImg = p[2];
                        
                        try {
                            const od = await API.request(oldImg);
                            await API.deleteFile(oldImg, od.sha, "Del old");
                        } catch(err) {}
                        
                        let ta = document.getElementById(tId);
                        ta.value = ta.value.replace(new RegExp(oldImg + '(\\?t=\\d+)?', 'g'), nFile + `?t=${Date.now()}`);
                    } else {
                        let ta = document.getElementById(inst);
                        ta.value += ` <br><img src="${imgUrl}" style="max-width:100%; border-radius:8px;"> <br>`;
                    }
                    
                    if(State.editorFileType === 'quiz') { VisualBuilder.extractQuiz(); VisualBuilder.buildQuiz(); }
                    else { VisualBuilder.extractNotes(); VisualBuilder.buildNotes(); }
                    
                    UI.showToast("Media Saved!");
                } catch(err) {
                    alert("Media upload error.");
                }
                UI.hideLoading();
                document.getElementById('visualImgUploader').value = ''; 
            };
            reader.readAsDataURL(f);
        });

        // ==========================================
        // 10. APP MOCKUP PREVIEW ENGINE
        // ==========================================
        const PreviewEngine = {
            open: () => {
                if (State.editorFileType === 'quiz') VisualBuilder.extractQuiz();
                else if (State.editorFileType === 'notes') VisualBuilder.extractNotes();
                
                const m = document.getElementById('livePreviewModal');
                const c = document.getElementById('mockupContentArea');
                let h = '';
                
                if (State.editorFileType === 'quiz') {
                    h += `<div class="text-center" style="color:var(--primary); margin-bottom:20px; font-weight:600;"><i class="fas fa-brain"></i> Quiz UI</div>`;
                    State.visualData.forEach((q, i) => {
                        h += `<div style="margin-bottom:30px;"><strong>Q${i+1}.</strong> <div style="margin-bottom:15px; font-size:1.1rem; font-weight:600;">${q.question || ''}</div>`;
                        ['A','B','C','D'].forEach((lbl, oIdx) => {
                            let ic = q.correctIndex === oIdx ? 'm-correct' : '';
                            let check = q.correctIndex === oIdx ? '<i class="fas fa-check-circle" style="float:right;"></i>' : '';
                            h += `<div class="m-option ${ic}"><strong>${lbl}.</strong> <div style="flex:1;">${q.options?.[oIdx]||''}</div> ${check}</div>`;
                        });
                        if(q.explanation) h += `<div class="m-callout" style="font-size:0.85rem;"><strong style="display:block; margin-bottom:5px;"><i class="fas fa-lightbulb"></i> Explanation</strong>${q.explanation}</div>`;
                        h += `</div><hr style="border-color:rgba(255,255,255,0.1); margin:20px 0;">`;
                    });
                } else if (State.editorFileType === 'notes') {
                    if(State.visualData.topic) h += `<div style="color:var(--primary); font-weight:700; text-transform:uppercase; font-size:0.8rem; margin-bottom:5px;">${State.visualData.topic}</div>`;
                    if(State.visualData.title) h += `<h1>${State.visualData.title}</h1>`;
                    (State.visualData.blocks || []).forEach(b => {
                        if (b.type === 'h1') h += `<h1>${b.content}</h1>`;
                        else if (b.type === 'h2') h += `<h2>${b.content}</h2>`;
                        else if (b.type === 'paragraph') h += `<p style="margin-bottom:15px;">${b.content}</p>`;
                        else if (b.type === 'callout') h += `<div class="m-callout"><strong><i class="fas fa-info-circle"></i> Info</strong><br>${b.content}</div>`;
                    });
                }
                
                c.innerHTML = h;
                Nav.push('preview'); 
                if(window.MathJax) MathJax.typesetPromise([c]).catch(e=>console.log(e));
            },
            close: () => {
                window.history.back();
            }
        };

        // BOOT THE APP
        window.onload = App.init;

    </script>
</body>
</html>
