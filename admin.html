<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NAV Admin | Education Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ext-searchbox.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'none' },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        /* ===== PREMIUM RESET & VARIABLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { 
            --primary: #6366f1; --primary-hover: #4f46e5; --bg: #020617; --card: #1e293b; 
            --text: #f8fafc; --text-muted: #94a3b8; --border: #334155; 
            --danger: #f43f5e; --success: #10b981; --info: #3b82f6; --warning: #f59e0b;
            --radius: 16px; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); 
            height: 100dvh; overflow: hidden; display: flex; flex-direction: column; 
            overscroll-behavior-y: none;
        }
        
        .flex { display: flex; } 
        .flex-col { display: flex; flex-direction: column; }
        .items-center { align-items: center; } 
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .gap-2 { gap: 10px; }
        
        .btn { 
            padding: 14px 18px; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; 
            transition: var(--transition); font-size: 0.95rem;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
        .btn-danger { background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); color: var(--danger); }
        .btn:active { transform: scale(0.95); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        
        .input-field { 
            width: 100%; padding: 14px 16px; margin-bottom: 15px; background: rgba(0,0,0,0.2); 
            border: 1.5px solid var(--border); color: white; border-radius: 12px; font-family: inherit; 
            font-size: 0.95rem; transition: border-color 0.3s ease;
        }
        .input-field:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.4); }

        #authScreen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 35px 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); animation: fadeUp 0.5s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .app-header { 
            background: rgba(30, 41, 59, 0.85); padding: 12px 16px; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 1px solid var(--border); z-index: 10; 
            flex-shrink: 0; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .header-title { font-weight: 600; font-size: 1.15rem; flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px; letter-spacing: 0.5px; }
        .header-icon { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; font-size: 1.1rem;
        }
        .header-icon:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        
        .view-container { 
            flex: 1; overflow-y: auto; padding: 20px 15px 120px 15px; display: none; 
            -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
        }
        .view-container.active { 
            display: block; animation: fadeIn 0.3s ease-out; opacity: 1; transform: none; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
        
        .list-item { 
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; 
            margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; 
            gap: 12px; border-left: 4px solid var(--border); transition: var(--transition); cursor: pointer;
        }
        .list-item:active { transform: scale(0.98); box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        .list-item-content { flex: 1; overflow: hidden; }
        .list-title { font-weight: 600; font-size: 1.05rem; display: flex; align-items: flex-start; gap: 12px; line-height: 1.4;}
        .list-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; display: flex; align-items: center; gap: 8px;}
        .list-actions { display: flex; gap: 8px; flex-shrink: 0; }
        
        .icon-action { 
            width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; color: var(--text); 
            border: 1px solid transparent; cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .icon-action:active { transform: scale(0.85); background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2); }
        
        .fab { 
            position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white; 
            display: flex; align-items: center; justify-content: center; font-size: 2rem; 
            box-shadow: 0 10px 25px rgba(99,102,241,0.5); border: none; cursor: pointer; z-index: 100; transition: var(--transition); 
        }
        .fab:active { transform: scale(0.85) translateY(5px); box-shadow: 0 5px 15px rgba(99,102,241,0.4); }

        .folder-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .folder-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 25px 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .folder-card:active { transform: scale(0.94); border-color: var(--primary); background: rgba(99,102,241,0.05); }
        .folder-icon { font-size: 2.8rem; margin-bottom: 12px; }

        .category-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab { padding: 8px 20px; background: var(--card); border: 1.5px solid var(--border); border-radius: 40px; font-size: 0.85rem; font-weight: 500; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .category-tab.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 4px 10px rgba(99,102,241,0.3); }

        #codeEditorView { display: none; flex-direction: column; height: 100dvh; width: 100vw; position: fixed; top: 0; left: 0; background: var(--bg); z-index: 500; padding-bottom: env(safe-area-inset-bottom); }
        #aceEditorContainer { flex: 1; width: 100%; position: relative; margin-bottom: 0; } 
        .jump-btn-wrapper { position: absolute; bottom: 20px; right: 16px; display: flex; flex-direction: column; gap: 12px; z-index: 510; }
        .jump-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); cursor: pointer; transition: 0.2s; }
        .jump-btn:active { transform: scale(0.85); background: var(--primary); color: white; border-color: var(--primary); }

        /* ---- CUSTOM SEARCH OVERLAY (Mobile Perfect) ---- */
        #aceSearchOverlay {
            position: absolute; top: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px); padding: 12px 16px; display: none; align-items: center; gap: 10px;
            z-index: 520; border-bottom: 1px solid var(--border); flex-wrap: wrap;
        }
        #aceSearchOverlay.show { display: flex; }
        #aceSearchInput {
            flex: 1; min-width: 120px; padding: 10px 14px; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            color: white; border-radius: 25px; font-family: inherit; font-size: 0.9rem;
        }
        #aceSearchInput:focus { outline: none; border-color: var(--primary); }
        .ace-search-btn {
            width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem;
        }
        .ace-search-btn:active { background: rgba(255,255,255,0.15); }
        .ace-search-case {
            padding: 6px 12px; border-radius: 20px; background: transparent; border: 1px solid var(--border); color: var(--text-muted);
            font-size: 0.8rem; cursor: pointer; white-space: nowrap;
        }
        .ace-search-case.active { background: var(--primary); border-color: var(--primary); color: white; }

        #visualEditorContainer { flex: 1; width: 100%; overflow-y: auto; padding: 20px; padding-bottom: 250px; display: none; background: var(--bg); -webkit-overflow-scrolling: touch;}
        .visual-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; }
        .v-label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        .v-textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1.5px solid var(--border); color: white; border-radius: 10px; font-family: inherit; font-size: 0.95rem; resize: vertical; min-height: 90px; margin-bottom: 10px; transition: 0.3s;}
        .v-textarea:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.4); }
        .v-input { width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.2); border: 1.5px solid var(--border); color: white; border-radius: 10px; font-family: inherit; margin-bottom: 10px; transition: 0.3s; }
        .v-input:focus { outline: none; border-color: var(--primary); }
        .v-select { width: 100%; padding: 12px; background: #0f172a; border: 1.5px solid var(--primary); color: white; border-radius: 10px; font-family: inherit; margin-bottom: 15px; font-weight: 600; outline: none; appearance: none; }
        
        .v-del-btn, .v-dup-btn, .v-img-btn { 
            padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text);
        }
        .v-del-btn { background: rgba(244,63,94,0.1); color: var(--danger); border-color: rgba(244,63,94,0.3); }
        .v-img-btn { background: rgba(59,130,246,0.1); color: var(--info); border-color: rgba(59,130,246,0.3); }
        .v-dup-btn { background: rgba(16,185,129,0.1); color: var(--success); border-color: rgba(16,185,129,0.3); }
        .v-del-btn:active, .v-dup-btn:active, .v-img-btn:active { transform: scale(0.9); }
        
        .v-preview-box { background: rgba(255,255,255,0.03); border: 1px dashed var(--primary); padding: 15px; border-radius: 10px; font-size: 0.95rem; color: white; min-height: 50px; margin-bottom: 15px; overflow-x: auto; line-height: 1.5; }
        .v-preview-box img { max-width: 100%; height: auto; border-radius: 8px; margin-top: 8px; }
        
        .inblock-media-row { display: flex; gap: 12px; overflow-x: auto; margin-bottom: 15px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; border: 1px dashed var(--border);}
        .inblock-media-card { background: var(--bg); border: 1px solid var(--border); padding: 6px; border-radius: 8px; min-width: 130px; max-width: 130px; text-align: center; }
        .inblock-media-img { width: 100%; height: 70px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; background: #000; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; animation: fadeModal 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes fadeModal { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal-card { background: var(--card); width: 100%; border-radius: 20px; padding: 25px; border: 1px solid var(--border); max-width: 400px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }

        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(8px); text-align: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%) translateY(100px); 
            background: rgba(30, 41, 59, 0.95); color: white; padding: 14px 28px; border-radius: 40px; 
            font-size: 0.95rem; font-weight: 500; border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10000; opacity: 0; 
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(10px); pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .status-badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        .badge-draft { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-published { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        
        .drag-handle { cursor: grab; margin-right: 8px; color: var(--text-muted); font-size: 1.2rem; }
        .sortable-ghost { opacity: 0.4; }
        .dropzone { 
            border: 2px dashed var(--border); border-radius: var(--radius); padding: 30px 20px; text-align: center; 
            margin-bottom: 20px; color: var(--text-muted); transition: 0.3s; cursor: pointer;
        }
        .dropzone.dragover { border-color: var(--primary); background: rgba(99,102,241,0.1); color: white; }
        .dropzone i { font-size: 2rem; margin-bottom: 10px; display: block; }
        .dropzone-mobile-text { display: none; }
        
        /* Mobile Specific Tweaks */
        @media (max-width: 600px) {
            .app-header { padding: 8px 12px; }
            .header-title { font-size: 1rem; }
            .btn { padding: 12px 14px; font-size: 0.9rem; }
            .folder-grid { grid-template-columns: 1fr; }
            .modal-card { margin: 0 10px; }
            .dropzone { padding: 20px 15px; }
            .dropzone i { font-size: 1.5rem; }
            .dropzone-mobile-text { display: block; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-box">
            <div style="font-size: 3.5rem; margin-bottom: 15px;">🛡️</div>
            <h2 style="margin-bottom: 25px;">Admin Login</h2>
            <input type="text" id="ghOwner" class="input-field" placeholder="GitHub Username">
            <input type="text" id="ghRepo" class="input-field" placeholder="Repository Name">
            <input type="password" id="ghToken" class="input-field" placeholder="Personal Access Token">
            <button class="btn btn-primary" style="width: 100%;" onclick="App.loginGH()">Connect Repository</button>
        </div>
    </div>

    <div id="loadingOverlay"><div class="spinner"></div><div id="loadingText" style="font-weight: 500; letter-spacing:0.5px;">Processing...</div></div>
    <div id="toastContainer" class="toast"></div>

    <header class="app-header">
        <div class="header-icon" id="backBtn" onclick="Nav.back()" style="visibility: hidden;"><i class="fas fa-arrow-left"></i></div>
        <div class="header-title" id="appTitle">NAV Education</div>
        <div class="header-icon" onclick="App.logoutGH()"><i class="fas fa-sign-out-alt"></i></div>
    </header>

    <div id="viewCourses" class="view-container active">
        <div class="flex gap-2" style="margin-bottom: 20px;">
            <div class="list-item flex-col items-center" style="flex: 1; padding: 15px; margin: 0; border-color: var(--success); background: rgba(16,185,129,0.05);" onclick="CourseEngine.editMasterCatalog()">
                <i class="fas fa-database" style="font-size: 1.5rem; color: var(--success); margin-bottom: 8px;"></i>
                <span style="font-size: 0.85rem; font-weight: 600; color: var(--success);">Catalog</span>
            </div>
            <div class="list-item flex-col items-center" style="flex: 1; padding: 15px; margin: 0; border-color: var(--warning); background: rgba(245,158,11,0.05);" onclick="Nav.push('quotes')">
                <i class="fas fa-bullhorn" style="font-size: 1.5rem; color: var(--warning); margin-bottom: 8px;"></i>
                <span style="font-size: 0.85rem; font-weight: 600; color: var(--warning);">Alerts</span>
            </div>
            <div class="list-item flex-col items-center" style="flex: 1; padding: 15px; margin: 0; border-color: var(--info); background: rgba(59,130,246,0.05);" onclick="Nav.push('filemanager')">
                <i class="fas fa-folder-tree" style="font-size: 1.5rem; color: var(--info); margin-bottom: 8px;"></i>
                <span style="font-size: 0.85rem; font-weight: 600; color: var(--info);">Files</span>
            </div>
        </div>
        <div id="courseList"></div>
        <button class="fab" onclick="UI.openModal('courseModal')"><i class="fas fa-plus"></i></button>
    </div>

    <div id="viewQuotes" class="view-container">
        <div class="list-item" style="border-color: var(--primary); background: rgba(99,102,241,0.05); justify-content: center; cursor: pointer; margin-bottom: 20px;" onclick="QuotesEngine.editCode()">
            <span style="color: var(--primary); font-weight: 600;"><i class="fas fa-code"></i> Edit Raw JSON</span>
        </div>
        <div class="category-tabs" style="margin-bottom: 15px;">
            <div class="category-tab active" id="tab_quotes_all" onclick="QuotesEngine.render('all')">All Entries</div>
            <div class="category-tab" id="tab_quotes_only" onclick="QuotesEngine.render('quotes')">Quotes</div>
            <div class="category-tab" id="tab_notices_only" onclick="QuotesEngine.render('notices')">Notices</div>
        </div>
        <div id="quotesList"></div>
        <button class="fab" onclick="QuotesEngine.openModal(-1)"><i class="fas fa-plus"></i></button>
    </div>

    <div id="viewChapters" class="view-container">
        <div class="list-item" style="border-color: var(--primary); background: rgba(99,102,241,0.05); justify-content: center; cursor: pointer; margin-bottom: 20px;" onclick="CourseEngine.editCourseCode()">
            <span style="color: var(--primary); font-weight: 600;"><i class="fas fa-code"></i> Edit Course JSON</span>
        </div>
        <div id="chapterList"></div>
        <button class="fab" onclick="UI.openModal('chapterModal')"><i class="fas fa-plus"></i></button>
    </div>

    <div id="viewContents" class="view-container">
        <div id="contentList"></div>
        <button class="fab" onclick="UI.openModal('contentModal')"><i class="fas fa-plus"></i></button>
    </div>

    <div id="viewFileManager" class="view-container">
        <div id="fileManagerList"></div>
    </div>

    <div id="codeEditorView">
        <div id="aceSearchOverlay">
            <input type="text" id="aceSearchInput" placeholder="Search code..." autocomplete="off">
            <button class="ace-search-btn" onclick="EditorEngine.searchNext()"><i class="fas fa-arrow-down"></i></button>
            <button class="ace-search-btn" onclick="EditorEngine.searchPrev()"><i class="fas fa-arrow-up"></i></button>
            <button class="ace-search-case" id="aceCaseBtn" onclick="EditorEngine.toggleCaseSensitive()">Aa</button>
            <button class="ace-search-btn" onclick="EditorEngine.closeSearch()"><i class="fas fa-times"></i></button>
        </div>

        <header class="app-header">
            <div class="header-icon" onclick="Nav.back()"><i class="fas fa-times"></i></div>
            <button id="editorModeToggle" class="btn btn-outline" style="color: #a5b4fc; border-color: var(--primary); padding: 6px 16px; font-size: 0.85rem; display:none;" onclick="EditorEngine.toggleMode()">
                <i class="fas fa-eye"></i> Visual
            </button>
            <button id="livePreviewBtn" class="btn btn-outline" style="color: var(--success); border-color: var(--success); padding: 6px 16px; font-size: 0.85rem; display:none;" onclick="PreviewEngine.open()">
                <i class="fas fa-mobile-alt"></i> Run
            </button>
            <div class="flex gap-2">
                <div class="header-icon" id="searchBtn" style="color: var(--info);" onclick="EditorEngine.triggerSearch()"><i class="fas fa-search"></i></div>
                <div class="header-icon" style="color: var(--success);" onclick="EditorEngine.save()"><i class="fas fa-save"></i></div>
            </div>
        </header>
        <div id="aceEditorContainer"></div>
        <div id="visualEditorContainer"><div id="visualContentArea"></div></div>
        <div class="jump-btn-wrapper" id="jumpButtons" style="display: none;">
            <div class="jump-btn" onclick="EditorEngine.jumpToTop()"><i class="fas fa-chevron-up"></i></div>
            <div class="jump-btn" onclick="EditorEngine.jumpToBottom()"><i class="fas fa-chevron-down"></i></div>
        </div>
    </div>

    <div class="modal-overlay" id="quoteModal" onclick="UI.closeModal('quoteModal')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 id="quoteModalTitle" style="margin-bottom: 18px;">Add Entry</h3>
            <label style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:6px; text-align:left;">Type:</label>
            <select id="quoteType" class="input-field" onchange="QuotesEngine.toggleStatusUI()">
                <option value="quote">Inspirational Quote</option>
                <option value="notice">System Notice / Alert</option>
            </select>
            <label style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:6px; text-align:left;">Text / Message:</label>
            <textarea id="quoteText" class="input-field" placeholder="Enter text here..." rows="4"></textarea>
            <label style="color:var(--text-muted); font-size:0.85rem; display:block; margin-bottom:6px; text-align:left;">Author / Tag:</label>
            <input type="text" id="quoteAuthor" class="input-field" placeholder="e.g. NAV Education">
            <div id="noticeStatusDiv" style="display:none; margin-bottom:18px; align-items:center; gap:10px;">
                <label style="color:var(--text-muted); font-size:0.85rem; min-width: 60px; text-align:left;">Status:</label>
                <select id="noticeStatus" class="input-field" style="margin:0;">
                    <option value="active">Active (Visible)</option>
                    <option value="inactive">Inactive (Hidden)</option>
                </select>
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 5px;" onclick="QuotesEngine.saveEntry()">Save Entry</button>
        </div>
    </div>

    <div class="modal-overlay" id="courseModal" onclick="UI.closeModal('courseModal')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 18px;">New Course</h3>
            <input type="text" id="newCourseTitle" class="input-field" placeholder="Course Title (e.g. Physics)">
            <input type="text" id="newCourseId" class="input-field" placeholder="Short ID (e.g. physics12)">
            <button class="btn btn-primary" style="width: 100%;" onclick="CourseEngine.createCourse()">Create Course</button>
        </div>
    </div>

    <div class="modal-overlay" id="chapterModal" onclick="UI.closeModal('chapterModal')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 18px;">New Chapter</h3>
            <input type="text" id="newChapTitle" class="input-field" placeholder="e.g. Chapter 1: Kinematics">
            <button class="btn btn-primary" style="width: 100%;" onclick="CourseEngine.createChapter()">Add Chapter</button>
        </div>
    </div>

    <div class="modal-overlay" id="contentModal" onclick="UI.closeModal('contentModal')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 18px;">Add Material</h3>
            <input type="text" id="newContentTitle" class="input-field" placeholder="Material Title">
            <select id="newContentType" class="input-field" onchange="UI.toggleContentUpload()">
                <option value="notes">Study Notes (.json)</option>
                <option value="quiz">MCQ Quiz (.json)</option>
                <option value="html">Custom Page (.html)</option>
                <option value="pdf">Handwritten Document (.pdf)</option>
            </select>
            <div id="pdfUploadDiv" style="display:none; margin-bottom: 18px;">
                <label style="font-size: 0.85rem; color: var(--text-muted); display:block; margin-bottom:6px; text-align:left;">Select PDF File</label>
                <input type="file" id="pdfFileInput" accept="application/pdf" class="input-field" style="padding: 10px;">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="CourseEngine.createContent()">Add to Chapter</button>
        </div>
    </div>

    <input type="hidden" id="editPath">
    <input type="hidden" id="editSha">
    <input type="hidden" id="reloadCourseFlag">
    
    <input type="file" id="sysFileUploader" multiple="multiple" style="display: none;">
    <input type="file" id="sysReplaceUploader" style="display: none;">
    <input type="hidden" id="sysReplacePath">
    <input type="hidden" id="sysReplaceSha">
    
    <input type="file" id="visualImgUploader" accept="image/*" style="display: none;">
    <input type="hidden" id="visualTargetId">

    <script>
        // ==========================================
        // 1. SECURE & SAFE UTF-8 ENCODING 
        // ==========================================
        const Utils = {
            b64Encode: (str) => { return btoa(unescape(encodeURIComponent(str))); },
            b64Decode: (str) => {
                let cleanStr = str.replace(/\s/g, '');
                try { return decodeURIComponent(escape(atob(cleanStr))); } 
                catch(e) {
                    try {
                        const binary = atob(cleanStr); const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        return new TextDecoder().decode(bytes);
                    } catch(err) { return atob(cleanStr); }
                }
            },
            getExt: (filename) => filename.split('.').pop().toLowerCase(),
            generateId: () => 'id_' + Math.random().toString(36).substr(2, 9)
        };

        // ==========================================
        // 2. STATE & ROBUST API MANAGER
        // ==========================================
        const State = {
            gh: { owner: '', repo: '', token: '' },
            repoFiles: [],
            activeCourse: { path: '', sha: '', data: null },
            activeChapIndex: -1,
            fmFolder: '',
            editorMode: 'code', editorFileType: null, visualData: null,
            mathTimeout: null, toastTimeout: null,
            originalCode: '', currentHash: '',
            quotesData: [], quotesSha: null, quotesFileName: 'Quotes.json', editQuoteIndex: -1,
            autoSaveInterval: null,
            searchCaseSensitive: false
        };

        const API = {
            request: async (endpoint, method = 'GET', body = null) => {
                let cleanEndpoint = endpoint ? '/' + endpoint.replace(/^\/+|\/+$/g, '') : '';
                let url = `https://api.github.com/repos/${State.gh.owner}/${State.gh.repo}/contents${cleanEndpoint}`;
                if (method === 'GET') url += `?t=${Date.now()}`;
                const opt = { 
                    method, headers: { 'Authorization': `Bearer ${State.gh.token}`, 'Accept': 'application/vnd.github.v3+json' } 
                };
                if (body) opt.body = JSON.stringify(body);
                const res = await fetch(url, opt);
                if (res.status === 404 && !cleanEndpoint && method === 'GET') return []; 
                if (res.status === 404 && method === 'GET') throw new Error("404");
                if (res.status === 401) throw new Error("Unauthorized");
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                if (method === 'DELETE') { try { return await res.json(); } catch(e) { return {}; } }
                return await res.json();
            },
            deleteFile: async (path, sha, msg) => { return await API.request(path, 'DELETE', { message: msg, sha: sha }); },
            createOrUpdate: async (path, content, msg, sha = null) => {
                let payload = { message: msg, content: content };
                if (sha) payload.sha = sha;
                return await API.request(path, 'PUT', payload);
            },
            verifyToken: async () => {
                try {
                    const res = await fetch('https://api.github.com/user', {
                        headers: { 'Authorization': `Bearer ${State.gh.token}` }
                    });
                    return res.ok;
                } catch(e) { return false; }
            }
        };

        // ==========================================
        // 3. UI CONTROLS 
        // ==========================================
        const UI = {
            showLoading: (msg) => { document.getElementById('loadingText').innerText = msg; document.getElementById('loadingOverlay').style.display = 'flex'; },
            hideLoading: () => { document.getElementById('loadingOverlay').style.display = 'none'; },
            showToast: (msg, type = 'success') => {
                const t = document.getElementById('toastContainer');
                clearTimeout(State.toastTimeout);
                const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
                const color = type === 'error' ? 'var(--danger)' : 'var(--success)';
                t.innerHTML = `<i class="fas ${icon}" style="color:${color};"></i> ${msg}`;
                t.classList.add('show');
                State.toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
            },
            switchView: (viewId, title, showBack) => {
                document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
                document.getElementById(viewId).classList.add('active');
                document.getElementById('appTitle').textContent = title;
                document.getElementById('backBtn').style.visibility = showBack ? 'visible' : 'hidden';
            },
            openModal: (id) => { document.getElementById(id).classList.add('active'); Nav.push('modal_' + id); },
            closeModal: (id) => { if (window.location.hash === '#modal_' + id) Nav.back(); else document.getElementById(id).classList.remove('active'); },
            toggleContentUpload: () => {
                document.getElementById('pdfUploadDiv').style.display = 
                    document.getElementById('newContentType').value === 'pdf' ? 'block' : 'none';
            }
        };

        // ==========================================
        // 4. SECURE HARDWARE ROUTER
        // ==========================================
        const Nav = {
            push: (hashId) => { if (window.location.hash !== '#' + hashId) { history.pushState(null, null, '#' + hashId); } Nav.handleRoute(); },
            back: () => { history.back(); },
            initRouter: () => {
                if(!window.location.hash || window.location.hash === '#') history.replaceState(null, null, '#home');
                window.addEventListener('popstate', Nav.handleRoute);
                Nav.handleRoute(); 
            },
            handleRoute: () => {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
                let newHash = window.location.hash.replace('#', '') || 'home';
                let oldHash = State.currentHash;
                State.currentHash = newHash;
                if (oldHash === 'editor' && newHash !== 'editor') EditorEngine.save(true);
                if (newHash !== 'editor') document.getElementById('codeEditorView').style.display = 'none';
                if (newHash.startsWith('modal_')) {
                    let modalId = newHash.replace('modal_', '');
                    document.getElementById(modalId)?.classList.add('active');
                    UI.hideLoading(); return;
                }
                switch(newHash) {
                    case 'home': UI.switchView('viewCourses', 'Courses', false); break;
                    case 'quotes': QuotesEngine.load(); break;
                    case 'chapters': State.activeCourse.data ? (CourseEngine.renderChapters(), UI.switchView('viewChapters', State.activeCourse.data.title, true)) : Nav.push('home'); break;
                    case 'contents': State.activeCourse.data?.chapters[State.activeChapIndex] ? (CourseEngine.renderContents(), UI.switchView('viewContents', State.activeCourse.data.chapters[State.activeChapIndex].title, true)) : Nav.push('home'); break;
                    case 'filemanager': FileManager.renderRoot(); break;
                    case 'editor': document.getElementById('codeEditorView').style.display = 'flex'; if(aceEditor) aceEditor.resize(); break;
                    default: if(newHash.startsWith('folder_')) FileManager.renderFolder(newHash.replace('folder_', ''));
                }
                UI.hideLoading();
            }
        };

        const App = {
            init: () => {
                EditorEngine.init();
                if (localStorage.getItem('ghToken')) {
                    State.gh.owner = localStorage.getItem('ghOwner'); State.gh.repo = localStorage.getItem('ghRepo'); State.gh.token = localStorage.getItem('ghToken');
                    document.getElementById('authScreen').style.display = 'none'; CourseEngine.loadAll().then(() => Nav.initRouter());
                } else { Nav.initRouter(); }
            },
            loginGH: async () => {
                State.gh.owner = document.getElementById('ghOwner').value.trim();
                State.gh.repo = document.getElementById('ghRepo').value.trim();
                State.gh.token = document.getElementById('ghToken').value.trim();
                if(!State.gh.token) return alert("Token Required!");
                UI.showLoading("Verifying token...");
                const valid = await API.verifyToken();
                UI.hideLoading();
                if (!valid) return alert("Invalid token or insufficient permissions. Please check your PAT.");
                localStorage.setItem('ghOwner', State.gh.owner); localStorage.setItem('ghRepo', State.gh.repo); localStorage.setItem('ghToken', State.gh.token);
                document.getElementById('authScreen').style.display = 'none'; CourseEngine.loadAll().then(() => Nav.initRouter());
            },
            logoutGH: () => { localStorage.clear(); window.location.reload(); }
        };

        // ==========================================
        // 5. QUOTES & NOTICES ENGINE
        // ==========================================
        const QuotesEngine = {
            load: async () => {
                UI.showLoading("Loading Alerts...");
                try {
                    const dirData = await API.request('');
                    let exactName = 'quotes.json';
                    let qFile = dirData.find(f => f.name.toLowerCase() === 'quotes.json');
                    if (qFile) {
                        exactName = qFile.name; State.quotesFileName = exactName;
                        const fileData = await API.request(exactName);
                        State.quotesData = JSON.parse(Utils.b64Decode(fileData.content));
                        State.quotesSha = fileData.sha;
                    } else {
                        State.quotesFileName = 'Quotes.json'; State.quotesData = []; State.quotesSha = null;
                    }
                } catch(e) { State.quotesData = []; State.quotesSha = null; }
                QuotesEngine.render('all');
                UI.switchView('viewQuotes', 'Alerts & Quotes', true);
                UI.hideLoading();
            },
            render: (filterStr) => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                document.getElementById(`tab_quotes_${filterStr}`).classList.add('active');
                const list = document.getElementById('quotesList'); list.innerHTML = '';
                if (!State.quotesData?.length) {
                    list.innerHTML = `<div class="text-center" style="padding:40px;color:var(--text-muted);">No entries found.</div>`; return;
                }
                let count = 0;
                State.quotesData.forEach((item, idx) => {
                    const isNotice = item.n === true, isActive = item.active !== false;
                    if ((filterStr === 'quotes' && isNotice) || (filterStr === 'notices' && !isNotice)) return;
                    count++;
                    let icon = isNotice ? 'fa-bullhorn' : 'fa-quote-left';
                    let color = isNotice ? 'var(--warning)' : 'var(--info)';
                    list.innerHTML += `
                        <div class="list-item" style="border-left-color:${color};opacity:${isActive?1:0.65}">
                            <div class="list-item-content">
                                <div class="list-title"><i class="fas ${icon}" style="color:${color};"></i> ${item.text}</div>
                                <div class="list-subtitle">${isNotice?'<span class="status-badge" style="background:var(--warning);color:#000;">Notice</span>':'<span class="status-badge" style="background:var(--info);">Quote</span>'} ${!isActive?'<span style="color:var(--danger);">[OFF]</span>':''} - ${item.author||'Unknown'}</div>
                            </div>
                            <div class="list-actions">
                                ${isNotice ? `<button class="icon-action" onclick="QuotesEngine.toggleNotice(${idx})"><i class="fas ${isActive?'fa-eye':'fa-eye-slash'}"></i></button>` : ''}
                                <button class="icon-action" onclick="QuotesEngine.openModal(${idx})"><i class="fas fa-edit"></i></button>
                                <button class="icon-action" style="color:var(--danger)" onclick="QuotesEngine.deleteEntry(${idx})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
                if(!count) list.innerHTML = `<div class="text-center" style="padding:40px;">No entries in this filter.</div>`;
            },
            toggleStatusUI: () => document.getElementById('noticeStatusDiv').style.display = document.getElementById('quoteType').value === 'notice' ? 'flex' : 'none',
            openModal: (idx) => {
                State.editQuoteIndex = idx;
                document.getElementById('quoteModalTitle').innerText = idx>=0 ? "Edit Entry" : "Add New Entry";
                if(idx>=0) {
                    const item = State.quotesData[idx];
                    document.getElementById('quoteType').value = item.n ? 'notice' : 'quote';
                    document.getElementById('quoteText').value = item.text||'';
                    document.getElementById('quoteAuthor').value = item.author||'';
                    document.getElementById('noticeStatus').value = item.active!==false ? 'active':'inactive';
                } else {
                    document.getElementById('quoteType').value = 'quote'; document.getElementById('quoteText').value = ''; document.getElementById('quoteAuthor').value = ''; document.getElementById('noticeStatus').value = 'active';
                }
                QuotesEngine.toggleStatusUI(); UI.openModal('quoteModal');
            },
            saveEntry: async () => {
                const type = document.getElementById('quoteType').value, text = document.getElementById('quoteText').value.trim(), author = document.getElementById('quoteAuthor').value.trim();
                if(!text) return alert("Text cannot be empty!");
                let newObj = { text, author };
                if(type === 'notice') { newObj.n = true; if(document.getElementById('noticeStatus').value==='inactive') newObj.active = false; }
                State.editQuoteIndex>=0 ? State.quotesData[State.editQuoteIndex]=newObj : State.quotesData.unshift(newObj);
                UI.closeModal('quoteModal'); await QuotesEngine.saveToGithub("Saved entry");
            },
            deleteEntry: async (idx) => { if(!confirm("Delete permanently?")) return; State.quotesData.splice(idx,1); await QuotesEngine.saveToGithub("Deleted entry"); },
            toggleNotice: async (idx) => {
                State.quotesData[idx].active = !(State.quotesData[idx].active!==false);
                QuotesEngine.render(document.querySelector('.category-tab.active').id.replace('tab_quotes_',''));
                await QuotesEngine.saveToGithub("Toggled notice");
            },
            saveToGithub: async (msg) => {
                UI.showLoading("Saving...");
                try {
                    const res = await API.createOrUpdate(State.quotesFileName, Utils.b64Encode(JSON.stringify(State.quotesData,null,2)), msg, State.quotesSha);
                    State.quotesSha = res.content.sha; State.repoFiles = await API.request('');
                    QuotesEngine.render(document.querySelector('.category-tab.active').id.replace('tab_quotes_',''));
                    UI.showToast("Saved!");
                } catch(e) { UI.showToast("Save failed", 'error'); } UI.hideLoading();
            },
            editCode: () => State.quotesFileName && State.quotesSha ? EditorEngine.open(State.quotesFileName, State.quotesSha, false) : alert("File doesn't exist yet.")
        };

        // ==========================================
        // 6. COURSE ENGINE (Enhanced with Drag & Drop)
        // ==========================================
        const CourseEngine = {
            loadAll: async () => {
                UI.showLoading("Loading Courses...");
                try {
                    State.repoFiles = await API.request('');
                    const list = document.getElementById('courseList'); list.innerHTML = '';
                    let found = false;
                    if(Array.isArray(State.repoFiles)) {
                        State.repoFiles.forEach(f => {
                            const lowerName = f.name.toLowerCase();
                            const isCore = ['library.json','package.json','quotes.json'].includes(lowerName);
                            if(f.type==='file' && lowerName.endsWith('.json') && !lowerName.match(/[nq]\d+\.\d+\.json/) && !isCore) {
                                found = true;
                                list.innerHTML += `
                                    <div class="list-item">
                                        <div class="list-item-content" onclick="CourseEngine.openCourse('${f.path}','${f.sha}')">
                                            <div class="list-title"><i class="fas fa-book" style="color:var(--primary);"></i> ${f.name}</div>
                                            <div class="list-subtitle">Tap to view chapters</div>
                                        </div>
                                        <div class="list-actions">
                                            <button class="icon-action" onclick="CourseEngine.deleteCourse('${f.path}','${f.sha}', event)"><i class="fas fa-trash" style="color:var(--danger);"></i></button>
                                        </div>
                                    </div>`;
                            }
                        });
                    }
                    if(!found) list.innerHTML = `<div class="text-center" style="padding:40px;">No courses found.</div>`;
                } catch(e) { UI.showToast(e.message.includes('401')?'Invalid token':'Network error', 'error'); } UI.hideLoading();
            },
            createCourse: async () => {
                const title = document.getElementById('newCourseTitle').value.trim(), id = document.getElementById('newCourseId').value.trim().toLowerCase().replace(/\s+/g,'');
                if(!title||!id) return alert("Fields required!");
                UI.showLoading("Creating Course...");
                try {
                    const courseJSON = { title, description:"Learn concepts.", chapters:[] };
                    await API.createOrUpdate(`${id}.json`, Utils.b64Encode(JSON.stringify(courseJSON,null,2)), `Created course ${title}`);
                    try {
                        let libObj = { courses:[] }, libSha = null;
                        let existing = State.repoFiles.find(f=>f.name==='library.json');
                        if(existing) { const libData = await API.request('library.json'); libObj = JSON.parse(Utils.b64Decode(libData.content)); libSha = libData.sha; }
                        libObj.courses.push({ id, title, category:"general", icon:"📚", badge:"New" });
                        await API.createOrUpdate('library.json', Utils.b64Encode(JSON.stringify(libObj,null,2)), `Added ${id}`, libSha);
                    } catch(e){}
                    document.getElementById('newCourseTitle').value = document.getElementById('newCourseId').value = '';
                    Nav.back(); CourseEngine.loadAll(); UI.showToast("Course Created!");
                } catch(e) { UI.showToast("Error creating course", 'error'); } UI.hideLoading();
            },
            deleteCourse: async (path, sha, event) => {
                event.stopPropagation();
                if(!confirm(`Delete '${path}' and all its contents?`)) return;
                UI.showLoading("Deleting...");
                try {
                    const cDataRaw = await API.request(path);
                    const cData = JSON.parse(Utils.b64Decode(cDataRaw.content));
                    if(cData.chapters) for(let chap of cData.chapters) if(chap.contents) for(let item of chap.contents) {
                        let tFile = State.repoFiles.find(f=>f.name===item.file);
                        if(tFile) await API.deleteFile(item.file, tFile.sha, `Cascading delete`).catch(()=>{});
                    }
                    await API.deleteFile(path, sha, `Deleted course ${path}`);
                    try {
                        let existing = State.repoFiles.find(f=>f.name==='library.json');
                        if(existing) {
                            const libData = await API.request('library.json');
                            let libObj = JSON.parse(Utils.b64Decode(libData.content));
                            libObj.courses = libObj.courses.filter(c=>c.id!==path.split('.')[0]);
                            await API.createOrUpdate('library.json', Utils.b64Encode(JSON.stringify(libObj,null,2)), `Removed ${path}`, libData.sha);
                        }
                    } catch(e){}
                    CourseEngine.loadAll(); UI.showToast("Course Deleted!");
                } catch(e) { UI.showToast("Delete failed", 'error'); } UI.hideLoading();
            },
            openCourse: async (path, sha) => {
                UI.showLoading("Opening Course...");
                try {
                    const file = await API.request(path);
                    State.activeCourse.data = JSON.parse(Utils.b64Decode(file.content));
                    State.activeCourse.path = path; State.activeCourse.sha = file.sha;
                    Nav.push('chapters');
                } catch(e) { alert("Failed to parse course JSON."); } UI.hideLoading();
            },
            editCourseCode: () => EditorEngine.open(State.activeCourse.path, State.activeCourse.sha, true),
            editMasterCatalog: async () => {
                try {
                    const fileData = await API.request('library.json');
                    EditorEngine.open('library.json', fileData.sha, false);
                } catch(e) {
                    if(confirm("library.json not found. Create it?")) {
                        const res = await API.createOrUpdate('library.json', Utils.b64Encode(JSON.stringify({courses:[]},null,2)), "Init library");
                        EditorEngine.open('library.json', res.content.sha, false);
                    }
                }
            },
            renderChapters: () => {
                const list = document.getElementById('chapterList'); list.innerHTML = '';
                if(!State.activeCourse.data.chapters?.length) { list.innerHTML = `<div class="text-center" style="padding:30px;">No chapters added.</div>`; return; }
                State.activeCourse.data.chapters.forEach((chap, idx) => {
                    list.innerHTML += `
                        <div class="list-item" data-index="${idx}">
                            <span class="drag-handle"><i class="fas fa-grip-vertical"></i></span>
                            <div class="list-item-content" onclick="CourseEngine.openChapter(${idx})">
                                <div class="list-title"><i class="fas fa-folder-open"></i> ${chap.title}</div>
                                <div class="list-subtitle">${chap.contents?.length||0} Items</div>
                            </div>
                        </div>`;
                });
                new Sortable(list, { handle: '.drag-handle', animation: 150, onEnd: CourseEngine.reorderChapters });
            },
            reorderChapters: async (evt) => {
                const oldIndex = evt.oldIndex, newIndex = evt.newIndex;
                if(oldIndex === newIndex) return;
                const chapters = State.activeCourse.data.chapters;
                const [moved] = chapters.splice(oldIndex, 1);
                chapters.splice(newIndex, 0, moved);
                await CourseEngine.saveCourseJSON("Reordered chapters");
            },
            createChapter: async () => {
                const title = document.getElementById('newChapTitle').value.trim();
                if(!title) return;
                if(!State.activeCourse.data.chapters) State.activeCourse.data.chapters = [];
                State.activeCourse.data.chapters.push({ title, contents:[] });
                UI.showLoading("Saving...");
                try {
                    const res = await API.createOrUpdate(State.activeCourse.path, Utils.b64Encode(JSON.stringify(State.activeCourse.data,null,2)), `Added ${title}`, State.activeCourse.sha);
                    State.activeCourse.sha = res.content.sha;
                    document.getElementById('newChapTitle').value = ''; Nav.back(); CourseEngine.renderChapters(); UI.showToast("Chapter Added!");
                } catch(e) { UI.showToast("Save failed", 'error'); } UI.hideLoading();
            },
            openChapter: (index) => { State.activeChapIndex = index; Nav.push('contents'); },
            renderContents: () => {
                const list = document.getElementById('contentList'); list.innerHTML = '';
                const chap = State.activeCourse.data.chapters[State.activeChapIndex];
                if(!chap.contents?.length) { list.innerHTML = `<div class="text-center" style="padding:30px;">Empty chapter.</div>`; return; }
                chap.contents.forEach((item, itemIdx) => {
                    let icon = item.type==='quiz'?'fa-brain':item.type==='pdf'?'fa-file-pdf':item.type==='html'?'fa-html5':'fa-file-alt';
                    let color = item.type==='quiz'?'var(--success)':item.type==='pdf'?'var(--danger)':item.type==='html'?'#e34f26':'var(--primary)';
                    let isEditable = item.type!=='pdf';
                    let isPub = item.status==='published';
                    let pubIcon = isPub?'fa-eye-slash':'fa-upload';
                    let viewLink = `window.open('https://${State.gh.owner}.github.io/${State.gh.repo}/${item.file}','_blank')`;
                    let clickAction = isEditable ? `EditorEngine.open('${item.file}','')` : viewLink;
                    list.innerHTML += `
                        <div class="list-item" style="border-left:4px solid ${isPub?'var(--success)':'var(--warning)'};" data-index="${itemIdx}">
                            <span class="drag-handle"><i class="fas fa-grip-vertical"></i></span>
                            <div class="list-item-content" onclick="${clickAction}">
                                <div class="list-title"><i class="fas ${icon}" style="color:${color};"></i> ${item.title}</div>
                                <div class="list-subtitle">${isPub?'<span class="status-badge badge-published">Published</span>':'<span class="status-badge badge-draft">Draft</span>'} • ${item.file}</div>
                            </div>
                            <div class="list-actions">
                                <button class="icon-action" onclick="CourseEngine.togglePublish(${itemIdx})"><i class="fas ${pubIcon}"></i></button>
                                ${isEditable?`<button class="icon-action" onclick="${clickAction}"><i class="fas fa-edit"></i></button>`:`<button class="icon-action" onclick="${viewLink}"><i class="fas fa-eye"></i></button>`}
                                <button class="icon-action" onclick="FileManager.triggerReplaceViaFetch('${item.file}')"><i class="fas fa-sync-alt"></i></button>
                                <button class="icon-action" style="color:var(--danger);" onclick="CourseEngine.deleteContent(${itemIdx},'${item.file}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
                new Sortable(list, { handle: '.drag-handle', animation: 150, onEnd: CourseEngine.reorderContents });
            },
            reorderContents: async (evt) => {
                const oldIndex = evt.oldIndex, newIndex = evt.newIndex;
                if(oldIndex===newIndex) return;
                const contents = State.activeCourse.data.chapters[State.activeChapIndex].contents;
                const [moved] = contents.splice(oldIndex,1);
                contents.splice(newIndex,0,moved);
                await CourseEngine.saveCourseJSON("Reordered contents");
            },
            saveCourseJSON: async (msg) => {
                UI.showLoading("Saving order...");
                try {
                    const res = await API.createOrUpdate(State.activeCourse.path, Utils.b64Encode(JSON.stringify(State.activeCourse.data,null,2)), msg, State.activeCourse.sha);
                    State.activeCourse.sha = res.content.sha;
                    UI.showToast("Order updated!");
                } catch(e) { UI.showToast("Reorder save failed", 'error'); } UI.hideLoading();
            },
            createContent: async () => {
                const title = document.getElementById('newContentTitle').value.trim(), type = document.getElementById('newContentType').value;
                if(!title) return alert("Title required!");
                const prefix = State.activeCourse.path.split('.')[0], chapNum = State.activeChapIndex+1;
                const contentsArr = State.activeCourse.data.chapters[State.activeChapIndex].contents || [];
                const itemNum = contentsArr.length+1;
                if(type==='pdf') {
                    const pdfFile = document.getElementById('pdfFileInput').files[0];
                    if(!pdfFile) return alert("Select PDF!");
                    UI.showLoading("Uploading PDF...");
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        let base64 = e.target.result.includes(',')?e.target.result.split(',')[1]:e.target.result;
                        const fname = `${prefix}p${chapNum}.${itemNum}.pdf`;
                        try {
                            await API.createOrUpdate(fname, base64, `Uploaded PDF`);
                            contentsArr.push({ title, file:fname, type, status:'draft' });
                            State.activeCourse.data.chapters[State.activeChapIndex].contents = contentsArr;
                            const res = await API.createOrUpdate(State.activeCourse.path, Utils.b64Encode(JSON.stringify(State.activeCourse.data,null,2)), `Linked ${fname}`, State.activeCourse.sha);
                            State.activeCourse.sha = res.content.sha;
                            document.getElementById('newContentTitle').value = ''; document.getElementById('pdfFileInput').value = '';
                            Nav.back(); State.repoFiles = await API.request(''); CourseEngine.renderContents(); UI.showToast("PDF Uploaded!");
                        } catch(err) { UI.showToast("Upload failed", 'error'); } UI.hideLoading();
                    }; reader.readAsDataURL(pdfFile); return;
                }
                UI.showLoading("Generating File...");
                try {
                    let typeChar = type==='quiz'?'q':(type==='html'?'h':'n');
                    let ext = type==='html'?'.html':'.json';
                    let fileJSON = type==='quiz'?'[]':type==='html'?`<!DOCTYPE html>\n<html>\n<head><title>${title}</title></head>\n<body><h1>${title}</h1></body>\n</html>`:JSON.stringify({title,topic:State.activeCourse.data.chapters[State.activeChapIndex].title,blocks:[]},null,2);
                    const filename = `${prefix}${typeChar}${chapNum}.${itemNum}${ext}`;
                    await API.createOrUpdate(filename, Utils.b64Encode(fileJSON), `Created ${title}`);
                    contentsArr.push({ title, file:filename, type, status:'draft' });
                    State.activeCourse.data.chapters[State.activeChapIndex].contents = contentsArr;
                    const res = await API.createOrUpdate(State.activeCourse.path, Utils.b64Encode(JSON.stringify(State.activeCourse.data,null,2)), `Linked ${filename}`, State.activeCourse.sha);
                    State.activeCourse.sha = res.content.sha;
                    document.getElementById('newContentTitle').value = ''; Nav.back(); State.repoFiles = await API.request(''); CourseEngine.renderContents(); UI.showToast("Content Created as Draft!");
                } catch(e) { UI.showToast("Creation failed", 'error'); } UI.hideLoading();
            },
            togglePublish: async (idx) => {
                const item = State.activeCourse.data.chapters[State.activeChapIndex].contents[idx];
                item.status = item.status==='published'?'draft':'published';
                UI.showLoading(item.status==='published'?"Publishing...":"Moving to Drafts...");
                try {
                    const res = await API.createOrUpdate(State.activeCourse.path, Utils.b64Encode(JSON.stringify(State.activeCourse.data,null,2)), `Status update`, State.activeCourse.sha);
                    State.activeCourse.sha = res.content.sha;
                    UI.showToast(item.status==='published'?"Published Live!":"Moved to Drafts!"); CourseEngine.renderContents();
                } catch(e) { item.status = item.status==='published'?'draft':'published'; UI.showToast("Status update failed", 'error'); } UI.hideLoading();
            },
            deleteContent: async (idx, filename) => {
                if(!confirm(`Delete '${filename}'?`)) return;
                UI.showLoading("Removing...");
                try {
                    State.activeCourse.data.chapters[State.activeChapIndex].contents.splice(idx,1);
                    const res = await API.createOrUpdate(State.activeCourse.path, Utils.b64Encode(JSON.stringify(State.activeCourse.data,null,2)), `Unlinked ${filename}`, State.activeCourse.sha);
                    State.activeCourse.sha = res.content.sha;
                    try {
                        let tFile = State.repoFiles.find(f=>f.name===filename);
                        if(tFile) await API.deleteFile(filename, tFile.sha, "Del file");
                        else { const d = await API.request(filename); await API.deleteFile(filename, d.sha, "Del"); }
                    } catch(e){}
                    State.repoFiles = await API.request(''); CourseEngine.renderContents(); UI.showToast("Deleted!");
                } catch(e) { UI.showToast("Delete failed", 'error'); } UI.hideLoading();
            }
        };

        // ==========================================
        // 7. FILE MANAGER (with Drop & Click Upload)
        // ==========================================
        const FileManager = {
            renderRoot: () => {
                State.fmFolder = '';
                const list = document.getElementById('fileManagerList');
                list.innerHTML = `
                    <div class="dropzone" id="fmDropzone"><i class="fas fa-cloud-upload-alt"></i><span>Drop files here</span><span class="dropzone-mobile-text"> or tap to upload</span></div>
                    <div class="folder-grid">
                        <div class="folder-card" onclick="Nav.push('folder_images')"><div class="folder-icon" style="color:#10b981;"><i class="fas fa-images"></i></div><div>Images</div></div>
                        <div class="folder-card" onclick="Nav.push('folder_pdfs')"><div class="folder-icon" style="color:#f43f5e;"><i class="fas fa-file-pdf"></i></div><div>PDFs</div></div>
                        <div class="folder-card" onclick="Nav.push('folder_quizzes')"><div class="folder-icon" style="color:var(--success);"><i class="fas fa-brain"></i></div><div>Quizzes</div></div>
                        <div class="folder-card" onclick="Nav.push('folder_notes')"><div class="folder-icon" style="color:var(--primary);"><i class="fas fa-book-open"></i></div><div>Notes</div></div>
                        <div class="folder-card" style="grid-column:span 2;" onclick="Nav.push('folder_system')"><div class="folder-icon" style="color:var(--info);"><i class="fas fa-cogs"></i></div><div>Core System Files</div></div>
                    </div>`;
                UI.switchView('viewFileManager', 'File Manager', true);
                FileManager.initDropzone('');
            },
            renderFolder: (category) => {
                State.fmFolder = category;
                const list = document.getElementById('fileManagerList');
                let html = `
                    <div class="dropzone" id="fmDropzone"><i class="fas fa-cloud-upload-alt"></i><span>Drop files here</span><span class="dropzone-mobile-text"> or tap to upload</span></div>
                    <div class="flex gap-2" style="margin-bottom:15px;">
                        <button class="btn btn-outline" style="flex:1;" onclick="document.getElementById('sysFileUploader').click()"><i class="fas fa-upload"></i> Upload</button>
                        <button class="btn btn-outline" style="flex:1;" onclick="FileManager.createFile()"><i class="fas fa-file-medical"></i> New File</button>
                    </div>
                    <input type="text" id="fmSearch" class="input-field" placeholder="Search files in this folder..." oninput="FileManager.filterFiles('${category}')" style="margin-bottom:15px;">
                `;
                let filtered = [];
                switch(category) {
                    case 'images': filtered = State.repoFiles.filter(f=>f.name.match(/\.(jpg|jpeg|png|gif|svg|webp)$/i)); break;
                    case 'pdfs': filtered = State.repoFiles.filter(f=>f.name.match(/\.pdf$/i)); break;
                    case 'quizzes': filtered = State.repoFiles.filter(f=>f.name.match(/q\d+\.\d+\.json$/i)||f.name.toLowerCase().includes('quiz')); break;
                    case 'notes': filtered = State.repoFiles.filter(f=>f.name.match(/n\d+\.\d+\.json$/i)||f.name.toLowerCase().includes('note')); break;
                    case 'system': filtered = State.repoFiles.filter(f=>!f.name.match(/\.(jpg|jpeg|png|gif|svg|webp|pdf)$/i)&&!f.name.match(/[nq]\d+\.\d+\.json$/i)&&f.name.toLowerCase()!=='quotes.json'); break;
                }
                html += `<div id="fmFileList">${FileManager.buildFileList(filtered)}</div>`;
                list.innerHTML = html; UI.switchView('viewFileManager', 'Folder: '+category, true);
                FileManager.initDropzone(category);
            },
            buildFileList: (files) => {
                if(!files.length) return `<div class="text-center" style="padding:20px;">No files found.</div>`;
                return files.map(f=>{
                    let ext = Utils.getExt(f.name), icon='fa-file-code', color='var(--text-muted)';
                    if(ext==='html'){icon='fa-html5';color='#e34f26';}else if(ext==='css'){icon='fa-css3-alt';color='#264de4';}else if(ext==='js'){icon='fa-js-square';color='#f7df1e';}else if(ext==='json'){icon='fa-database';color='var(--primary)';}else if(ext==='pdf'){icon='fa-file-pdf';color='#f43f5e';}else if(['jpg','jpeg','png','gif','svg','webp'].includes(ext)){icon='fa-image';color='#10b981';}
                    let isEditable = ['html','css','js','json'].includes(ext);
                    let editAction = `EditorEngine.open('${f.path}','${f.sha}')`, viewRaw=`window.open('https://raw.githubusercontent.com/${State.gh.owner}/${State.gh.repo}/main/${f.path}','_blank')`, viewLive=`window.open('https://${State.gh.owner}.github.io/${State.gh.repo}/${f.path}','_blank')`;
                    let primaryAction = isEditable?editAction:(['html','pdf'].includes(ext)?viewLive:viewRaw);
                    return `<div class="list-item">
                        <div class="list-item-content" onclick="${primaryAction}"><div class="list-title"><i class="fas ${icon}" style="color:${color};"></i> ${f.name}</div><div class="list-subtitle">${(f.size/1024).toFixed(1)} KB</div></div>
                        <div class="list-actions">
                            ${isEditable?`<button class="icon-action" onclick="${editAction}"><i class="fas fa-edit"></i></button>`:`<button class="icon-action" onclick="${['html','pdf'].includes(ext)?viewLive:viewRaw}"><i class="fas fa-eye"></i></button>`}
                            <button class="icon-action" onclick="FileManager.triggerReplace('${f.path}','${f.sha}')"><i class="fas fa-sync-alt"></i></button>
                            <button class="icon-action" onclick="FileManager.renameFilePrompt('${f.path}','${f.sha}')"><i class="fas fa-i-cursor"></i></button>
                            <button class="icon-action" onclick="FileManager.duplicateFile('${f.path}','${f.sha}')"><i class="fas fa-copy"></i></button>
                            <button class="icon-action" style="color:var(--danger);" onclick="FileManager.deleteFile('${f.path}','${f.sha}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                }).join('');
            },
            filterFiles: (category) => {
                const query = document.getElementById('fmSearch').value.toLowerCase();
                let allFiles = [];
                switch(category) {
                    case 'images': allFiles = State.repoFiles.filter(f=>f.name.match(/\.(jpg|jpeg|png|gif|svg|webp)$/i)); break;
                    case 'pdfs': allFiles = State.repoFiles.filter(f=>f.name.match(/\.pdf$/i)); break;
                    case 'quizzes': allFiles = State.repoFiles.filter(f=>f.name.match(/q\d+\.\d+\.json$/i)||f.name.toLowerCase().includes('quiz')); break;
                    case 'notes': allFiles = State.repoFiles.filter(f=>f.name.match(/n\d+\.\d+\.json$/i)||f.name.toLowerCase().includes('note')); break;
                    case 'system': allFiles = State.repoFiles.filter(f=>!f.name.match(/\.(jpg|jpeg|png|gif|svg|webp|pdf)$/i)&&!f.name.match(/[nq]\d+\.\d+\.json$/i)&&f.name.toLowerCase()!=='quotes.json'); break;
                }
                const filtered = query ? allFiles.filter(f=>f.name.toLowerCase().includes(query)) : allFiles;
                document.getElementById('fmFileList').innerHTML = FileManager.buildFileList(filtered);
            },
            initDropzone: (category) => {
                const dropzone = document.getElementById('fmDropzone');
                if(!dropzone) return;
                // Click to upload
                dropzone.onclick = () => document.getElementById('sysFileUploader').click();
                // Drag events
                dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
                dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
                dropzone.addEventListener('drop', async e => {
                    e.preventDefault(); dropzone.classList.remove('dragover');
                    const files = e.dataTransfer.files;
                    if(!files.length) return;
                    await FileManager.uploadFiles(files, category);
                });
            },
            uploadFiles: async (files, category) => {
                UI.showLoading(`Uploading ${files.length} file(s)...`);
                let success = 0;
                for(let file of files) {
                    let name = file.name.replace(/\s+/g,'_');
                    try {
                        const base64 = await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onload = ev => { let res = ev.target.result; resolve(res.includes(',')?res.split(',')[1]:res); };
                            reader.onerror = reject; reader.readAsDataURL(file);
                        });
                        let sha = null;
                        let existing = State.repoFiles.find(f=>f.name===name);
                        if(existing) { if(!confirm(`File '${name}' exists. Overwrite?`)) continue; sha = existing.sha; }
                        await API.createOrUpdate(name, base64, `Uploaded ${name}`, sha); success++;
                    } catch(e) { console.error("Upload failed:", name); }
                }
                if(success>0) {
                    State.repoFiles = await API.request('');
                    if(State.fmFolder) FileManager.renderFolder(State.fmFolder); else FileManager.renderRoot();
                    UI.showToast(`${success} file(s) uploaded!`);
                } else UI.showToast("Upload cancelled or failed", 'error');
                UI.hideLoading();
            },
            createFile: async () => {
                const namePrompt = prompt("Enter filename:"); if(!namePrompt) return;
                let name = namePrompt.replace(/\s+/g,'_');
                UI.showLoading("Creating...");
                try {
                    await API.createOrUpdate(name, Utils.b64Encode(""), `Created ${name}`);
                    State.repoFiles = await API.request(''); FileManager.renderFolder(State.fmFolder); UI.showToast("File Created!");
                } catch(e) { UI.showToast("Create failed", 'error'); } UI.hideLoading();
            },
            deleteFile: async (path, sha) => {
                if(!confirm(`Delete '${path}'?`)) return;
                UI.showLoading("Deleting...");
                try {
                    await API.deleteFile(path, sha, `Deleted ${path}`);
                    State.repoFiles = await API.request(''); FileManager.renderFolder(State.fmFolder); UI.showToast("Deleted!");
                } catch(e) { UI.showToast("Delete failed", 'error'); } UI.hideLoading();
            },
            renameFilePrompt: async (path, sha) => {
                const newName = prompt("Enter new filename:", path);
                if(!newName || newName===path) return;
                UI.showLoading("Renaming...");
                try {
                    const fileData = await API.request(path);
                    const content = fileData.content;
                    await API.createOrUpdate(newName, content, `Renamed ${path} to ${newName}`);
                    await API.deleteFile(path, sha, `Deleted old ${path}`);
                    State.repoFiles = await API.request(''); FileManager.renderFolder(State.fmFolder); UI.showToast("Renamed!");
                } catch(e) { UI.showToast("Rename failed", 'error'); } UI.hideLoading();
            },
            duplicateFile: async (path, sha) => {
                const copyName = path.replace(/(\.[^.]+)$/, '_copy$1');
                UI.showLoading("Duplicating...");
                try {
                    const fileData = await API.request(path);
                    await API.createOrUpdate(copyName, fileData.content, `Duplicated ${path}`);
                    State.repoFiles = await API.request(''); FileManager.renderFolder(State.fmFolder); UI.showToast("Duplicated!");
                } catch(e) { UI.showToast("Duplicate failed", 'error'); } UI.hideLoading();
            },
            triggerReplace: (path, sha) => { document.getElementById('sysReplacePath').value = path; document.getElementById('sysReplaceSha').value = sha; document.getElementById('sysReplaceUploader').click(); },
            triggerReplaceViaFetch: async (path) => {
                UI.showLoading("Fetching details...");
                try {
                    let sha = State.repoFiles.find(f=>f.name===path)?.sha || (await API.request(path)).sha;
                    UI.hideLoading(); FileManager.triggerReplace(path, sha);
                } catch(e) { UI.hideLoading(); alert("Error fetching file info."); }
            }
        };

        // File upload listeners
        document.getElementById('sysFileUploader').addEventListener('change', async (e) => {
            const files = e.target.files;
            if(!files.length) return;
            await FileManager.uploadFiles(files, State.fmFolder);
            document.getElementById('sysFileUploader').value = '';
        });
        document.getElementById('sysReplaceUploader').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const path = document.getElementById('sysReplacePath').value, sha = document.getElementById('sysReplaceSha').value;
            UI.showLoading("Replacing...");
            const reader = new FileReader();
            reader.onload = async (event) => {
                let base64 = event.target.result.includes(',')?event.target.result.split(',')[1]:event.target.result;
                try {
                    await API.createOrUpdate(path, base64, `Replaced ${path}`, sha); State.repoFiles = await API.request('');
                    if(State.currentHash==='contents') CourseEngine.renderContents(); else FileManager.renderFolder(State.fmFolder);
                    UI.showToast("File Replaced!");
                } catch(e) { UI.showToast("Replace failed", 'error'); } UI.hideLoading(); document.getElementById('sysReplaceUploader').value = '';
            }; reader.readAsDataURL(file);
        });

        // ==========================================
        // 8. HYBRID EDITOR ENGINE (with perfect search)
        // ==========================================
        let aceEditor;
        const EditorEngine = {
            init: () => {
                if (typeof ace !== 'undefined') {
                    aceEditor = ace.edit("aceEditorContainer"); aceEditor.setTheme("ace/theme/twilight"); aceEditor.session.setMode("ace/mode/json");
                    aceEditor.setOptions({ fontSize: "14px", showLineNumbers: true, showGutter: true, wrap: true, useWorker: false, scrollPastEnd: 0.8 });
                    aceEditor.commands.addCommand({
                        name: 'save', bindKey: {win: 'Ctrl-S', mac: 'Command-S'}, exec: () => EditorEngine.save()
                    });
                }
            },
            open: async (path, sha, reloadCourse = false) => {
                if (path.endsWith('.pdf')) return alert("PDFs cannot be edited.");
                UI.showLoading("Loading Editor...");
                try {
                    let codeStr = "";
                    if (!sha) { const fData = await API.request(path); sha = fData.sha; codeStr = Utils.b64Decode(fData.content); } 
                    else { const fData = await API.request(path); codeStr = Utils.b64Decode(fData.content); }
                    document.getElementById('editPath').value = path; document.getElementById('editSha').value = sha; State.reloadCourseOnSave = reloadCourse;
                    State.originalCode = codeStr;
                    if (aceEditor) {
                        let ext = Utils.getExt(path);
                        const modeMap = { html: 'ace/mode/html', css: 'ace/mode/css', js: 'ace/mode/javascript', json: 'ace/mode/json' };
                        aceEditor.session.setMode(modeMap[ext] || 'ace/mode/json');
                        aceEditor.setValue(codeStr, -1);
                    }
