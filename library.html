<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Library | NAV Education</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #6366f1; --primary-dark: #4f52e0; --secondary: #8b5cf6; --accent: #f43f5e;
            --bg: #020617; --bg-card: rgba(30, 41, 59, 0.8); --bg-card-hover: rgba(51, 65, 85, 0.8);
            --border: rgba(255, 255, 255, 0.08); --text: #f1f5f9; --text-muted: #94a3b8;
            --success: #10b981; --error: #f43f5e; --warning: #f59e0b;
            --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px;
        }
        body.light-theme {
            --bg: #f8fafc; --bg-card: #ffffff; --bg-card-hover: #f1f5f9;
            --border: #e2e8f0; --text: #0f172a; --text-muted: #475569;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; position: relative; }
        body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 70% 30%, rgba(99,102,241,0.12) 0%, transparent 70%); animation: rotateBg 40s linear infinite; pointer-events: none; z-index: 0; }
        @keyframes rotateBg { to { transform: rotate(360deg); } }
        .container { max-width: 100%; width: 100%; padding: 14px; padding-bottom: 110px; position: relative; z-index: 1; }

        /* Shared Premium Styles */
        .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .brand h1 { font-size: 1.6rem; font-weight: 600; }
        .brand h1 span { background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .icon-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; cursor: pointer; color: var(--text); overflow: hidden; transition: 0.2s; backdrop-filter: blur(10px);}
        .icon-btn:active { transform: scale(0.95); border-color: var(--primary); }

        .welcome-card { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-xl); padding: 24px; color: white; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(99,102,241,0.2);}
        .search-wrapper { position: relative; width: 100%; margin-top: 14px; }
        .search-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.7); }
        .library-search-input { width: 100%; padding: 12px 16px 12px 44px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 40px; color: white; font-size: 0.9rem; backdrop-filter: blur(10px); outline: none; transition: 0.3s;}
        .library-search-input:focus { background: rgba(255,255,255,0.25); border-color: white;}
        .library-search-input::placeholder { color: rgba(255,255,255,0.7); }
        
        /* Categories */
        .category-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0 14px; scrollbar-width: none; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tab { padding: 8px 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 40px; font-size: 0.85rem; white-space: nowrap; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .category-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
        
        .filter-bar { display: flex; align-items: center; justify-content: space-between; margin: 14px 0; }
        .section-count { color: var(--primary); font-size: 0.8rem; background: rgba(99,102,241,0.1); padding: 4px 10px; border-radius: 20px; font-weight: 500; }
        
        /* Course Cards */
        .course-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 14px; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px); animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }
        .course-card:active { transform: scale(0.98); }
        .course-card-header { display: flex; gap: 12px; margin-bottom: 12px; }
        .course-icon { width: 50px; height: 50px; background: rgba(99,102,241,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0;}
        .course-info { flex: 1; }
        .course-title { font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .course-badge { font-size: 0.6rem; padding: 2px 8px; border-radius: 20px; background: var(--primary); color: white; border: 1px solid rgba(255,255,255,0.1);}
        .course-badge.success { background: var(--success); }
        .course-meta { display: flex; gap: 12px; font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
        
        .progress-header { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 4px; color: var(--text-muted); }
        .progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; border-radius: 4px; transition: width 0.5s ease; }
        
        .course-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .course-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .course-tag { font-size: 0.6rem; padding: 2px 8px; background: var(--bg); border-radius: 20px; border: 1px solid var(--border); }
        .course-action { color: var(--primary); font-size: 0.8rem; display: flex; align-items: center; gap: 4px; font-weight: 500; }

        /* Empty State */
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); background: var(--bg-card); border-radius: var(--radius-lg); border: 1px dashed var(--border); }

        /* Magic Navigation */
        .nav-wrapper { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 350px; height: 70px; z-index: 1000; }
        .magic-mover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 10; }
        .circle { position: absolute; top: -12px; left: 5px; width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; border: 4px solid var(--bg); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(99,102,241,0.5); }
        .circle ion-icon { font-size: 1.8rem; color: white; }
        .nav-pill-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 35px; overflow: hidden; z-index: 5; }
        .nav-bg-svg { position: absolute; top: 0; left: -465px; width: 1000px; height: 70px; fill: var(--bg-card); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .navigation-items { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 20; }
        .list { list-style: none; flex: 1; height: 70px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .list a { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 1.4rem; color: var(--text-muted); transition: 0.2s;}
        .list.active a { opacity: 0; transform: translateY(-20px); }
        @media (max-width: 400px) { .nav-wrapper { width: 320px; } .circle { width: 55px; height: 55px; top: -10px; left: 2px; } .circle ion-icon { font-size: 1.5rem; } }

        /* Overlays & Spinners */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-card); backdrop-filter: blur(20px); color: var(--text); padding: 10px 20px; border-radius: 40px; font-size: 0.85rem; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10000; opacity: 0; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 30000; display: none; align-items: center; justify-content: center; }
        .loading-overlay.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        body.light-theme .library-search-input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); color: var(--text-light); }
        body.light-theme .library-search-input:focus { border-color: var(--primary); }
        body.light-theme .library-search-input::placeholder { color: rgba(0,0,0,0.5); }
        body.light-theme .search-wrapper i { color: rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay"><div class="spinner"></div></div>

    <div class="container">
        <header class="app-header">
            <div class="brand"><h1>NAV <span>Education</span></h1></div>
            <div style="display: flex; gap: 8px;">
                <div class="icon-btn" onclick="window.location.href='profile.html'">
                    <img id="headerAvatar" src="" style="width:100%;height:100%;object-fit:cover;display:none;">
                    <span id="headerFallback"><i class="fas fa-user"></i></span>
                </div>
            </div>
        </header>

        <section class="welcome-card">
            <h2>Your Library 📚</h2>
            <p>Access your courses and chapters</p>
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="librarySearch" class="library-search-input" placeholder="Search courses...">
            </div>
        </section>

        <div class="category-tabs" id="categoryTabs">
            <div class="category-tab active" data-category="all" onclick="filterCategory('all', this)"><i class="fas fa-th-large"></i> All</div>
        </div>

        <div class="filter-bar">
            <span class="section-count" id="courseCount">0 courses</span>
        </div>

        <div id="coursesContainer">
            </div>

        <div style="height:20px;"></div>
    </div>

    <div class="nav-wrapper">
        <div class="magic-mover" id="magicMover" style="transform: translateX(140px);"><div class="circle"><ion-icon id="indicatorIcon" name="library-outline"></ion-icon></div></div>
        <div class="nav-pill-bg"><svg class="nav-bg-svg" id="navSvg" viewBox="0 0 1000 70" style="transform: translateX(140px);"><path d="M0,0 L450,0 C470,0 475,35 500,35 C525,35 530,0 550,0 L1000,0 L1000,70 L0,70 Z" fill="currentColor"></path></svg></div>
        <ul class="navigation-items">
            <li class="list" data-index="0" data-icon="home-outline" data-page="index.html"><a><ion-icon name="home-outline"></ion-icon></a></li>
            <li class="list" data-index="1" data-icon="search-outline" data-page="search.html"><a><ion-icon name="search-outline"></ion-icon></a></li>
            <li class="list active" data-index="2" data-icon="library-outline" data-page="library.html"><a><ion-icon name="library-outline"></ion-icon></a></li>
            <li class="list" data-index="3" data-icon="settings-outline" data-page="settings.html"><a><ion-icon name="settings-outline"></ion-icon></a></li>
            <li class="list" data-index="4" data-icon="person-outline" data-page="profile.html"><a><ion-icon name="person-outline"></ion-icon></a></li>
        </ul>
    </div>

    <div id="toastContainer" class="toast"></div>

    <script>
        // ==============================================================
        // CORE CONFIGURATION - Ensure this matches your GitHub exactly
        // ==============================================================
        const GITHUB_USERNAME = "AMITKUMAR-X7X"; 
        const GITHUB_REPO = "nav-files"; 
        const BRANCH = "main"; // Or "master" based on your setup

        function showToast(msg) {
            const toast = document.getElementById('toastContainer');
            toast.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== THEME & PROFILE ====================
        function applyTheme() {
            if (localStorage.getItem('nav_darkMode') === 'false') document.body.classList.add('light-theme');
            const accent = localStorage.getItem('nav_accentColor');
            if (accent) document.documentElement.style.setProperty('--primary', accent);
        }

        function loadUserAvatar() {
            const avatarUrl = localStorage.getItem('nav_profileAvatar');
            if (avatarUrl) {
                const img = document.getElementById('headerAvatar');
                const fallback = document.getElementById('headerFallback');
                if (img && fallback) {
                    img.src = avatarUrl;
                    img.style.display = 'block';
                    fallback.style.display = 'none';
                }
            }
        }

        // ==================== DATA FETCHING ENGINE ====================
        async function loadLibraryData() {
            // Exactly matching the simple fetch logic from search.html
            const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/${BRANCH}/library.json?t=${Date.now()}`;
            
            try {
                const response = await fetch(rawUrl);
                
                if (!response.ok) {
                    throw new Error("File not found");
                }
                
                const data = await response.json();
                
                if (!data || !data.courses || data.courses.length === 0) {
                    renderEmptyState();
                } else {
                    renderCategories(data.courses);
                    renderLibrary(data);
                }
            } catch(e) {
                console.warn("Library Fetch Error:", e);
                renderEmptyState();
            } finally {
                setTimeout(() => document.getElementById('loadingOverlay').classList.remove('active'), 300);
            }
        }

        function renderEmptyState() {
            const container = document.getElementById('coursesContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open" style="font-size: 2.5rem; margin-bottom: 15px; opacity: 0.5;"></i>
                    <p style="font-size: 0.9rem;">Your library is currently empty. Courses published from the Admin Portal will appear here.</p>
                </div>
            `;
            document.getElementById('courseCount').textContent = `0 courses`;
            
            const tabsContainer = document.getElementById('categoryTabs');
            tabsContainer.innerHTML = `<div class="category-tab active" data-category="all"><i class="fas fa-th-large"></i> All</div>`;
        }

        function renderCategories(courses) {
            const tabsContainer = document.getElementById('categoryTabs');
            const categories = [...new Set(courses.map(c => (c.category ? c.category.toLowerCase() : 'general')))];
            
            let tabsHtml = `<div class="category-tab active" data-category="all" onclick="filterCategory('all', this)"><i class="fas fa-th-large"></i> All</div>`;
            
            categories.forEach(cat => {
                let icon = "fa-folder";
                if(cat.includes('sci')) icon = "fa-flask";
                else if(cat.includes('math')) icon = "fa-square-root-alt";
                else if(cat.includes('hist')) icon = "fa-landmark";
                else if(cat.includes('lang') || cat.includes('eng')) icon = "fa-language";
                else if(cat.includes('design')) icon = "fa-paint-brush";
                
                let label = cat.charAt(0).toUpperCase() + cat.slice(1);
                tabsHtml += `<div class="category-tab" data-category="${cat}" onclick="filterCategory('${cat}', this)"><i class="fas ${icon}"></i> ${label}</div>`;
            });
            
            tabsContainer.innerHTML = tabsHtml;
        }

        function renderLibrary(data) {
            const container = document.getElementById('coursesContainer');
            container.innerHTML = '';
            
            const userProgressData = JSON.parse(localStorage.getItem('nav_course_progress')) || {};

            let count = 0;
            data.courses.forEach(course => {
                const userProgress = userProgressData[course.id] || 0;
                let actionText = 'Start <i class="fas fa-play"></i>';
                
                if (userProgress > 0 && userProgress < 100) actionText = 'Continue <i class="fas fa-arrow-right"></i>';
                else if (userProgress === 100) actionText = 'Review <i class="fas fa-check-double"></i>';

                const badgeHtml = course.badge ? `<span class="course-badge ${course.badgeClass || ''}">${course.badge}</span>` : '';
                
                const safeTags = course.tags || ["General"];
                const tagsHtml = safeTags.map(tag => `<span class="course-tag">${tag}</span>`).join('');
                const lessons = course.lessons || "0";
                const users = course.users || "0";
                const category = (course.category || "general").toLowerCase();

                const cardHtml = `
                    <div class="course-card" data-category="${category}" onclick="openCourse('${course.id}')">
                        <div class="course-card-header">
                            <div class="course-icon">${course.icon || '📚'}</div>
                            <div class="course-info">
                                <div class="course-title">${course.title} ${badgeHtml}</div>
                                <div class="course-meta">
                                    <span><i class="far fa-folder-open"></i> ${lessons} Chapters</span>
                                    <span><i class="far fa-user"></i> ${users}</span>
                                </div>
                            </div>
                        </div>
                        <div class="progress-header"><span>Your Progress</span><span>${userProgress}%</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${userProgress}%"></div></div>
                        <div class="course-footer">
                            <div class="course-tags">${tagsHtml}</div>
                            <div class="course-action">${actionText}</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
                count++;
            });
            document.getElementById('courseCount').textContent = `${count} courses`;
        }

        // ==================== FILTERING LOGIC ====================
        window.filterCategory = function(category, element) {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            
            const courses = document.querySelectorAll('.course-card');
            let count = 0;
            courses.forEach(c => {
                if (category === 'all' || c.dataset.category === category) {
                    c.style.display = 'block'; 
                    count++;
                } else { 
                    c.style.display = 'none'; 
                }
            });
            document.getElementById('courseCount').textContent = count + ' courses';
            
            const searchInput = document.getElementById('librarySearch');
            if (searchInput) searchInput.value = '';
        }

        document.getElementById('librarySearch')?.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const courses = document.querySelectorAll('.course-card');
            let count = 0;
            
            const activeTabEl = document.querySelector('.category-tab.active');
            const activeTab = activeTabEl ? activeTabEl.dataset.category : 'all';

            courses.forEach(c => {
                const matchesCategory = (activeTab === 'all' || c.dataset.category === activeTab);
                const matchesSearch = c.textContent.toLowerCase().includes(term);
                
                if (matchesCategory && matchesSearch) { 
                    c.style.display = 'block'; 
                    count++; 
                } else { 
                    c.style.display = 'none'; 
                }
            });
            document.getElementById('courseCount').textContent = count + ' courses';
        });

        // ==================== ROUTING ====================
        window.openCourse = function(courseId) { 
            showToast(`Loading course...`);
            setTimeout(() => {
                window.location.href = `course.html?id=${courseId}`;
            }, 300);
        }

        // Magic Navigation Logic
        const lists = document.querySelectorAll('.list');
        const magicMover = document.getElementById('magicMover');
        const navSvg = document.getElementById('navSvg');
        const indicatorIcon = document.getElementById('indicatorIcon');
        const slotWidth = 70;
        
        lists.forEach(item => {
            item.addEventListener('click', function() {
                const idx = parseInt(this.getAttribute('data-index'));
                const icon = this.getAttribute('data-icon');
                const page = this.getAttribute('data-page');
                
                lists.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                magicMover.style.transform = `translateX(${idx * slotWidth}px)`;
                navSvg.style.transform = `translateX(${idx * slotWidth}px)`;
                indicatorIcon.setAttribute('name', icon);
                
                if (page && page !== 'library.html') {
                    document.body.style.opacity = '0';
                    setTimeout(() => window.location.href = page, 300);
                }
            });
        });

        // ==================== APP INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loadingOverlay').classList.add('active');
            applyTheme();
            loadUserAvatar();
            loadLibraryData(); 
        });
    </script>
</body>
</html>
