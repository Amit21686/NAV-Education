<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | NAV Education</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Appwrite SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f52e0;
            --secondary: #8b5cf6;
            --bg-dark: #020617;
            --bg-light: #f8fafc;
            --text-dark: #f1f5f9;
            --text-light: #0f172a;
            --muted-dark: #94a3b8;
            --muted-light: #475569;
            --success: #10b981;
            --error: #f43f5e;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body.light-theme {
            background: var(--bg-light);
            color: var(--text-light);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, 
                rgba(99, 102, 241, 0.15) 0%,
                transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            margin: 20px;
        }

        .banner-container {
            width: 100%;
            margin-bottom: 30px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
            animation: slideDown 0.8s ease;
        }

        .banner-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        body.light-theme .auth-card {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            color: var(--muted-dark);
            font-size: 0.95rem;
        }

        body.light-theme .auth-header p {
            color: var(--muted-light);
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px;
            border-radius: 60px;
        }

        body.light-theme .auth-tabs {
            background: rgba(0, 0, 0, 0.05);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: transparent;
            color: var(--muted-dark);
            font-size: 1rem;
        }

        body.light-theme .auth-tab {
            color: var(--muted-light);
        }

        .auth-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .auth-form {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .auth-form.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-dark);
            font-size: 1.1rem;
            transition: color 0.3s ease;
            z-index: 1;
        }

        body.light-theme .input-icon {
            color: var(--muted-light);
        }

        .input-field {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        body.light-theme .input-field {
            background: rgba(0, 0, 0, 0.02);
            border-color: rgba(0, 0, 0, 0.08);
            color: var(--text-light);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-field:focus + .input-icon {
            color: var(--primary);
        }

        .input-field::placeholder {
            color: var(--muted-dark);
            opacity: 0.5;
        }

        body.light-theme .input-field::placeholder {
            color: var(--muted-light);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-dark);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.3s ease;
            z-index: 1;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .auth-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--muted-dark);
        }

        body.light-theme .checkbox-label {
            color: var(--muted-light);
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .forgot-link:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .auth-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .terms-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--muted-dark);
        }

        .terms-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-text a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .toast.success {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.2);
        }

        .toast.error {
            border-color: var(--error);
            background: rgba(244, 63, 94, 0.2);
        }

        .toast.warning {
            border-color: var(--warning);
            background: rgba(245, 158, 11, 0.2);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }
            
            .toast {
                min-width: 90%;
                left: 5%;
                transform: translateX(0) translateY(100px);
            }
            
            .toast.show {
                transform: translateX(0) translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="auth-container">
        <!-- Banner -->
        <div class="banner-container">
            <img src="https://raw.githubusercontent.com/Amit21686/NAV_Education/refs/heads/main/images/NAV%20Education%20banner.png" 
                 alt="NAV Education Banner" 
                 class="banner-image">
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back! 👋</h1>
                <p>Continue your learning journey with NAV Education</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div class="auth-form active" id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="loginEmail" class="input-field" placeholder="Email Address" value="demo@naveducation.com">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="loginPassword" class="input-field" placeholder="Password" value="Demo@123">
                    <i class="fas fa-eye password-toggle" id="toggleLoginPassword" onclick="togglePassword('loginPassword', this)"></i>
                </div>

                <div class="auth-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" checked>
                        <span>Remember me</span>
                    </label>
                    <a class="forgot-link" onclick="forgotPassword()">Forgot Password?</a>
                </div>

                <button class="auth-btn" onclick="login()">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                    Login to Dashboard
                </button>
            </div>

            <!-- Signup Form -->
            <div class="auth-form" id="signupForm">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="signupName" class="input-field" placeholder="Full Name">
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="signupEmail" class="input-field" placeholder="Email Address">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="signupPassword" class="input-field" placeholder="Password">
                    <i class="fas fa-eye password-toggle" id="toggleSignupPassword" onclick="togglePassword('signupPassword', this)"></i>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="signupConfirmPassword" class="input-field" placeholder="Confirm Password">
                    <i class="fas fa-eye password-toggle" id="toggleConfirmPassword" onclick="togglePassword('signupConfirmPassword', this)"></i>
                </div>

                <div class="auth-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="acceptTerms" checked>
                        <span>I accept the <a href="#" style="color: var(--primary);">Terms & Conditions</a></span>
                    </label>
                </div>

                <button class="auth-btn" onclick="signup()">
                    <i class="fas fa-user-plus" style="margin-right: 8px;"></i>
                    Create Account
                </button>
            </div>

            <!-- Terms -->
            <div class="terms-text">
                By continuing, you agree to NAV Education's<br>
                <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast"></div>

    <script>
        // ==================== APPWRITE CONFIGURATION ====================
        const client = new Appwrite.Client();
        
        client
            .setEndpoint("https://sgp.cloud.appwrite.io/v1")
            .setProject("nav-education");

        const account = new Appwrite.Account(client);

        // ==================== GLOBAL VARIABLES ====================
        let loadingOverlay = document.getElementById('loadingOverlay');

        // ==================== FIXED TOAST FUNCTION ====================
        function showToast(message, type = 'info', duration = 3000) {
            const toast = document.getElementById('toastContainer');
            if (!toast) return;
            
            // Clear any existing timeouts
            if (window.toastTimeout) {
                clearTimeout(window.toastTimeout);
                window.toastTimeout = null;
            }
            
            // Reset toast completely
            toast.className = 'toast';
            toast.innerHTML = '';
            
            // Add type class
            toast.classList.add(type);
            
            // Add icon
            const icon = document.createElement('i');
            switch(type) {
                case 'success':
                    icon.className = 'fas fa-check-circle';
                    break;
                case 'error':
                    icon.className = 'fas fa-exclamation-circle';
                    break;
                case 'warning':
                    icon.className = 'fas fa-exclamation-triangle';
                    break;
                default:
                    icon.className = 'fas fa-info-circle';
            }
            
            toast.appendChild(icon);
            toast.appendChild(document.createTextNode(' ' + message));
            
            // Force reflow to ensure animation works
            void toast.offsetWidth;
            
            // Show toast
            toast.classList.add('show');
            
            // Hide after duration
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
                window.toastTimeout = null;
            }, duration);
        }

        // ==================== LOADING FUNCTIONS ====================
        function showLoading() {
            loadingOverlay.classList.add('active');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }

        // ==================== TAB SWITCHING ====================
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');

            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        }

        // ==================== PASSWORD VISIBILITY TOGGLE ====================
        function togglePassword(inputId, element) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                element.classList.remove('fa-eye');
                element.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                element.classList.remove('fa-eye-slash');
                element.classList.add('fa-eye');
            }
        }

        // ==================== AUTHENTICATION FUNCTIONS ====================

        /**
         * Login with email and password
         */
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('Please enter email and password', 'error');
                return;
            }

            showLoading();

            try {
                const session = await account.createEmailSession(email, password);
                const user = await account.get();
                
                localStorage.setItem('nav_userName', user.name || email.split('@')[0]);
                localStorage.setItem('nav_userEmail', user.email);
                localStorage.setItem('nav_userId', user.$id);
                localStorage.setItem('nav_sessionId', session.$id);
                
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('nav_rememberMe', 'true');
                }
                
                showToast('Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);
                
                if (error.message.includes('Invalid credentials')) {
                    showToast('Invalid email or password', 'error');
                } else if (error.message.includes('not found')) {
                    showToast('User not found. Please sign up first.', 'error');
                } else {
                    showToast(error.message || 'Login failed', 'error');
                }
            } finally {
                hideLoading();
            }
        }

        /**
         * Sign up new user
         */
        async function signup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const acceptTerms = document.getElementById('acceptTerms').checked;

            if (!name || !email || !password || !confirmPassword) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (password.length < 8) {
                showToast('Password must be at least 8 characters', 'error');
                return;
            }

            if (!acceptTerms) {
                showToast('Please accept Terms & Conditions', 'error');
                return;
            }

            showLoading();

            try {
                const user = await account.create(
                    Appwrite.ID.unique(),
                    email,
                    password,
                    name
                );

                await account.createEmailSession(email, password);
                
                localStorage.setItem('nav_userName', name);
                localStorage.setItem('nav_userEmail', email);
                localStorage.setItem('nav_userId', user.$id);
                
                initializeUserSettings(name, email);
                
                showToast('Account created successfully!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('Signup error:', error);
                
                if (error.message.includes('already exists')) {
                    showToast('Email already registered. Please login.', 'error');
                } else {
                    showToast(error.message || 'Signup failed', 'error');
                }
            } finally {
                hideLoading();
            }
        }

        /**
         * Initialize user settings with defaults
         */
        function initializeUserSettings(name, email) {
            const defaultSettings = {
                userName: name,
                userEmail: email,
                userPhone: '',
                userDob: '',
                userGoal: 'NEET',
                studyHours: 4,
                studyReminders: true,
                reminderTime: '19:00',
                darkMode: true,
                accentColor: '#6366f1',
                fontSize: 'medium',
                language: 'english',
                timezone: 'IST',
                pushNotifications: true,
                emailNotifications: true,
                achievementAlerts: true,
                courseUpdates: true,
                publicProfile: false,
                shareActivity: false,
                dataCollection: true,
                progress: 0,
                streak: 1,
                stats: {
                    courses: 0,
                    hours: 0,
                    badges: 0,
                    totalCourses: 0,
                    totalHours: 0,
                    totalBadges: 0
                },
                savedMaterials: [],
                recentSearches: [],
                notifications: []
            };

            Object.keys(defaultSettings).forEach(key => {
                localStorage.setItem(`nav_${key}`, JSON.stringify(defaultSettings[key]));
            });
        }

        /**
         * Forgot Password
         */
        async function forgotPassword() {
            const email = document.getElementById('loginEmail').value.trim();
            
            if (!email) {
                showToast('Please enter your email address first', 'error');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showToast('Please enter a valid email', 'error');
                return;
            }

            showLoading();

            try {
                await account.createRecovery(
                    email,
                    "https://amit21686.github.io/NAV-Education/reset-password.html"
                );
                
                showToast('Password reset link sent to your email!', 'success');
                
                setTimeout(() => {
                    showToast(`Check inbox/spam for: ${email}`, 'info', 4000);
                }, 1000);
                
            } catch (error) {
                console.error('Password reset error:', error);
                
                if (error.message.includes('not found')) {
                    showToast('No account found with this email', 'error');
                } else if (error.message.includes('rate')) {
                    showToast('Too many requests. Please try again later.', 'error');
                } else {
                    showToast(error.message || 'Failed to send reset link', 'error');
                }
            } finally {
                hideLoading();
            }
        }

        /**
         * Check if already logged in
         */
        async function checkExistingSession() {
            try {
                await account.get();
                window.location.href = 'index.html';
            } catch (error) {
                console.log('No active session');
            }
        }

        /**
         * Fill demo credentials for testing
         */
        function fillDemoCredentials() {
            document.getElementById('loginEmail').value = 'demo@naveducation.com';
            document.getElementById('loginPassword').value = 'Demo@123';
        }

        // ==================== EVENT LISTENERS ====================
        document.addEventListener('DOMContentLoaded', function() {
            checkExistingSession();
            fillDemoCredentials();
            
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const activeForm = document.querySelector('.auth-form.active');
                    if (activeForm && activeForm.id === 'loginForm') {
                        login();
                    } else if (activeForm && activeForm.id === 'signupForm') {
                        signup();
                    }
                }
            });
            
            setTimeout(hideLoading, 500);
        });

        // ==================== SERVICE WORKER ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.log('ServiceWorker registration failed');
                });
            });
        }
    </script>
</body>
</html>
