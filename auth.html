<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login | NAV Education</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --bg-dark: #020617;
            --bg-light: #f8fafc;
            --card-dark: rgba(15, 23, 42, 0.65);
            --card-light: rgba(255, 255, 255, 0.9);
            --text-dark: #f8fafc;
            --text-light: #0f172a;
            --muted-dark: #94a3b8;
            --muted-light: #64748b;
            --border-dark: rgba(255, 255, 255, 0.1);
            --border-light: rgba(0, 0, 0, 0.08);
            --success: #10b981;
            --error: #f43f5e;
            
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body.light-theme {
            background: var(--bg-light);
            color: var(--text-light);
        }

        /* Premium Animated Background Orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 { top: -10%; left: -10%; width: 300px; height: 300px; background: var(--primary); }
        .orb-2 { bottom: -10%; right: -10%; width: 250px; height: 250px; background: var(--secondary); animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        /* Main Container */
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 15px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Auth Card (Glassmorphism) */
        .auth-card {
            background: var(--card-dark);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-xl);
            padding: 30px 24px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        body.light-theme .auth-card {
            background: var(--card-light);
            border-color: var(--border-light);
            box-shadow: 0 24px 48px rgba(99, 102, 241, 0.1);
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Header */
        .auth-header { text-align: center; margin-bottom: 20px; }
        .auth-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; background: linear-gradient(135deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        body.light-theme .auth-header h1 { background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-header p { color: var(--muted-dark); font-size: 0.85rem; }
        body.light-theme .auth-header p { color: var(--muted-light); }

        /* Banner Inside Auth Card (Original Aspect Ratio) */
        .banner-container {
            width: 100%;
            height: auto; /* Let it scale naturally */
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-dark);
            margin-bottom: 24px;
            position: relative;
        }
        
        body.light-theme .banner-container { border-color: var(--border-light); }

        .banner-image {
            width: 100%;
            height: auto;
            display: block; /* Removes bottom spacing on images */
        }

        /* Premium iOS Style Segmented Tabs */
        .auth-tabs {
            position: relative;
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 100px;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        body.light-theme .auth-tabs { background: rgba(0, 0, 0, 0.05); border-color: rgba(0,0,0,0.05); }

        .tab-slider {
            position: absolute;
            top: 4px; left: 4px;
            width: calc(50% - 4px); height: calc(100% - 8px);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 100px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .auth-tabs[data-active="signup"] .tab-slider { transform: translateX(100%); }

        .auth-tab {
            flex: 1;
            position: relative;
            z-index: 2;
            padding: 10px;
            text-align: center;
            border: none;
            background: transparent;
            color: var(--muted-dark);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }
        body.light-theme .auth-tab { color: var(--muted-light); }
        .auth-tab.active { color: white; }

        /* Form Container */
        .auth-form-container { position: relative; overflow: hidden; }
        .auth-form { transition: opacity 0.3s ease, transform 0.3s ease; display: none; }
        .auth-form.active { display: block; animation: slideIn 0.4s ease forwards; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* Sleek Inputs */
        .input-group { margin-bottom: 16px; position: relative; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted-dark); font-size: 1rem; transition: color 0.3s; z-index: 2; }
        body.light-theme .input-icon { color: var(--muted-light); }

        .input-field {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(0, 0, 0, 0.2);
            border: 1.5px solid var(--border-dark);
            border-radius: var(--radius-md);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        body.light-theme .input-field { background: rgba(0,0,0,0.02); border-color: var(--border-light); color: var(--text-light); }

        .input-field:focus { outline: none; border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .input-field:focus + .input-icon { color: var(--primary); }
        .input-field::placeholder { color: var(--muted-dark); opacity: 0.6; }
        body.light-theme .input-field::placeholder { color: var(--muted-light); }

        .password-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--muted-dark); cursor: pointer; font-size: 1rem; z-index: 2; transition: 0.2s; }
        .password-toggle:active { transform: translateY(-50%) scale(0.9); }

        /* Options */
        .auth-options { display: flex; align-items: center; justify-content: space-between; margin: 16px 0 24px; font-size: 0.8rem; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--muted-dark); }
        body.light-theme .checkbox-label { color: var(--muted-light); }
        .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); border-radius: 4px; }
        
        .forgot-link { color: var(--primary); text-decoration: none; font-weight: 500; cursor: pointer; }
        .forgot-link:hover { color: var(--secondary); text-decoration: underline; }

        /* Primary Button */
        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .auth-btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); }

        /* Terms */
        .terms-text { text-align: center; margin-top: 20px; font-size: 0.75rem; color: var(--muted-dark); line-height: 1.5; }
        .terms-text a { color: var(--text-dark); text-decoration: underline; font-weight: 500; }
        body.light-theme .terms-text a { color: var(--primary); }

        /* Loading Overlay */
        .loading-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .loading-overlay.active { display: flex; }
        .spinner { width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }

        /* Toast */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); color: white; padding: 12px 20px; border-radius: 100px; font-size: 0.85rem; font-weight: 500; border: 1px solid var(--border-dark); box-shadow: 0 10px 30px rgba(0,0,0,0.4); z-index: 9999; opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; gap: 8px; pointer-events: none; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .auth-container { padding: 10px; justify-content: center; min-height: 100vh; }
            .banner-container { margin-bottom: 20px; border-radius: var(--radius-md); height: auto; }
            .auth-card { padding: 25px 20px; border-radius: var(--radius-lg); }
            .toast { width: 90%; max-width: 320px; white-space: normal; text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 id="headerTitle">Welcome Back! 👋</h1>
                <p id="headerSubtitle">Continue your learning journey</p>
            </div>

            <div class="banner-container">
                <img src="https://raw.githubusercontent.com/Amit21686/NAV_Education/refs/heads/main/images/NAV%20Education%20banner.png" 
                     alt="NAV Education" class="banner-image">
            </div>

            <div class="auth-tabs" id="tabContainer" data-active="login">
                <div class="tab-slider"></div>
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div class="auth-form-container">
                <div class="auth-form active" id="loginForm">
                    <div class="input-group">
                        <input type="email" id="loginEmail" class="input-field" placeholder="Email Address">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" id="loginPassword" class="input-field" placeholder="Password">
                        <i class="fas fa-lock input-icon"></i>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                    </div>

                    <div class="auth-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" checked>
                            <span>Remember me</span>
                        </label>
                        <a class="forgot-link" onclick="forgotPassword()">Forgot Password?</a>
                    </div>

                    <button class="auth-btn" onclick="login()">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </div>

                <div class="auth-form" id="signupForm">
                    <div class="input-group">
                        <input type="text" id="signupName" class="input-field" placeholder="Full Name">
                        <i class="fas fa-user input-icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="email" id="signupEmail" class="input-field" placeholder="Email Address">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" id="signupPassword" class="input-field" placeholder="Password (Min 8 chars)">
                        <i class="fas fa-lock input-icon"></i>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('signupPassword', this)"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" id="signupConfirmPassword" class="input-field" placeholder="Confirm Password">
                        <i class="fas fa-shield-alt input-icon"></i>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('signupConfirmPassword', this)"></i>
                    </div>

                    <div class="auth-options" style="margin-bottom: 16px;">
                        <label class="checkbox-label">
                            <input type="checkbox" id="acceptTerms" checked>
                            <span>I accept the <a href="#" style="color: var(--primary);">Terms and conditions</a></span>
                        </label>
                    </div>

                    <button class="auth-btn" onclick="signup()">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </div>
            </div>

            <div class="terms-text">
                By continuing, you agree to NAV Education's<br>
                <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast"></div>

    <script>
        // ==================== APPWRITE CONFIGURATION ====================
        const client = new Appwrite.Client();
        client.setEndpoint("https://sgp.cloud.appwrite.io/v1").setProject("nav-education");
        const account = new Appwrite.Account(client);

        // ==================== GLOBAL VARIABLES ====================
        let loadingOverlay = document.getElementById('loadingOverlay');

        // ==================== THEME CHECK ====================
        function applyTheme() {
            const darkMode = localStorage.getItem('nav_darkMode');
            if (darkMode === 'false') document.body.classList.add('light-theme');
        }
        applyTheme();

        // ==================== TOAST FUNCTION ====================
        function showToast(message, type = 'info', duration = 3000) {
            const toast = document.getElementById('toastContainer');
            if (!toast) return;
            
            if (window.toastTimeout) clearTimeout(window.toastTimeout);
            
            toast.className = 'toast';
            toast.innerHTML = '';
            toast.classList.add(type);
            
            const icon = document.createElement('i');
            icon.className = type === 'success' ? 'fas fa-check-circle' : type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-info-circle';
            
            toast.appendChild(icon);
            toast.appendChild(document.createTextNode(' ' + message));
            
            void toast.offsetWidth; // Trigger reflow
            toast.classList.add('show');
            
            window.toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, duration);
        }

        function showLoading() { loadingOverlay.classList.add('active'); }
        function hideLoading() { loadingOverlay.classList.remove('active'); }

        // ==================== TAB SWITCHING ====================
        function switchTab(tab) {
            const tabContainer = document.getElementById('tabContainer');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            
            const headerTitle = document.getElementById('headerTitle');
            const headerSubtitle = document.getElementById('headerSubtitle');

            tabContainer.setAttribute('data-active', tab);

            if (tab === 'login') {
                loginTab.classList.add('active'); signupTab.classList.remove('active');
                loginForm.classList.add('active'); signupForm.classList.remove('active');
                headerTitle.innerHTML = 'Welcome Back! 👋';
                headerSubtitle.innerHTML = 'Continue your learning journey';
            } else {
                signupTab.classList.add('active'); loginTab.classList.remove('active');
                signupForm.classList.add('active'); loginForm.classList.remove('active');
                headerTitle.innerHTML = 'Create Account 🚀';
                headerSubtitle.innerHTML = 'Join NAV Education today';
            }
        }

        // ==================== PASSWORD TOGGLE ====================
        function togglePassword(inputId, element) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                element.classList.remove('fa-eye');
                element.classList.add('fa-eye-slash');
                element.style.color = 'var(--primary)';
            } else {
                input.type = 'password';
                element.classList.remove('fa-eye-slash');
                element.classList.add('fa-eye');
                element.style.color = '';
            }
        }

        // ==================== AUTHENTICATION ====================
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) return showToast('Please enter email and password', 'error');

            showLoading();
            try {
                const session = await account.createEmailSession(email, password);
                const user = await account.get();
                
                localStorage.setItem('nav_userName', user.name || email.split('@')[0]);
                localStorage.setItem('nav_userEmail', user.email);
                localStorage.setItem('nav_userId', user.$id);
                localStorage.setItem('nav_sessionId', session.$id);
                
                if (document.getElementById('rememberMe').checked) localStorage.setItem('nav_rememberMe', 'true');
                
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } catch (error) {
                if (error.message.includes('Invalid credentials')) showToast('Invalid email or password', 'error');
                else if (error.message.includes('not found')) showToast('User not found. Please sign up.', 'error');
                else showToast(error.message || 'Login failed', 'error');
            } finally {
                hideLoading();
            }
        }

        async function signup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const acceptTerms = document.getElementById('acceptTerms').checked;

            if (!name || !email || !password || !confirmPassword) return showToast('Please fill all fields', 'error');
            if (password !== confirmPassword) return showToast('Passwords do not match', 'error');
            if (password.length < 8) return showToast('Password must be at least 8 chars', 'error');
            if (!acceptTerms) return showToast('Please accept Terms & Conditions', 'error');

            showLoading();
            try {
                const user = await account.create(Appwrite.ID.unique(), email, password, name);
                await account.createEmailSession(email, password);
                
                localStorage.setItem('nav_userName', name);
                localStorage.setItem('nav_userEmail', email);
                localStorage.setItem('nav_userId', user.$id);
                
                initializeUserSettings(name, email);
                
                showToast('Account created successfully!', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } catch (error) {
                if (error.message.includes('already exists')) showToast('Email already registered', 'error');
                else showToast(error.message || 'Signup failed', 'error');
            } finally {
                hideLoading();
            }
        }

        function initializeUserSettings(name, email) {
            const defaultSettings = { userName: name, userEmail: email, userGoal: 'NEET', studyHours: 4, darkMode: true, accentColor: '#6366f1', progress: 0, streak: 1, stats: { courses: 0, hours: 0, badges: 0 } };
            Object.keys(defaultSettings).forEach(key => { localStorage.setItem(`nav_${key}`, JSON.stringify(defaultSettings[key])); });
        }

        async function forgotPassword() {
            const email = document.getElementById('loginEmail').value.trim();
            if (!email || !email.includes('@')) return showToast('Enter a valid email first', 'error');

            showLoading();
            try {
                await account.createRecovery(email, "https://amit21686.github.io/NAV-Education/reset-password.html");
                showToast('Reset link sent to your email!', 'success');
            } catch (error) {
                if (error.message.includes('not found')) showToast('No account found with this email', 'error');
                else showToast('Failed to send reset link', 'error');
            } finally {
                hideLoading();
            }
        }

        async function checkExistingSession() {
            try { await account.get(); window.location.href = 'index.html'; } catch (error) { /* No session, stay on login */ }
        }

        // ==================== EVENT LISTENERS ====================
        document.addEventListener('DOMContentLoaded', function() {
            checkExistingSession();
            
            // Allow Enter key to submit forms
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const activeTab = document.getElementById('tabContainer').getAttribute('data-active');
                    if (activeTab === 'login') login(); else signup();
                }
            });
            setTimeout(hideLoading, 500);
        });
    </script>
</body>
</html>
