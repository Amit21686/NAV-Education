<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Password | NAV Education</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Appwrite SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f52e0;
            --secondary: #8b5cf6;
            --bg-dark: #020617;
            --text-dark: #f1f5f9;
            --muted-dark: #94a3b8;
            --success: #10b981;
            --error: #f43f5e;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, 
                rgba(99, 102, 241, 0.15) 0%,
                transparent 70%);
            pointer-events: none;
        }

        .reset-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Banner */
        .banner-container {
            width: 100%;
            margin-bottom: 30px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
            animation: slideDown 0.8s ease;
        }

        .banner-image {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Reset Card */
        .reset-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted-dark);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 25px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        .back-btn i {
            font-size: 0.8rem;
        }

        /* Header */
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--muted-dark);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Steps */
        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .steps::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .step {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .step-number {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0 auto 8px;
            transition: all 0.3s ease;
        }

        .step.active .step-number {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .step.completed .step-number {
            background: var(--success);
            color: white;
        }

        .step-label {
            font-size: 0.75rem;
            color: var(--muted-dark);
        }

        .step.active .step-label {
            color: var(--primary);
            font-weight: 500;
        }

        /* Forms */
        .reset-form {
            display: none;
        }

        .reset-form.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-dark);
            font-size: 1.1rem;
            transition: color 0.3s ease;
            z-index: 1;
        }

        .input-field {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-field:focus + .input-icon {
            color: var(--primary);
        }

        .input-field::placeholder {
            color: var(--muted-dark);
            opacity: 0.5;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-dark);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.3s ease;
            z-index: 1;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        /* Password Strength */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .password-strength.visible {
            display: block;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--error), var(--warning), var(--success));
            transition: width 0.3s ease;
        }

        .strength-text {
            font-size: 0.75rem;
            margin-top: 4px;
            color: var(--muted-dark);
            display: flex;
            justify-content: space-between;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Success Message */
        .success-message {
            text-align: center;
            padding: 20px 0;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .success-title {
            font-size: 1.5rem;
            color: var(--success);
            margin-bottom: 10px;
        }

        .success-text {
            color: var(--muted-dark);
            margin-bottom: 30px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.2);
        }

        .toast.error {
            border-color: var(--error);
            background: rgba(244, 63, 94, 0.2);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .reset-card {
                padding: 30px 20px;
            }

            .toast {
                min-width: 90%;
                left: 5%;
                transform: translateX(0) translateY(100px);
            }
            
            .toast.show {
                transform: translateX(0) translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="reset-container">
        <!-- Banner -->
        <div class="banner-container">
            <img src="https://raw.githubusercontent.com/Amit21686/NAV_Education/refs/heads/main/images/NAV%20Education%20banner.png" 
                 alt="NAV Education Banner" 
                 class="banner-image">
        </div>

        <!-- Reset Card -->
        <div class="reset-card">
            <a href="auth.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Login
            </a>

            <h1>Reset Password</h1>
            <div class="subtitle">Enter your email to receive a password reset link</div>

            <!-- Steps -->
            <div class="steps">
                <div class="step active" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-label">Email</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-label">Check Inbox</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-label">Reset</div>
                </div>
            </div>

            <!-- Step 1: Email Form -->
            <div id="step1Form" class="reset-form active">
                <div class="input-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="resetEmail" class="input-field" placeholder="Enter your email address">
                </div>

                <button class="btn btn-primary" onclick="sendResetLink()">
                    <i class="fas fa-paper-plane" style="margin-right: 8px;"></i>
                    Send Reset Link
                </button>
            </div>

            <!-- Step 2: Check Email -->
            <div id="step2Form" class="reset-form">
                <div class="success-message">
                    <div class="success-icon">
                        <i class="fas fa-envelope-open-text"></i>
                    </div>
                    <h2 class="success-title">Check Your Email</h2>
                    <div class="success-text">
                        We've sent a password reset link to:<br>
                        <strong id="sentEmail">email@example.com</strong>
                    </div>
                    <p style="color: var(--muted-dark); font-size: 0.9rem; margin-bottom: 20px;">
                        Didn't receive the email? Check spam folder or
                    </p>
                    <button class="btn btn-primary" onclick="resendResetLink()">
                        <i class="fas fa-redo" style="margin-right: 8px;"></i>
                        Resend Link
                    </button>
                </div>
            </div>

            <!-- Step 3: New Password Form -->
            <div id="step3Form" class="reset-form">
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="newPassword" class="input-field" placeholder="New Password" oninput="checkPasswordStrength()">
                    <i class="fas fa-eye password-toggle" id="toggleNewPassword" onclick="togglePassword('newPassword', this)"></i>
                </div>

                <!-- Password Strength Meter -->
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar" id="strengthBar"></div>
                    <div class="strength-text">
                        <span>Password strength:</span>
                        <span id="strengthText">Weak</span>
                    </div>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm New Password">
                    <i class="fas fa-eye password-toggle" id="toggleConfirmPassword" onclick="togglePassword('confirmPassword', this)"></i>
                </div>

                <button class="btn btn-primary" onclick="updatePassword()">
                    <i class="fas fa-check-circle" style="margin-right: 8px;"></i>
                    Update Password
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast"></div>

    <script>
        // ==================== APPWRITE CONFIGURATION ====================
        const client = new Appwrite.Client();
        
        client
            .setEndpoint("https://sgp.cloud.appwrite.io/v1")
            .setProject("nav-education");

        const account = new Appwrite.Account(client);

        // ==================== GLOBAL VARIABLES ====================
        let activeToast = null;
        let loadingOverlay = document.getElementById('loadingOverlay');
        let userId = '';
        let secret = '';

        // ==================== URL PARAMETERS ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Check URL for reset parameters
            const urlParams = new URLSearchParams(window.location.search);
            userId = urlParams.get('userId');
            secret = urlParams.get('secret');
            
            if (userId && secret) {
                // Direct to password reset step
                goToStep(3);
            }
        });

        // ==================== STEP NAVIGATION ====================
        function goToStep(step) {
            // Update step indicators
            for (let i = 1; i <= 3; i++) {
                const stepEl = document.getElementById(`step${i}`);
                const formEl = document.getElementById(`step${i}Form`);
                
                if (i < step) {
                    stepEl.classList.add('completed');
                    stepEl.classList.remove('active');
                } else if (i === step) {
                    stepEl.classList.add('active');
                    stepEl.classList.remove('completed');
                    formEl.classList.add('active');
                } else {
                    stepEl.classList.remove('active', 'completed');
                    formEl.classList.remove('active');
                }
            }
        }

        // ==================== PASSWORD FUNCTIONS ====================
        function togglePassword(inputId, element) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                element.classList.remove('fa-eye');
                element.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                element.classList.remove('fa-eye-slash');
                element.classList.add('fa-eye');
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthMeter = document.getElementById('passwordStrength');
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            if (password.length === 0) {
                strengthMeter.classList.remove('visible');
                return;
            }
            
            strengthMeter.classList.add('visible');
            
            let strength = 0;
            
            // Length check
            if (password.length >= 8) strength += 25;
            
            // Contains number
            if (/\d/.test(password)) strength += 25;
            
            // Contains lowercase
            if (/[a-z]/.test(password)) strength += 15;
            
            // Contains uppercase
            if (/[A-Z]/.test(password)) strength += 15;
            
            // Contains special character
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength += 20;
            
            // Cap at 100
            strength = Math.min(strength, 100);
            
            // Update bar
            strengthBar.style.width = strength + '%';
            
            // Update text
            if (strength < 40) {
                strengthText.textContent = 'Weak';
                strengthText.style.color = '#f43f5e';
            } else if (strength < 70) {
                strengthText.textContent = 'Medium';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthText.textContent = 'Strong';
                strengthText.style.color = '#10b981';
            }
        }

        // ==================== LOADING FUNCTIONS ====================
        function showLoading() {
            loadingOverlay.classList.add('active');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }

        // ==================== TOAST NOTIFICATIONS ====================
        function showToast(message, type = 'info', duration = 3000) {
            if (activeToast) {
                activeToast.classList.remove('show');
                setTimeout(() => {
                    if (activeToast.parentNode) {
                        activeToast.parentNode.removeChild(activeToast);
                    }
                    activeToast = null;
                }, 300);
            }

            const toast = document.getElementById('toastContainer');
            toast.className = `toast ${type}`;
            
            const icon = document.createElement('i');
            switch(type) {
                case 'success':
                    icon.className = 'fas fa-check-circle';
                    break;
                case 'error':
                    icon.className = 'fas fa-exclamation-circle';
                    break;
                default:
                    icon.className = 'fas fa-info-circle';
            }
            
            toast.innerHTML = '';
            toast.appendChild(icon);
            toast.appendChild(document.createTextNode(' ' + message));
            
            toast.classList.add('show');
            activeToast = toast;

            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // ==================== RESET PASSWORD FUNCTIONS ====================

        /**
         * Send reset link to email
         */
        async function sendResetLink() {
            const email = document.getElementById('resetEmail').value.trim();

            if (!email) {
                showToast('Please enter your email address', 'error');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showToast('Please enter a valid email address', 'error');
                return;
            }

            showLoading();

            try {
                // Send password reset email
                await account.createRecovery(
                    email,
                    window.location.origin + '/reset-password.html'
                );

                // Update sent email display
                document.getElementById('sentEmail').textContent = email;
                
                // Go to step 2
                goToStep(2);
                
                showToast('Reset link sent! Check your email.', 'success');

            } catch (error) {
                console.error('Send reset link error:', error);
                
                if (error.message.includes('user')) {
                    showToast('No account found with this email', 'error');
                } else {
                    showToast('Failed to send reset link. Please try again.', 'error');
                }
            } finally {
                hideLoading();
            }
        }

        /**
         * Resend reset link
         */
        async function resendResetLink() {
            const email = document.getElementById('sentEmail').textContent;
            await sendResetLink(email);
        }

        /**
         * Update password with new one
         */
        async function updatePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || !confirmPassword) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (newPassword.length < 8) {
                showToast('Password must be at least 8 characters long', 'error');
                return;
            }

            // Check if we have userId and secret from URL
            if (!userId || !secret) {
                showToast('Invalid reset link. Please request a new one.', 'error');
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 2000);
                return;
            }

            showLoading();

            try {
                // Complete password reset
                await account.updateRecovery(
                    userId,
                    secret,
                    newPassword,
                    confirmPassword
                );

                showToast('Password updated successfully! Redirecting to login...', 'success');

                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 2000);

            } catch (error) {
                console.error('Update password error:', error);
                showToast('Failed to update password. Please try again.', 'error');
            } finally {
                hideLoading();
            }
        }

        /**
         * Validate reset token
         */
        async function validateResetToken() {
            if (!userId || !secret) return;
            
            showLoading();
            
            try {
                // You can validate the token here if needed
                // This is automatically handled by updateRecovery
                
            } catch (error) {
                console.error('Token validation error:', error);
                showToast('Invalid or expired reset link', 'error');
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 2000);
            } finally {
                hideLoading();
            }
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Validate token if present
            if (userId && secret) {
                validateResetToken();
            }
        });

        // ==================== SERVICE WORKER ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.log('ServiceWorker registration failed');
                });
            });
        }
    </script>
</body>
</html>
