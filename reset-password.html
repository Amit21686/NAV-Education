<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Password | NAV Education</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Appwrite SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f52e0;
            --secondary: #8b5cf6;
            --bg-dark: #020617;
            --text-dark: #f1f5f9;
            --muted-dark: #94a3b8;
            --success: #10b981;
            --error: #f43f5e;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, 
                rgba(99, 102, 241, 0.15) 0%,
                transparent 70%);
            pointer-events: none;
        }

        .reset-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .banner-container {
            width: 100%;
            margin-bottom: 30px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
            animation: slideDown 0.8s ease;
        }

        .banner-image {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted-dark);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 25px;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--muted-dark);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .steps::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .step {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .step-number {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            margin: 0 auto 8px;
            transition: all 0.3s ease;
        }

        .step.active .step-number {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .step.completed .step-number {
            background: var(--success);
            color: white;
        }

        .step-label {
            font-size: 0.75rem;
            color: var(--muted-dark);
        }

        .step.active .step-label {
            color: var(--primary);
            font-weight: 500;
        }

        .reset-form {
            display: none;
        }

        .reset-form.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-dark);
            font-size: 1.1rem;
            transition: color 0.3s ease;
            z-index: 1;
        }

        .input-field {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-field:focus + .input-icon {
            color: var(--primary);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-dark);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.3s ease;
            z-index: 1;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .success-message {
            text-align: center;
            padding: 20px 0;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .success-title {
            font-size: 1.5rem;
            color: var(--success);
            margin-bottom: 10px;
        }

        .success-text {
            color: var(--muted-dark);
            margin-bottom: 30px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .reset-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="reset-container">
        <div class="banner-container">
            <img src="https://raw.githubusercontent.com/Amit21686/NAV_Education/refs/heads/main/images/NAV%20Education%20banner.png" 
                 alt="NAV Education Banner" 
                 class="banner-image">
        </div>

        <div class="reset-card">
            <div class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                Back to Login
            </div>

            <h1>Reset Password</h1>
            <div class="subtitle">Enter your new password below</div>

            <!-- Password Reset Form -->
            <div id="resetForm" class="reset-form active">
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="newPassword" class="input-field" placeholder="New Password">
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword', this)"></i>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm New Password">
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
                </div>

                <button class="btn btn-primary" onclick="updatePassword()">
                    <i class="fas fa-check-circle" style="margin-right: 8px;"></i>
                    Update Password
                </button>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="success-message" style="display: none;">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2 class="success-title">Password Updated!</h2>
                <div class="success-text">
                    Your password has been successfully reset.
                </div>
                <button class="btn btn-primary" onclick="goToLogin()">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                    Go to Login
                </button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast"></div>

    <script>
        const client = new Appwrite.Client();
        client
            .setEndpoint("https://sgp.cloud.appwrite.io/v1")
            .setProject("nav-education");

        const account = new Appwrite.Account(client);

        let userId = '';
        let secret = '';
        let activeToast = null;
        let loadingOverlay = document.getElementById('loadingOverlay');

        function showLoading() {
            loadingOverlay.classList.add('active');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('active');
        }

        function showToast(message, type = 'info', duration = 3000) {
            if (activeToast) {
                activeToast.classList.remove('show');
                setTimeout(() => {
                    if (activeToast.parentNode) activeToast.parentNode.removeChild(activeToast);
                    activeToast = null;
                }, 300);
            }

            const toast = document.getElementById('toastContainer');
            toast.className = `toast ${type}`;
            
            const icon = document.createElement('i');
            icon.className = type === 'success' ? 'fas fa-check-circle' : 
                            type === 'error' ? 'fas fa-exclamation-circle' : 
                            'fas fa-info-circle';
            
            toast.innerHTML = '';
            toast.appendChild(icon);
            toast.appendChild(document.createTextNode(' ' + message));
            toast.classList.add('show');
            activeToast = toast;

            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function togglePassword(inputId, element) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                element.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                element.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function goBack() {
            window.location.href = 'auth.html';
        }

        function goToLogin() {
            window.location.href = 'auth.html';
        }

        // Get parameters from URL
        function getUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            userId = urlParams.get('userId') || '';
            secret = urlParams.get('secret') || '';
            
            if (!userId || !secret) {
                showToast('Invalid reset link. Please request a new one.', 'error');
                setTimeout(() => window.location.href = 'auth.html', 3000);
            }
        }

        // Update password
        async function updatePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || !confirmPassword) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (newPassword.length < 8) {
                showToast('Password must be at least 8 characters', 'error');
                return;
            }

            showLoading();

            try {
                await account.updateRecovery(
                    userId,
                    secret,
                    newPassword,
                    confirmPassword
                );

                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                showToast('Password updated successfully!', 'success');

            } catch (error) {
                console.error('Update error:', error);
                
                if (error.message.includes('expired')) {
                    showToast('Reset link has expired. Please request a new one.', 'error');
                } else {
                    showToast(error.message || 'Failed to update password', 'error');
                }
            } finally {
                hideLoading();
            }
        }

        document.addEventListener('DOMContentLoaded', getUrlParams);
    </script>
</body>
</html>
