<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Canvas Viewer | NAV Education</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Montserrat:wght@400;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'none' },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        /* ===== RESET & VARIABLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #6366f1; --secondary: #8b5cf6;
            --bg-dark: #020617; --bg-light: #f8fafc;
            --card-dark: rgba(30, 41, 59, 0.8); --card-light: rgba(255, 255, 255, 0.9);
            --text-dark: #f1f5f9; --text-light: #0f172a;
            --border-dark: rgba(255, 255, 255, 0.08); --border-light: rgba(0, 0, 0, 0.08);
            --danger: #f43f5e;
        }

        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: var(--text-dark); 
            height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Animated Background */
        body::before { 
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: radial-gradient(circle at 70% 30%, rgba(99,102,241,0.15) 0%, transparent 70%); 
            animation: rotateBg 40s linear infinite; pointer-events: none; z-index: 0; 
        }
        @keyframes rotateBg { to { transform: rotate(360deg); } }

        .app-header { 
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); padding: 15px 20px; 
            display: flex; align-items: center; justify-content: space-between; z-index: 1000; 
            border-bottom: 1px solid var(--border-dark); flex-shrink: 0; position: relative;
        }
        
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card-dark); border: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dark); transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); }

        .header-title { font-weight: 600; font-size: 1.1rem; text-align: center; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 15px; }

        .font-controls { display: flex; gap: 8px; align-items: center; background: var(--card-dark); border: 1px solid var(--border-dark); border-radius: 30px; padding: 4px 8px; }
        .font-btn { background: transparent; border: none; color: var(--text-dark); cursor: pointer; font-size: 1rem; font-weight: 600; padding: 4px 10px; transition: 0.2s;}
        .font-btn:active { transform: scale(0.85); }

        /* ===== SMART CANVAS VIEWPORT ===== */
        .canvas-viewport {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: auto;
            position: relative;
            -webkit-overflow-scrolling: touch;
            z-index: 1;
            padding: 20px;
            touch-action: pan-x pan-y; 
        }

        .canvas-scale-wrapper {
            transform-origin: top left;
            transition: transform 0.1s linear; 
            margin: 0 auto;
            position: relative;
        }
        
        .canvas-board {
            width: 1200px;
            min-height: 1000px;
            background: rgba(2, 6, 23, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-dark);
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            z-index: 1;
        }

        /* 1:1 CSS MATCH WITH ADMIN PORTAL */
        .canvas-element {
            position: absolute;
            min-height: 40px;
            min-width: 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .fill-space { height: 100% !important; display: flex; flex-direction: column; justify-content: center; align-items: center;}

        .notes-content-editable { 
            flex: 1;
            width: 100%; height: auto; min-height: 100%;
            padding: 8px; /* CRITICAL: Matches editor offset padding */
            color: rgba(255,255,255,0.95);
            font-size: 16px; line-height: 1.5;
            white-space: pre-wrap; word-wrap: break-word; 
            overflow: visible; 
        }

        .notes-content-editable h1, .notes-content-editable h2 { 
            color: inherit; 
            font-family: inherit; 
        }

        .notes-content-editable h1 { font-size: 2.2em; font-weight: 700; margin: 0; }
        .notes-content-editable h2 { font-size: 1.8em; font-weight: 600; margin: 0; }
        .notes-content-editable p { margin: 0; }
        
        .notes-content-editable img { width: 100%; height: 100%; display: block; border-radius: 8px; pointer-events: none; object-fit: contain;}

        .tb-grid { display: grid; flex: 1; width: 100%; height: 100%; min-height: 60px; border: 1px solid var(--border-dark); border-radius: 4px; box-sizing: border-box;}
        .tb-cell { border: 1px solid var(--border-dark); padding: 8px; color: white; outline: none; background: rgba(0,0,0,0.2); min-width: 20px;}
        .tb-header { background: rgba(99,102,241,0.15); color: var(--primary); font-weight: 600; }

        .math-wrapper { display: inline-block; vertical-align: middle; font-size: 0.95em;}
        .math-render-target { pointer-events: none; }

        /* LOADING & ERROR UI */
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 30000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 15px; color: white;}
        .loading-overlay.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border-dark); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-card { background: rgba(244, 63, 94, 0.1); border: 1px solid var(--danger); border-radius: var(--radius-md); padding: 30px 20px; text-align: center; margin: 40px auto; max-width: 400px; color: var(--text-dark);}

        /* PDF Printing Override */
        body.pdf-printing { overflow: visible !important; background: #020617 !important; }
        body.pdf-printing::before { display: none !important; }
        body.pdf-printing .canvas-viewport { overflow: visible !important; padding: 0 !important; background: none !important;}
        body.pdf-printing .canvas-scale-wrapper { transform: scale(1) !important; margin: 0 !important; width: 1200px !important; }
        body.pdf-printing .canvas-board { box-shadow: none !important; border: none !important; background: #020617 !important;}
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay active">
        <div class="spinner"></div>
        <div id="loadingText" style="font-weight: 500;">Rendering Canvas...</div>
    </div>

    <header class="app-header">
        <div class="icon-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
        <div class="header-title" id="headerTitle">Board View</div>
        <div class="font-controls">
            <button class="font-btn" onclick="changeZoom(-0.1)" title="Zoom Out"><i class="fas fa-search-minus"></i></button>
            <div style="width:1px; background:var(--border-dark); margin:4px 0; height:18px;"></div>
            <button class="font-btn" onclick="changeZoom(0.1)" title="Zoom In"><i class="fas fa-search-plus"></i></button>
            <div style="width:1px; background:var(--border-dark); margin:4px 0; height:18px;"></div>
            <button class="font-btn" onclick="exportSmartBoardPDF()" title="Download PDF"><i class="fas fa-download" style="color: var(--success);"></i></button>
        </div>
    </header>

    <div class="canvas-viewport" id="mainViewport">
        <div class="canvas-scale-wrapper" id="canvasScaleWrapper">
            <div class="canvas-board" id="canvasBoard">
                </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    
    <script>
        let cachedNoteData = null; 
        let currentZoom = 1;
        const BOARD_WIDTH = 1200;

        const safetyTimeout = setTimeout(() => {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay.classList.contains('active')) {
                overlay.classList.remove('active');
                document.getElementById('canvasBoard').innerHTML = `
                    <div class="error-card">
                        <i class="fas fa-wifi" style="font-size:3rem; color:var(--warning); margin-bottom:15px;"></i>
                        <h3 style="color:var(--warning); margin-bottom:10px;">Connection Timeout</h3>
                        <div style="font-size: 0.95rem; line-height: 1.5;">The server took too long to respond. Check your network.</div>
                    </div>
                `;
            }
        }, 8000);

        function goBack() { window.history.length > 1 ? window.history.back() : window.location.href = 'library.html'; }

        function changeZoom(amount, absoluteVal = null) {
            if (absoluteVal !== null) {
                currentZoom = absoluteVal;
            } else {
                currentZoom += amount;
            }
            
            if(currentZoom < 0.2) currentZoom = 0.2;
            if(currentZoom > 3.0) currentZoom = 3.0;
            
            const wrapper = document.getElementById('canvasScaleWrapper');
            const board = document.getElementById('canvasBoard');
            
            wrapper.style.transform = `scale(${currentZoom})`;
            
            const newWidth = BOARD_WIDTH * currentZoom;
            const newHeight = board.scrollHeight * currentZoom;
            
            wrapper.style.width = `${newWidth}px`;
            wrapper.style.height = `${newHeight}px`;

            const vpWidth = document.getElementById('mainViewport').clientWidth - 40; 
            if (newWidth < vpWidth) {
                wrapper.style.marginLeft = `${(vpWidth - newWidth) / 2}px`;
            } else {
                wrapper.style.marginLeft = '0';
            }
        }

        // PINCH-TO-ZOOM MULTI-TOUCH PHYSICS ENGINE
        const viewport = document.getElementById('mainViewport');
        let initialDistance = null;
        let initialZoom = 1;

        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                initialZoom = currentZoom;
            }
        }, { passive: false });

        viewport.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialDistance) {
                e.preventDefault(); 
                const currentDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const scaleFactor = currentDistance / initialDistance;
                changeZoom(0, initialZoom * scaleFactor);
            }
        }, { passive: false });

        viewport.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialDistance = null;
            }
        });

        function wrapMath(html) {
            if(!html) return '';
            let res = String(html).replace(/\$\$(.*?)\$\$/g, (m) => `<span class="math-wrapper">${m}</span>`);
            res = res.replace(/\\\((.*?)\\\)/g, (m) => `<span class="math-wrapper">${m}</span>`);
            return res;
        }

        async function loadCanvasData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const file = urlParams.get('file');

                if (!file) throw new Error("No file provided in the URL.");

                const response = await fetch(file);
                if (!response.ok) throw new Error(`HTTP Error ${response.status}: Could not find the file '${file}'.`);
                
                const data = await response.json();
                
                if (!data || !data.blocks || !Array.isArray(data.blocks)) {
                    throw new Error("Format Mismatch! The file loaded but does NOT contain the required 'blocks' array.");
                }

                cachedNoteData = data; 
                renderCanvas(data);

            } catch(error) {
                document.getElementById('canvasBoard').innerHTML = `
                    <div class="error-card">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:var(--danger); margin-bottom:15px;"></i>
                        <h3 style="color:var(--danger); margin-bottom:10px;">Diagnostic Error</h3>
                        <div style="font-size: 0.95rem; line-height: 1.5; text-align: left;">${error.message}</div>
                    </div>
                `;
                clearTimeout(safetyTimeout);
                document.getElementById('loadingOverlay').classList.remove('active');
            }
        }

        function renderCanvas(data) {
            if (data.title) document.getElementById('headerTitle').textContent = data.title;

            const board = document.getElementById('canvasBoard');
            board.innerHTML = '';
            
            let maxBottomEdge = 1000; 

            data.blocks.forEach((b, i) => {
                if(!b) return;

                let w = b.w || '300px'; let h = b.h || 'auto';
                let x = b.x || '20px'; let y = b.y || (i * 100 + 20) + 'px'; 
                
                // Strict Layer / Z-Index Parsing
                let z = parseInt(b.z, 10);
                if (isNaN(z) || z == null) z = i + 10; 

                // Safe HTML Escape
                let safeStyles = (b.style || '').replace(/"/g, '&quot;').replace(/'/g, '&apos;');

                let innerHTML = '';
                let fillClass = (b.type === 'table' || b.type === 'image' || b.type === 'expression') ? 'fill-space' : '';

                if (b.type === 'image') {
                    innerHTML = `<div class="notes-content-editable ${fillClass}"><img src="${b.content || ''}" style="width:100%;height:100%;"></div>`;
                } else if (b.type === 'expression') {
                    innerHTML = `<div class="notes-content-editable ${fillClass}" style="display:flex; align-items:center; justify-content:center; flex-direction:column; padding:20px; text-align:center; ${safeStyles}">
                                    <div class="math-render-target">${wrapMath(b.content || '')}</div>
                                 </div>`;
                } else if (b.type === 'table') {
                    let rows = (b.content && typeof b.content === 'object' && b.content.rows) ? b.content.rows : 3; 
                    let cols = (b.content && typeof b.content === 'object' && b.content.cols) ? b.content.cols : 3;
                    innerHTML = `<div class="notes-content-editable ${fillClass}" style="${safeStyles}">
                                    <div class="tb-grid" style="grid-template-columns: repeat(${cols}, 1fr);">`;
                    for(let r=0; r<rows; r++) {
                        for(let c=0; c<cols; c++) {
                            let val = (b.content && typeof b.content === 'object' && b.content.data && b.content.data[r]) ? (b.content.data[r][c] || '') : '';
                            let isHeader = r===0 ? 'tb-header' : '';
                            innerHTML += `<div class="tb-cell ${isHeader}">${wrapMath(val)}</div>`;
                        }
                    }
                    innerHTML += `</div></div>`;
                } else {
                    let tag = b.type === 'h1' ? 'h1' : (b.type === 'h2' ? 'h2' : 'div');
                    innerHTML = `<div class="notes-content-editable" style="${safeStyles}"><${tag}>${wrapMath(b.content || '<br>')}</${tag}></div>`;
                }

                // Explicit z-index assignment
                let elHtml = `<div class="canvas-element" style="left:${x}; top:${y}; width:${w}; height:${h}; z-index:${z};">
                                ${innerHTML}
                              </div>`;
                board.insertAdjacentHTML('beforeend', elHtml);

                let yVal = parseInt(y.replace('px','')) || 0;
                let hVal = parseInt(h.replace('px','')) || 200; 
                if (yVal + hVal > maxBottomEdge) {
                    maxBottomEdge = yVal + hVal;
                }
            });

            board.style.minHeight = (maxBottomEdge + 150) + 'px';

            let initialScale = 1;
            const vpWidth = document.getElementById('mainViewport').clientWidth - 40;
            if (vpWidth < BOARD_WIDTH) {
                initialScale = vpWidth / BOARD_WIDTH;
            }
            changeZoom(0, initialScale);

            setTimeout(() => {
                if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                    MathJax.typesetPromise([board]).then(() => {
                        clearTimeout(safetyTimeout);
                        document.getElementById('loadingOverlay').classList.remove('active');
                        changeZoom(0, currentZoom); 
                    });
                } else {
                    clearTimeout(safetyTimeout);
                    document.getElementById('loadingOverlay').classList.remove('active');
                }
            }, 200);
        }

        async function exportSmartBoardPDF() {
            if (typeof html2pdf === 'undefined') {
                alert("PDF Engine loading. Try again in a moment.");
                return;
            }
            if (!cachedNoteData) return alert("Canvas data is missing.");

            const overlay = document.getElementById('loadingOverlay');
            const loadText = document.getElementById('loadingText');
            overlay.classList.add('active');
            
            // Fetch Logo for Watermark
            loadText.textContent = "Fetching Watermark Logo...";
            const logoObj = await new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                    resolve({ b64: canvas.toDataURL('image/png'), ratio: img.height / img.width });
                };
                img.onerror = () => resolve(null);
                img.src = 'https://raw.githubusercontent.com/Amit21686/NAV-Education/main/logo.png';
            });

            document.body.classList.add('pdf-printing');
            document.querySelector('.app-header').style.display = 'none';
            
            await new Promise(r => setTimeout(r, 200));

            const board = document.getElementById('canvasBoard');
            const docTitle = cachedNoteData.title || 'NAV_Board';
            
            loadText.textContent = "Generating 16:9 Smart Board PDF...";

            // 1200x675 forces 16:9 Landscape pages, cutting perfectly for smart panels
            const opt = {
                margin:       0, 
                filename:     `${docTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_smartboard.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0, 
                    scrollX: 0, 
                    width: BOARD_WIDTH,
                    windowWidth: BOARD_WIDTH,
                    backgroundColor: '#020617' 
                }, 
                jsPDF: { unit: 'px', format: [1200, 675], orientation: 'landscape', hotfixes: ["px_scaling"] }
            };

            try {
                await html2pdf().set(opt).from(board).toPdf().get('pdf').then(function(pdf) {
                    const totalPages = pdf.internal.getNumberOfPages();
                    for (let i = 1; i <= totalPages; i++) {
                        pdf.setPage(i);
                        // Inject Logo into top right of every smartboard slide
                        if (logoObj && logoObj.b64) {
                            const logoWidth = 110;
                            const logoHeight = logoWidth * logoObj.ratio;
                            pdf.addImage(logoObj.b64, 'PNG', 1200 - logoWidth - 30, 25, logoWidth, logoHeight);
                        }
                    }
                }).save();
            } catch(e) {
                console.error("PDF Error:", e);
                alert("Failed to generate PDF. Memory might be full.");
            } finally {
                document.body.classList.remove('pdf-printing');
                document.querySelector('.app-header').style.display = 'flex';
                changeZoom(0, currentZoom); 
                overlay.classList.remove('active');
                loadText.textContent = "Rendering Canvas...";
            }
        }

        window.onload = loadCanvasData;
    </script>
</body>
</html>
