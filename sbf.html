<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Canvas Viewer | NAV Education</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Montserrat:wght@400;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'none' },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        /* ===== RESET & VARIABLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #6366f1; --secondary: #8b5cf6;
            --bg-dark: #020617; --bg-light: #f8fafc;
            --card-dark: rgba(30, 41, 59, 0.8); --card-light: rgba(255, 255, 255, 0.9);
            --text-dark: #f1f5f9; --text-light: #0f172a;
            --border-dark: rgba(255, 255, 255, 0.08); --border-light: rgba(0, 0, 0, 0.08);
            --radius-md: 12px;
        }

        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: var(--text-dark); 
            height: 100dvh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
            transition: background 0.3s, color 0.3s; 
        }
        body.light-theme { background: var(--bg-light); color: var(--text-light); }

        .app-header { 
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); padding: 15px 20px; 
            display: flex; align-items: center; justify-content: space-between; z-index: 1000; 
            border-bottom: 1px solid var(--border-dark); flex-shrink: 0;
        }
        body.light-theme .app-header { background: rgba(248, 250, 252, 0.85); border-color: var(--border-light); }
        
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card-dark); border: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dark); transition: 0.2s; }
        body.light-theme .icon-btn { background: var(--card-light); border-color: var(--border-light); color: var(--text-light); }
        .icon-btn:active { transform: scale(0.9); }

        .header-title { font-weight: 600; font-size: 1.1rem; text-align: center; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 15px; }

        .font-controls { display: flex; gap: 8px; align-items: center; background: var(--card-dark); border: 1px solid var(--border-dark); border-radius: 30px; padding: 4px 8px; }
        body.light-theme .font-controls { background: var(--card-light); border-color: var(--border-light); }
        .font-btn { background: transparent; border: none; color: var(--text-dark); cursor: pointer; font-size: 1rem; font-family: 'Poppins'; font-weight: 600; padding: 4px 8px; transition: 0.2s;}
        body.light-theme .font-btn { color: var(--text-light); }
        .font-btn:active { transform: scale(0.85); }

        /* ===== CANVAS VIEWER AREA ===== */
        .canvas-viewport {
            flex: 1;
            width: 100%;
            overflow: auto; /* Allows panning around the large canvas */
            background: #0f172a;
            position: relative;
            padding: 20px;
            /* Smooth scrolling */
            -webkit-overflow-scrolling: touch;
        }
        
        .canvas-board {
            width: 1200px; /* Exact match to admin portal width */
            min-height: 1000px;
            background: var(--bg-dark);
            position: relative;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            transform-origin: top center;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth zoom */
        }
        body.light-theme .canvas-board { background: var(--bg-light); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }

        .canvas-element {
            position: absolute;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            color: rgba(255,255,255,0.95);
            font-size: 16px; 
            line-height: 1.5;
            white-space: pre-wrap; 
            word-wrap: break-word; 
        }
        body.light-theme .canvas-element { color: rgba(0,0,0,0.9); }

        .canvas-element h1 { font-size: 2.2em; font-weight: 700; margin: 0; }
        .canvas-element h2 { font-size: 1.8em; font-weight: 600; margin: 0; }
        .canvas-element p { margin: 0; }
        
        .canvas-element img { width: 100%; height: 100%; display: block; border-radius: 8px; object-fit: contain; }

        /* Draggable Table Styles - Viewer Mirror */
        .tb-grid { display: grid; flex: 1; width: 100%; height: 100%; min-height: 60px; border: 1px solid var(--border-dark); border-radius: 4px; box-sizing: border-box;}
        body.light-theme .tb-grid { border-color: var(--border-light); }
        .tb-cell { border: 1px solid var(--border-dark); padding: 8px; outline: none; background: rgba(0,0,0,0.2); min-width: 20px;}
        body.light-theme .tb-cell { border-color: var(--border-light); background: rgba(255,255,255,0.5); color: var(--text-light); }
        .tb-header { background: rgba(99,102,241,0.15); color: var(--primary); font-weight: 600; }

        .math-wrapper { display: inline-block; vertical-align: middle; }

        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 30000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 15px; color: white;}
        .loading-overlay.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border-dark); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-card { background: rgba(244, 63, 94, 0.1); border: 1px solid var(--danger); border-radius: var(--radius-md); padding: 30px 20px; text-align: center; margin: 40px auto; max-width: 400px; color: var(--text-dark);}

        /* PDF Printing Override */
        body.pdf-printing .canvas-viewport { overflow: visible; padding: 0; background: none;}
        body.pdf-printing .canvas-board { transform: scale(1) !important; box-shadow: none; margin: 0; }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay active">
        <div class="spinner"></div>
        <div id="loadingText" style="font-weight: 500;">Rendering Canvas...</div>
    </div>

    <header class="app-header">
        <div class="icon-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
        <div class="header-title" id="headerTitle">Board View</div>
        <div class="font-controls">
            <button class="font-btn" onclick="changeZoom(-0.1)" title="Zoom Out"><i class="fas fa-search-minus"></i></button>
            <div style="width:1px; background:var(--border-dark); margin:4px 0; height:18px;"></div>
            <button class="font-btn" onclick="changeZoom(0.1)" title="Zoom In"><i class="fas fa-search-plus"></i></button>
            <div style="width:1px; background:var(--border-dark); margin:4px 0; height:18px;"></div>
            <button class="font-btn" onclick="exportCanvasPDF()" title="Download PDF"><i class="fas fa-download"></i></button>
        </div>
    </header>

    <div class="canvas-viewport" id="mainViewport">
        <div class="canvas-board" id="canvasBoard">
            </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    
    <script>
        let cachedNoteData = null; 
        let currentZoom = 1;

        // Auto-scale down slightly on mobile to fit the 1200px board better initially
        if (window.innerWidth < 800) {
            currentZoom = window.innerWidth / 1250; 
        }

        const safetyTimeout = setTimeout(() => {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay.classList.contains('active')) {
                overlay.classList.remove('active');
                document.getElementById('canvasBoard').innerHTML = `
                    <div class="error-card">
                        <i class="fas fa-wifi" style="font-size:3rem; color:var(--warning); margin-bottom:15px;"></i>
                        <h3 style="color:var(--warning); margin-bottom:10px;">Connection Timeout</h3>
                        <div style="font-size: 0.95rem; line-height: 1.5;">The server took too long to respond.</div>
                    </div>
                `;
            }
        }, 8000);

        function applyTheme() {
            try {
                if (localStorage.getItem('nav_darkMode') === 'false') document.body.classList.add('light-theme');
                const accent = localStorage.getItem('nav_accentColor');
                if (accent) document.documentElement.style.setProperty('--primary', accent);
            } catch(e) {}
        }
        applyTheme();

        function goBack() { window.history.length > 1 ? window.history.back() : window.location.href = 'library.html'; }

        function changeZoom(amount) {
            currentZoom += amount;
            if(currentZoom < 0.2) currentZoom = 0.2;
            if(currentZoom > 3.0) currentZoom = 3.0;
            
            document.getElementById('canvasBoard').style.transform = `scale(${currentZoom})`;
        }

        function wrapMath(html) {
            if(!html) return '';
            // Safely parse out the raw math inside the $$ or \( blocks for viewing
            let res = String(html).replace(/\$\$(.*?)\$\$/g, (m) => `<span class="math-wrapper">${m}</span>`);
            res = res.replace(/\\\((.*?)\\\)/g, (m) => `<span class="math-wrapper">${m}</span>`);
            return res;
        }

        async function loadCanvasData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const file = urlParams.get('file');

                if (!file) throw new Error("No file provided in the URL.");

                const response = await fetch(file);
                if (!response.ok) throw new Error(`HTTP Error ${response.status}: Could not find the file '${file}'.`);
                
                const data = await response.json();
                
                // Flexible check: accepts Canvas format blocks
                if (!data || !data.blocks || !Array.isArray(data.blocks)) {
                    throw new Error("Format Mismatch! The file loaded but does NOT contain the required 'blocks' array.");
                }

                cachedNoteData = data; 
                renderCanvas(data);

            } catch(error) {
                document.getElementById('canvasBoard').innerHTML = `
                    <div class="error-card">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:var(--danger); margin-bottom:15px;"></i>
                        <h3 style="color:var(--danger); margin-bottom:10px;">Diagnostic Error</h3>
                        <div style="font-size: 0.95rem; line-height: 1.5; text-align: left;">${error.message}</div>
                    </div>
                `;
                clearTimeout(safetyTimeout);
                document.getElementById('loadingOverlay').classList.remove('active');
            }
        }

        function renderCanvas(data) {
            if (data.title) {
                document.getElementById('headerTitle').textContent = data.title;
            }

            const board = document.getElementById('canvasBoard');
            board.innerHTML = '';
            
            let maxBottomEdge = 1000; // Minimum board height

            data.blocks.forEach((b, i) => {
                if(!b) return;

                let w = b.w || '300px'; let h = b.h || 'auto';
                let x = b.x || '20px'; let y = b.y || (i * 100 + 20) + 'px'; let z = b.z || 10;
                let cStyles = b.style || '';

                let innerHTML = '';
                let fillClass = (b.type === 'table' || b.type === 'image' || b.type === 'expression') ? 'height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;' : '';

                if (b.type === 'image') {
                    innerHTML = `<div style="width:100%; height:100%;"><img src="${b.content || ''}" style="width:100%; height:100%; object-fit:contain; border-radius: 8px; display: block;"></div>`;
                } else if (b.type === 'expression') {
                    // Stripped border and bg for clean view mode
                    innerHTML = `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; padding:20px; text-align:center; ${cStyles}">
                                    <div class="math-render-target">${wrapMath(b.content || '')}</div>
                                 </div>`;
                } else if (b.type === 'table') {
                    let rows = (b.content && typeof b.content === 'object' && b.content.rows) ? b.content.rows : 3; 
                    let cols = (b.content && typeof b.content === 'object' && b.content.cols) ? b.content.cols : 3;
                    innerHTML = `<div style="width:100%; height:100%; ${cStyles}">
                                    <div class="tb-grid" style="grid-template-columns: repeat(${cols}, 1fr);">`;
                    for(let r=0; r<rows; r++) {
                        for(let c=0; c<cols; c++) {
                            let val = (b.content && typeof b.content === 'object' && b.content.data && b.content.data[r]) ? (b.content.data[r][c] || '') : '';
                            let isHeader = r===0 ? 'tb-header' : '';
                            innerHTML += `<div class="tb-cell ${isHeader}">${wrapMath(val)}</div>`;
                        }
                    }
                    innerHTML += `</div></div>`;
                } else {
                    let tag = b.type === 'h1' ? 'h1' : (b.type === 'h2' ? 'h2' : 'div');
                    innerHTML = `<div style="${cStyles}"><${tag}>${wrapMath(b.content || '')}</${tag}></div>`;
                }

                let elHtml = `<div class="canvas-element" style="left:${x}; top:${y}; width:${w}; height:${h}; z-index:${z}; ${fillClass}">
                                ${innerHTML}
                              </div>`;
                board.insertAdjacentHTML('beforeend', elHtml);

                // Track the lowest element to dynamically set the canvas board height
                let yVal = parseInt(y.replace('px','')) || 0;
                let hVal = parseInt(h.replace('px','')) || 200; // Estimated height for 'auto'
                if (yVal + hVal > maxBottomEdge) {
                    maxBottomEdge = yVal + hVal;
                }
            });

            // Add padding to the bottom of the board so nothing is cut off
            board.style.minHeight = (maxBottomEdge + 200) + 'px';

            // Apply initial zoom transform
            board.style.transform = `scale(${currentZoom})`;

            setTimeout(() => {
                if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                    MathJax.typesetPromise([board]).then(() => {
                        clearTimeout(safetyTimeout);
                        document.getElementById('loadingOverlay').classList.remove('active');
                    });
                } else {
                    clearTimeout(safetyTimeout);
                    document.getElementById('loadingOverlay').classList.remove('active');
                }
            }, 200);
        }

        async function exportCanvasPDF() {
            if (typeof html2pdf === 'undefined') {
                alert("PDF Generator is still loading. Please wait a few seconds.");
                return;
            }
            if (!cachedNoteData) return alert("Canvas data is corrupted.");

            const overlay = document.getElementById('loadingOverlay');
            const loadText = document.getElementById('loadingText');
            overlay.classList.add('active');
            
            document.body.classList.add('pdf-printing');
            document.querySelector('.app-header').style.display = 'none';
            
            // Reset zoom to 1 for perfect 1:1 PDF scaling
            const originalZoom = currentZoom;
            const board = document.getElementById('canvasBoard');
            board.style.transform = `scale(1)`;
            
            loadText.textContent = "Taking High-Res Snapshot...";
            const docTitle = cachedNoteData.title || 'NAV_Board';

            // We use a continuous portrait PDF fitted perfectly to the 1200px board width
            const opt = {
                margin:       0, 
                filename:     `${docTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_board.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0, 
                    scrollX: 0, 
                    width: 1200, 
                    windowWidth: 1200,
                    backgroundColor: getComputedStyle(document.body).getPropertyValue('--bg-dark').trim()
                }, 
                jsPDF:        { unit: 'px', format: [1200, 1600], orientation: 'portrait', hotfixes: ["px_scaling"] }
            };

            try {
                await html2pdf().set(opt).from(board).save();
            } catch(e) {
                console.error("PDF Error:", e);
                alert("Failed to generate PDF: " + e.message);
            } finally {
                document.body.classList.remove('pdf-printing');
                document.querySelector('.app-header').style.display = 'flex';
                // Restore zoom
                currentZoom = originalZoom;
                board.style.transform = `scale(${currentZoom})`;
                overlay.classList.remove('active');
            }
        }

        window.onload = loadCanvasData;
    </script>
</body>
</html>
