<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notes | NAV Education</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #6366f1; --secondary: #8b5cf6;
            --bg-dark: #020617; --bg-light: #f8fafc;
            --card-dark: rgba(30, 41, 59, 0.8); --card-light: rgba(255, 255, 255, 0.9);
            --text-dark: #f1f5f9; --text-light: #0f172a;
            --muted-dark: #94a3b8; --muted-light: #64748b;
            --border-dark: rgba(255, 255, 255, 0.08); --border-light: rgba(0, 0, 0, 0.08);
            --success: #10b981; --error: #f43f5e; --warning: #f59e0b; --info: #3b82f6;
            --radius-md: 12px; --radius-lg: 20px;
            --base-font-size: 16px; 
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        body.light-theme { background: var(--bg-light); color: var(--text-light); }

        body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 70% 30%, rgba(99,102,241,0.12) 0%, transparent 70%); animation: rotateBg 40s linear infinite; pointer-events: none; z-index: 0; }
        @keyframes rotateBg { to { transform: rotate(360deg); } }

        #readingProgress { position: fixed; top: 0; left: 0; height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; z-index: 9999; transition: width 0.1s; }

        .app-header { position: sticky; top: 0; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; border-bottom: 1px solid var(--border-dark); }
        body.light-theme .app-header { background: rgba(248, 250, 252, 0.85); border-color: var(--border-light); }
        
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card-dark); border: 1px solid var(--border-dark); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dark); transition: 0.2s; }
        body.light-theme .icon-btn { background: var(--card-light); border-color: var(--border-light); color: var(--text-light); }

        .header-title { font-weight: 600; font-size: 1.1rem; text-align: center; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 15px; }

        .font-controls { display: flex; gap: 8px; align-items: center; background: var(--card-dark); border: 1px solid var(--border-dark); border-radius: 30px; padding: 4px 8px; }
        body.light-theme .font-controls { background: var(--card-light); border-color: var(--border-light); }
        .font-btn { background: transparent; border: none; color: var(--text-dark); cursor: pointer; font-size: 1rem; font-family: 'Poppins'; font-weight: 600; padding: 2px 6px; transition: 0.2s;}
        body.light-theme .font-btn { color: var(--text-light); }

        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px 80px; position: relative; z-index: 1; }

        .doc-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 5px; line-height: 1.2; background: linear-gradient(135deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        body.light-theme .doc-title { background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .doc-topic { color: var(--primary); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 30px; display: inline-block; padding: 4px 12px; background: rgba(99,102,241,0.1); border-radius: 20px;}

        /* ===== NOTES RENDERER STYLES ===== */
        .notes-content { font-size: var(--base-font-size); line-height: 1.7; color: rgba(255,255,255,0.9); }
        body.light-theme .notes-content { color: rgba(0,0,0,0.8); }

        .notes-content h1 { font-size: 1.8em; margin: 1.5em 0 0.5em; font-weight: 700; color: var(--text-dark); border-bottom: 1px solid var(--border-dark); padding-bottom: 8px;}
        .notes-content h2 { font-size: 1.5em; margin: 1.2em 0 0.5em; font-weight: 600; color: var(--text-dark); }
        .notes-content h3 { font-size: 1.2em; margin: 1em 0 0.5em; font-weight: 600; color: var(--text-dark); }
        body.light-theme .notes-content h1, body.light-theme .notes-content h2, body.light-theme .notes-content h3 { color: var(--text-light); border-color: var(--border-light); }
        
        .notes-content p { margin-bottom: 1.2em; }
        .notes-content b, .notes-content strong { font-weight: 600; color: var(--primary); }
        .notes-content i, .notes-content em { font-style: italic; }
        .notes-content .highlight { background: rgba(99,102,241,0.2); padding: 2px 6px; border-radius: 4px; font-weight: 500; color: #a5b4fc; }
        body.light-theme .notes-content .highlight { background: rgba(99,102,241,0.15); color: var(--primary-dark); }

        .notes-content ul, .notes-content ol { margin-bottom: 1.5em; padding-left: 1.5em; }
        .notes-content li { margin-bottom: 0.5em; }

        .notes-image-wrapper { margin: 2em 0; text-align: center;}
        .notes-content img { max-width: 100%; height: auto; border-radius: var(--radius-md); border: 1px solid var(--border-dark); }
        body.light-theme .notes-content img { border-color: var(--border-light); }

        .callout { padding: 18px 20px; border-radius: var(--radius-md); margin: 1.5em 0; display: flex; gap: 15px; background: var(--card-dark); border: 1px solid var(--border-dark); }
        body.light-theme .callout { background: var(--card-light); border-color: var(--border-light); }
        .callout-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; color: var(--info);}
        .callout-content { flex: 1; }
        .callout-title { font-weight: 600; font-size: 1.05em; margin-bottom: 4px; display: block;}
        
        .table-wrapper { width: 100%; overflow-x: auto; margin: 2em 0; border-radius: var(--radius-md); border: 1px solid var(--border-dark); }
        body.light-theme .table-wrapper { border-color: var(--border-light); }
        .notes-content table { width: 100%; border-collapse: collapse; min-width: 500px; text-align: left; }
        .notes-content th { background: rgba(99,102,241,0.15); padding: 14px 16px; font-weight: 600; color: var(--primary); font-size: 0.95em; }
        .notes-content td { padding: 12px 16px; border-top: 1px solid var(--border-dark); font-size: 0.9em; }
        body.light-theme .notes-content th { background: rgba(99,102,241,0.1); }
        body.light-theme .notes-content td { border-color: var(--border-light); }

        .notes-content mjx-container[display="true"] { overflow-x: auto; overflow-y: hidden; padding: 10px 0; margin: 1em 0; text-align: center; }
        .notes-content mjx-container svg { max-width: 100%; height: auto; }

        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 30000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 15px; color: white;}
        .loading-overlay.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border-dark); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-card { background: rgba(244, 63, 94, 0.1); border: 1px solid var(--error); border-radius: var(--radius-md); padding: 30px 20px; text-align: center; margin-top: 20px; }
        .raw-data-box { text-align: left; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; font-size: 0.75rem; overflow-x: auto; margin-top: 15px; color: #a5b4fc; font-family: monospace; border: 1px solid var(--border-dark);}
        
        /* ==========================================================
           🔥 TRUE PAGINATION & HIGH CONTRAST PDF ENGINE 🔥 
           ========================================================== */
        body.pdf-printing { 
            overflow: visible !important; 
            margin: 0 !important;
            padding: 0 !important;
            background: #000000 !important; 
        }
        
        #pdfContentWrapper { display: none; }
        .pdf-printing #pdfContentWrapper { 
            display: block !important; 
            background: #000000; 
            width: 1600px; 
        }

        /* 1. Strict Page Container */
        .pdf-page {
            width: 1600px;
            height: 900px; /* EXACTLY 16:9 Aspect Ratio */
            position: relative;
            background: #000000;
            page-break-after: always;
            overflow: hidden; /* Prevents absolutely any bleeding */
        }

        /* 2. Absolute Logo Positioning */
        .pdf-logo {
            position: absolute;
            top: 30px;
            right: 40px;
            width: 120px;
            height: auto;
            z-index: 100;
        }

        /* 3. Strict Content Box (It mathematically CANNOT touch the logo) */
        .pdf-page-content {
            position: absolute;
            top: 40px;
            bottom: 40px;
            left: 60px;
            right: 180px; /* Reserves 180px of empty space on the right for the logo! */
            overflow: hidden; /* Tells our JS when a block has exceeded the page */
            color: #f8fafc; 
            font-size: 26px; 
            line-height: 1.6;
        }

        /* 4. High Contrast Colors & Borders */
        .pdf-page-content b, .pdf-page-content strong { color: #818cf8 !important; }
        .pdf-page-content .highlight { background: #1e3a8a !important; color: #bfdbfe !important; border: 1px solid #3b82f6 !important; }
        .pdf-page-content .doc-title { color: #ffffff !important; font-size: 3.5rem !important; margin-bottom: 0px !important; }
        .pdf-page-content .doc-topic { background: #1e293b !important; color: #93c5fd !important; border: 1px solid #3b82f6 !important; margin-bottom: 15px !important; display: inline-block; padding: 4px 12px; border-radius: 20px;}
        .pdf-page-content h1 { font-size: 1.7em !important; margin: 1em 0 0.4em !important; color: #ffffff !important; border-bottom: 2px solid #334155 !important; padding-bottom: 5px; }
        .pdf-page-content h2 { font-size: 1.4em !important; margin: 0.8em 0 0.3em !important; color: #ffffff !important; }
        .pdf-page-content h3 { font-size: 1.2em !important; margin: 0.6em 0 0.2em !important; color: #ffffff !important; }
        
        .pdf-page-content .block-item { margin-bottom: 0.8em; }
        
        .pdf-page-content .callout { 
            background: #0f172a !important; 
            border: 3px solid #475569 !important; 
            color: #ffffff !important; 
            padding: 16px 20px !important; 
            margin: 1.2em 0 !important; 
            border-radius: 12px !important;
            display: flex; gap: 15px;
        }
        .pdf-page-content .callout-icon { color: #60a5fa !important; font-size: 1.4rem; flex-shrink: 0;}
        .pdf-page-content .callout-title { font-weight: 600; font-size: 1.05em; margin-bottom: 4px; display: block;}
        
        .pdf-page-content .table-wrapper { 
            border: 3px solid #475569 !important; 
            margin: 1.5em 0 !important;
            border-radius: 12px !important;
            background: #000000 !important;
            overflow: hidden;
        }
        .pdf-page-content table { width: 100%; border-collapse: collapse; text-align: left; }
        .pdf-page-content th { background: #1e293b !important; color: #93c5fd !important; border: 2px solid #475569 !important; padding: 14px !important; }
        .pdf-page-content td { border: 2px solid #475569 !important; color: #f8fafc !important; padding: 14px !important; }
        .pdf-page-content ul, .pdf-page-content ol { padding-left: 1.5em; margin-bottom: 1.5em;}
    </style>
</head>
<body>
    <div id="readingProgress"></div>

    <div id="loadingOverlay" class="loading-overlay active">
        <div class="spinner"></div>
        <div id="loadingText" style="font-weight: 500;">Fetching Notes...</div>
    </div>

    <header class="app-header">
        <div class="icon-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
        <div class="header-title" id="headerTitle">Study Notes</div>
        <div class="font-controls">
            <button class="font-btn" onclick="changeFontSize(-1)" title="Decrease Font">A-</button>
            <div style="width:1px; background:var(--border-dark); margin:4px 0; height:18px;"></div>
            <button class="font-btn" onclick="changeFontSize(1)" title="Increase Font">A+</button>
            <div style="width:1px; background:var(--border-dark); margin:4px 0; height:18px;"></div>
            <button class="font-btn" onclick="exportSmartPDF()" title="Download PDF"><i class="fas fa-download"></i></button>
        </div>
    </header>

    <div class="container" id="mainContainer">
        <div id="notesHeader" style="display: none;">
            <div class="doc-topic" id="docTopic">Topic</div>
            <h1 class="doc-title" id="docTitle">Title</h1>
            <div style="height: 1px; background: var(--border-dark); margin: 15px 0 20px;"></div>
        </div>

        <article class="notes-content" id="notesContent">
        </article>
    </div>
    
    <div id="pdfContentWrapper"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    
    <script>
        window.MathJax = {
            options: { enableMenu: false, menuOptions: { settings: { assistiveMml: false } } },
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']], packages: {'[+]': ['mhchem']} },
            loader: {load: ['[tex]/mhchem']},
            svg: { fontCache: 'none' } 
        };
    </script>
    <script id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>

    <script>
        let cachedNoteData = null; // Store for PDF regeneration

        const safetyTimeout = setTimeout(() => {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay.classList.contains('active')) {
                overlay.classList.remove('active');
                document.getElementById('notesContent').innerHTML = `
                    <div class="error-card">
                        <i class="fas fa-wifi" style="font-size:3rem; color:var(--warning); margin-bottom:15px;"></i>
                        <h3 style="color:var(--warning); margin-bottom:10px;">Connection Timeout</h3>
                        <div style="color:var(--text-dark); font-size: 0.95rem; line-height: 1.5;">The server took too long to respond.</div>
                    </div>
                `;
            }
        }, 8000);

        function applyTheme() {
            try {
                if (localStorage.getItem('nav_darkMode') === 'false') document.body.classList.add('light-theme');
                const accent = localStorage.getItem('nav_accentColor');
                if (accent) document.documentElement.style.setProperty('--primary', accent);
            } catch(e) {}
        }
        applyTheme();

        function goBack() { window.history.length > 1 ? window.history.back() : window.location.href = 'library.html'; }

        let currentFontMultiplier = 1;
        function changeFontSize(direction) {
            if (direction > 0 && currentFontMultiplier < 1.5) currentFontMultiplier += 0.1;
            if (direction < 0 && currentFontMultiplier > 0.8) currentFontMultiplier -= 0.1;
            try { localStorage.setItem('nav_fontSizeMultiplier', currentFontMultiplier); } catch(e){}
            document.documentElement.style.setProperty('--base-font-size', `${16 * currentFontMultiplier}px`);
        }

        window.onscroll = function() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("readingProgress").style.width = scrolled + "%";
        };

        // Helper: Generates raw HTML for a block
        function createBlockHTML(block) {
            switch (block.type) {
                case 'h1': return `<h1>${block.content}</h1>`;
                case 'h2': return `<h2>${block.content}</h2>`;
                case 'h3': return `<h3>${block.content}</h3>`;
                case 'paragraph': return `<p>${block.content}</p>`;
                case 'image': return `<div class="notes-image-wrapper"><img src="${block.url}">${block.caption ? `<div class="image-caption">${block.caption}</div>` : ''}</div>`;
                case 'list':
                    const listTag = block.ordered ? 'ol' : 'ul';
                    const listItems = block.items.map(item => `<li>${item}</li>`).join('');
                    return `<${listTag}>${listItems}</${listTag}>`;
                case 'callout':
                    const styleClass = block.style || 'info';
                    const icon = block.icon || 'fas fa-info-circle';
                    return `<div class="callout ${styleClass}"><div class="callout-icon"><i class="${icon}"></i></div><div class="callout-content">${block.title ? `<span class="callout-title">${block.title}</span>` : ''}${block.content}</div></div>`;
                case 'table':
                    const ths = block.headers.map(h => `<th>${h}</th>`).join('');
                    const trs = block.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('');
                    return `<div class="table-wrapper"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
                default: return '';
            }
        }

        // =========================================================================
        // 🔥 TRUE DOM PAGINATION ENGINE 🔥
        // Mathematically places blocks into 1600x900 pages. NO CLIPPING.
        // =========================================================================
        async function exportSmartPDF() {
            if (typeof html2pdf === 'undefined') {
                alert("PDF Generator is still loading. Please wait a few seconds.");
                return;
            }
            if (!cachedNoteData) return alert("Note data is corrupted.");

            const overlay = document.getElementById('loadingOverlay');
            const loadText = document.getElementById('loadingText');
            overlay.classList.add('active');
            
            // 1. Hide normal UI and activate PDF Mode
            document.body.classList.add('pdf-printing');
            document.getElementById('mainContainer').style.display = 'none';
            document.querySelector('.app-header').style.display = 'none';
            document.getElementById('readingProgress').style.display = 'none';
            
            const pdfWrapper = document.getElementById('pdfContentWrapper');
            pdfWrapper.innerHTML = '';

            loadText.textContent = "Building Smart Pages...";

            // 2. Create an invisible measuring board to render MathJax and size elements
            const measureBoard = document.createElement('div');
            measureBoard.className = 'pdf-page-content';
            measureBoard.style.position = 'absolute';
            measureBoard.style.visibility = 'hidden';
            measureBoard.style.top = '-9999px';
            measureBoard.style.left = '0';
            measureBoard.style.height = 'auto';
            document.body.appendChild(measureBoard);

            // 3. Inject all HTML into the measure board
            let rawHTML = `<div class="block-item" style="margin-bottom:40px;">
                <div class="doc-topic">${cachedNoteData.topic || ''}</div>
                <h1 class="doc-title">${cachedNoteData.title || ''}</h1>
            </div>`;
            
            cachedNoteData.blocks.forEach(block => {
                rawHTML += `<div class="block-item">${createBlockHTML(block)}</div>`;
            });
            measureBoard.innerHTML = rawHTML;

            // 4. Force MathJax to render EVERYTHING while it's hidden
            loadText.textContent = "Typesetting Equations...";
            await MathJax.typesetPromise([measureBoard]);

            // 5. White-out the MathJax SVGs to pop against black
            const svgs = measureBoard.querySelectorAll('mjx-container svg');
            svgs.forEach(svg => {
                const rect = svg.getBoundingClientRect(); 
                if(rect.width > 0) {
                    svg.setAttribute('width', rect.width + 'px');
                    svg.setAttribute('height', rect.height + 'px');
                    svg.style.width = rect.width + 'px';
                    svg.style.height = rect.height + 'px';
                    svg.setAttribute('fill', '#ffffff');
                    svg.style.color = '#ffffff';
                }
            });

            // 6. THE PAGINATION ALGORITHM
            loadText.textContent = "Packing Pages...";
            const MAX_HEIGHT = 820; // 900px total height - 40px top - 40px bottom
            
            function createNewPage() {
                const p = document.createElement('div');
                p.className = 'pdf-page';
                p.innerHTML = `
                    <img src="https://raw.githubusercontent.com/Amit21686/NAV-Education/main/logo.png" class="pdf-logo" crossorigin="anonymous">
                    <div class="pdf-page-content"></div>
                `;
                pdfWrapper.appendChild(p);
                return p.querySelector('.pdf-page-content');
            }

            let currentContentArea = createNewPage();
            
            // We loop through the measuring board. Node moves automatically on appendChild!
            while (measureBoard.firstChild) {
                let block = measureBoard.firstChild;
                currentContentArea.appendChild(block);
                
                // Did adding this block cause the page to exceed 820px?
                if (currentContentArea.scrollHeight > MAX_HEIGHT) {
                    // Remove it from the current full page
                    currentContentArea.removeChild(block);
                    
                    // Create a new fresh page
                    currentContentArea = createNewPage();
                    
                    // Put the block at the top of the new page
                    currentContentArea.appendChild(block);
                }
            }

            // Clean up the measuring board
            document.body.removeChild(measureBoard);

            // 7. Fire up HTML2PDF on our flawlessly paginated wrapper
            loadText.textContent = "Generating Document...";
            const docTitle = cachedNoteData.title || 'NAV_Notes';

            const opt = {
                margin:       0, // Zero margin. Our HTML exactly matches the 1600x900 output.
                filename:     `${docTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_presentation.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0, 
                    scrollX: 0, 
                    width: 1600, 
                    windowWidth: 1600,
                    backgroundColor: '#000000' 
                }, 
                // We rely entirely on the exact pixel mapping. No css breaking needed.
                jsPDF:        { unit: 'px', format: [1600, 900], orientation: 'landscape', hotfixes: ["px_scaling"] }
            };

            try {
                await html2pdf().set(opt).from(pdfWrapper).save();
            } catch(e) {
                console.error("PDF Error:", e);
                alert("Failed to generate PDF: " + e.message);
            } finally {
                // Restore Web View
                pdfWrapper.innerHTML = '';
                document.body.classList.remove('pdf-printing');
                document.getElementById('mainContainer').style.display = 'block';
                document.querySelector('.app-header').style.display = 'flex';
                document.getElementById('readingProgress').style.display = 'block';
                overlay.classList.remove('active');
            }
        }

        async function loadNotes() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const file = urlParams.get('file');

                if (!file) throw new Error("No file provided in the URL.");

                const response = await fetch(file);
                if (!response.ok) throw new Error(`HTTP Error ${response.status}: Could not find the file '${file}'.`);
                
                const data = await response.json();
                
                if (!data || !data.blocks || !Array.isArray(data.blocks)) {
                    throw new Error("Format Mismatch! The file loaded but does NOT contain the required 'blocks' array.");
                }

                cachedNoteData = data; // Save for PDF generation
                renderDocument(data);

            } catch(error) {
                document.getElementById('notesHeader').style.display = 'none';
                document.getElementById('notesContent').innerHTML = `
                    <div class="error-card">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:var(--error); margin-bottom:15px;"></i>
                        <h3 style="color:var(--error); margin-bottom:10px;">Diagnostic Error</h3>
                        <div style="color:var(--text-dark); font-size: 0.95rem; line-height: 1.5; text-align: left;">${error.message}</div>
                    </div>
                `;
                clearTimeout(safetyTimeout);
                document.getElementById('loadingOverlay').classList.remove('active');
            }
        }

        function renderDocument(data) {
            if (data.title) {
                document.getElementById('headerTitle').textContent = data.title;
                document.getElementById('docTitle').textContent = data.title;
                document.getElementById('notesHeader').style.display = 'block';
            }
            if (data.topic) {
                document.getElementById('docTopic').textContent = data.topic;
            }

            const content = document.getElementById('notesContent');
            content.innerHTML = '';

            data.blocks.forEach(block => {
                content.insertAdjacentHTML('beforeend', createBlockHTML(block));
            });

            setTimeout(() => {
                if (typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                    MathJax.typesetPromise([document.getElementById('notesContent')]).then(() => {
                        clearTimeout(safetyTimeout);
                        document.getElementById('loadingOverlay').classList.remove('active');
                    });
                } else {
                    clearTimeout(safetyTimeout);
                    document.getElementById('loadingOverlay').classList.remove('active');
                }
            }, 150);
        }

        window.onload = loadNotes;
    </script>
</body>
</html>
