<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Course Hub | NAV Education</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #6366f1; --secondary: #8b5cf6; --bg: #020617; --bg-card: rgba(30, 41, 59, 0.8);
            --border: rgba(255, 255, 255, 0.08); --text: #f1f5f9; --text-muted: #94a3b8;
            --radius-md: 12px; --radius-lg: 16px;
        }
        body.light-theme { --bg: #f8fafc; --bg-card: #ffffff; --border: #e2e8f0; --text: #0f172a; --text-muted: #475569; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 70% 30%, rgba(99,102,241,0.12) 0%, transparent 70%); animation: rotateBg 40s linear infinite; pointer-events: none; z-index: 0; }
        @keyframes rotateBg { to { transform: rotate(360deg); } }

        .container { max-width: 600px; width: 100%; padding: 20px; z-index: 1; }

        .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .back-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); color: var(--text);}
        .back-btn:active { transform: scale(0.95); }

        .course-hero { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-lg); padding: 30px 20px; text-align: center; color: white; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(99,102,241,0.2);}
        .course-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }

        /* Chapter Accordion Style */
        .chapter-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 15px; overflow: hidden; backdrop-filter: blur(10px); }
        .chapter-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 600; border-bottom: 1px solid transparent; }
        .chapter-content { padding: 0 20px; display: none; }
        .chapter-card.open .chapter-content { display: block; padding-bottom: 15px; }
        .chapter-card.open .chapter-header { border-bottom-color: var(--border); color: var(--primary); }

        /* Material Items */
        .material-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px dashed var(--border); cursor: pointer; transition: 0.2s; }
        .material-item:last-child { border-bottom: none; }
        .material-item:active { transform: scale(0.98); opacity: 0.7; }
        
        .mat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .icon-pdf { background: rgba(244,63,94,0.15); color: #f43f5e; }
        .icon-html { background: rgba(16,185,129,0.15); color: #10b981; }
        .icon-json { background: rgba(99,102,241,0.15); color: #6366f1; }
        .icon-notes { background: rgba(245,158,11,0.15); color: #f59e0b; }

        .mat-info { flex: 1; }
        .mat-title { font-size: 0.9rem; font-weight: 500; }
        .mat-type { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="back-btn" onclick="window.location.href='library.html'"><i class="fas fa-arrow-left"></i></div>
            <div style="font-weight: 600;">Course Hub</div>
            <div style="width: 42px;"></div>
        </header>

        <div class="course-hero">
            <div id="courseIcon" style="font-size: 3rem; margin-bottom: 10px;">📚</div>
            <h2 class="course-title" id="courseTitle">Loading Course...</h2>
            <p style="font-size: 0.85rem; opacity: 0.9;" id="courseDesc">Select a chapter to begin learning.</p>
        </div>

        <div id="chaptersContainer">
            </div>
    </div>

    <script>
        function applyTheme() {
            if (localStorage.getItem('nav_darkMode') === 'false') document.body.classList.add('light-theme');
            const accent = localStorage.getItem('nav_accentColor');
            if (accent) document.documentElement.style.setProperty('--primary', accent);
        }
        applyTheme();

        const fallbackCourseData = {
            title: "Physics Masterclass",
            icon: "⚛️",
            description: "Master the concepts of modern physics.",
            chapters: [
                {
                    title: "Chapter 1: Kinematics",
                    contents: [
                        { title: "Kinematics Interactive Notes", file: "ch1n.json", type: "notes" },
                        { title: "Kinematics Practice Test", file: "ch1.json", type: "quiz" }
                    ]
                }
            ]
        };

        async function loadCourseContent() {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id');

            try {
                const res = await fetch(`${courseId}.json`);
                if (!res.ok) throw new Error();
                const courseData = await res.json();
                renderCourse(courseData);
            } catch (e) {
                console.log("Could not fetch course JSON. Using fallback data.");
                renderCourse(fallbackCourseData);
            }
        }

        function renderCourse(data) {
            document.getElementById('courseTitle').textContent = data.title;
            document.getElementById('courseIcon').textContent = data.icon;
            document.getElementById('courseDesc').textContent = data.description || "Select a chapter to begin learning.";

            const container = document.getElementById('chaptersContainer');
            container.innerHTML = '';

            data.chapters.forEach((chap, index) => {
                let contentHtml = '';
                
                chap.contents.forEach(item => {
                    let iconClass = "icon-html";
                    let iconName = "fas fa-file-alt";
                    let displayType = item.type || item.file.split('.').pop();
                    
                    // Case insensitive type matching
                    const typeStr = item.type ? item.type.toLowerCase() : "";

                    if (item.file.endsWith('.pdf') || typeStr === 'pdf') { 
                        iconClass = "icon-pdf"; iconName = "fas fa-file-pdf"; displayType = 'PDF';
                    }
                    else if (item.file.endsWith('n.json') || typeStr === 'notes') { 
                        iconClass = "icon-notes"; iconName = "fas fa-book-open"; displayType = 'Interactive Notes';
                    }
                    else if (item.file.endsWith('.json') || typeStr === 'quiz') { 
                        iconClass = "icon-json"; iconName = "fas fa-brain"; displayType = 'Quiz';
                    }

                    contentHtml += `
                        <div class="material-item" onclick="routeContent('${item.file}')">
                            <div class="mat-icon ${iconClass}"><i class="${iconName}"></i></div>
                            <div class="mat-info">
                                <div class="mat-title">${item.title}</div>
                                <div class="mat-type">${displayType}</div>
                            </div>
                            <i class="fas fa-chevron-right" style="color: var(--text-muted); font-size: 0.8rem;"></i>
                        </div>
                    `;
                });

                const isOpen = index === 0 ? 'open' : '';
                const chapHtml = `
                    <div class="chapter-card ${isOpen}" onclick="toggleChapter(this, event)">
                        <div class="chapter-header">
                            <span>${chap.title}</span>
                            <i class="fas fa-chevron-down toggle-icon" style="transition:0.3s; transform: ${isOpen ? 'rotate(180deg)' : 'rotate(0deg)'}"></i>
                        </div>
                        <div class="chapter-content">${contentHtml}</div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', chapHtml);
            });
        }

        function toggleChapter(card, event) {
            if(event.target.closest('.material-item')) return; 
            const isOpen = card.classList.contains('open');
            card.classList.toggle('open');
            card.querySelector('.toggle-icon').style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        // --- NEW STRICT ROUTING LOGIC ---
        function routeContent(filename) {
            if (filename.endsWith('n.json')) {
                window.location.href = `notes.html?file=${filename}`;
            } 
            else if (filename.endsWith('.json')) {
                window.location.href = `mcqs.html?file=${filename}`;
            } 
            else if (filename.endsWith('.pdf')) {
                window.open(filename, '_blank'); 
            } 
            else if (filename.endsWith('.html')) {
                window.location.href = filename;
            }
            else {
                alert("Unsupported file format.");
            }
        }

        document.addEventListener('DOMContentLoaded', loadCourseContent);
    </script>
</body>
</html>
