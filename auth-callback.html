<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticating | NAV Education</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --bg-dark: #020617;
            --bg-light: #f8fafc;
            --card-dark: rgba(15, 23, 42, 0.65);
            --card-light: rgba(255, 255, 255, 0.9);
            --text-dark: #f8fafc;
            --text-light: #0f172a;
            --muted-dark: #94a3b8;
            --muted-light: #64748b;
            --border-dark: rgba(255, 255, 255, 0.1);
            --border-light: rgba(0, 0, 0, 0.08);
            --success: #10b981;
            --error: #f43f5e;
            
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body.light-theme {
            background: var(--bg-light);
            color: var(--text-light);
        }

        /* Premium Animated Background Orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        .orb-1 { top: -10%; left: -10%; width: 300px; height: 300px; background: var(--primary); }
        .orb-2 { bottom: -10%; right: -10%; width: 250px; height: 250px; background: var(--secondary); animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 1;
            text-align: center;
        }

        /* Logo / Icon Animation */
        .auth-icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
        }
        
        .auth-icon {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
            position: relative;
            z-index: 2;
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-icon-ring {
            position: absolute;
            inset: -10px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
            animation: ripple 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 25px 45px rgba(99, 102, 241, 0.6); }
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Glassmorphism Card */
        .status-card {
            background: var(--card-dark);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-xl);
            padding: 30px 24px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.light-theme .status-card {
            background: var(--card-light);
            border-color: var(--border-light);
            box-shadow: 0 24px 48px rgba(99, 102, 241, 0.1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Typography */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        body.light-theme h1 { background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .message { color: var(--muted-dark); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
        body.light-theme .message { color: var(--muted-light); }

        /* Smooth Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 24px 0;
            position: relative;
        }
        body.light-theme .progress-container { background: rgba(0,0,0,0.05); }

        .progress-bar {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 50%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            animation: indeterminate 1.5s infinite ease-in-out;
        }

        @keyframes indeterminate {
            0% { left: -50%; width: 50%; }
            50% { left: 25%; width: 75%; }
            100% { left: 100%; width: 50%; }
        }

        /* Status List */
        .status-list {
            text-align: left;
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
            padding: 15px;
            border: 1px solid var(--border-dark);
        }
        body.light-theme .status-list { background: rgba(0,0,0,0.02); border-color: var(--border-light); }

        .status-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-dark);
        }
        body.light-theme .status-item { border-color: var(--border-light); }
        .status-item:last-child { border-bottom: none; padding-bottom: 0; }
        .status-item:first-child { padding-top: 0; }

        .status-icon {
            width: 36px; height: 36px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            font-size: 1rem;
        }

        .status-label { font-size: 0.75rem; color: var(--muted-dark); margin-bottom: 2px; }
        body.light-theme .status-label { color: var(--muted-light); }
        .status-value { font-weight: 600; font-size: 0.9rem; color: var(--text-dark); }
        body.light-theme .status-value { color: var(--text-light); }

        /* States Management */
        .state-view { display: none; animation: fadeIn 0.4s ease; }
        .state-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Success & Error Styling */
        .success-icon { font-size: 4rem; color: var(--success); margin-bottom: 20px; animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .error-icon { font-size: 4rem; color: var(--error); margin-bottom: 20px; animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        @keyframes bounceIn { 
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }

        .error-title { color: var(--error); background: none; -webkit-text-fill-color: var(--error); }
        
        .countdown { font-size: 0.85rem; color: var(--muted-dark); margin-top: 24px; font-weight: 500; }
        body.light-theme .countdown { color: var(--muted-light); }
        .countdown-number { color: var(--primary); font-weight: 700; font-size: 1.1rem; }

        /* Buttons */
        .btn-group { display: flex; gap: 12px; margin-top: 24px; flex-direction: column; }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--border-dark);
            color: var(--text-dark);
        }
        body.light-theme .btn-secondary { border-color: var(--border-light); color: var(--text-light); }
        .btn-secondary:active { transform: scale(0.96); background: rgba(255,255,255,0.05); }
        body.light-theme .btn-secondary:active { background: rgba(0,0,0,0.05); }

    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="auth-container">
        
        <div class="status-card">
            
            <div id="loadingState" class="state-view active">
                <div class="auth-icon-wrapper">
                    <div class="auth-icon-ring"></div>
                    <div class="auth-icon"><i class="fas fa-fingerprint"></i></div>
                </div>
                
                <h1>Authenticating</h1>
                <div class="message">Securely verifying your credentials...</div>
                
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>

                <div class="status-list">
                    <div class="status-item">
                        <div class="status-icon"><i class="fas fa-shield-alt"></i></div>
                        <div class="status-content">
                            <div class="status-label">Authentication Status</div>
                            <div class="status-value" id="authStatus">Connecting...</div>
                        </div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon"><i class="fas fa-network-wired"></i></div>
                        <div class="status-content">
                            <div class="status-label">Network Link</div>
                            <div class="status-value" id="providerStatus">Establishing...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="successState" class="state-view">
                <div class="success-icon"><i class="fas fa-check-circle"></i></div>
                <h1>Success!</h1>
                <div class="message" id="successMessage">Welcome back to NAV Education.</div>
                
                <div class="status-list">
                    <div class="status-item">
                        <div class="status-icon"><i class="fas fa-user"></i></div>
                        <div class="status-content">
                            <div class="status-label">Authenticated As</div>
                            <div class="status-value" id="userName">User</div>
                        </div>
                    </div>
                </div>

                <div class="countdown">
                    Redirecting in <span class="countdown-number" id="countdown">3</span>
                </div>

                <div class="btn-group">
                    <button onclick="redirectToDashboard()" class="btn btn-primary">
                        Enter Dashboard <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <div id="errorState" class="state-view">
                <div class="error-icon"><i class="fas fa-times-circle"></i></div>
                <h1 class="error-title">Access Denied</h1>
                <div class="message" id="errorMessage">We couldn't verify your credentials.</div>
                
                <div class="btn-group">
                    <button onclick="retryAuthentication()" class="btn btn-primary">
                        <i class="fas fa-redo"></i> Try Again
                    </button>
                    <a href="auth.html" class="btn btn-secondary">
                        Return to Login
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ==================== APPWRITE CONFIGURATION ====================
        const client = new Appwrite.Client();
        client.setEndpoint("https://sgp.cloud.appwrite.io/v1").setProject("nav-education");
        const account = new Appwrite.Account(client);

        // ==================== GLOBAL VARIABLES ====================
        let redirectTimer;
        let countdownInterval;

        // ==================== THEME CHECK ====================
        function applyTheme() {
            const darkMode = localStorage.getItem('nav_darkMode');
            if (darkMode === 'false') document.body.classList.add('light-theme');
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            applyTheme();
            
            const urlParams = new URLSearchParams(window.location.search);
            const provider = urlParams.get('provider') || 'Server';
            updateProviderStatus(provider);
            
            // Artificial delay for smooth UX, then handle auth
            setTimeout(handleAuthCallback, 1500); 
        });

        // ==================== AUTH HANDLING ====================
        async function handleAuthCallback() {
            updateAuthStatus('Fetching session data...');
            try {
                const user = await account.get();
                updateAuthStatus('Data retrieved securely');
                await saveUserData(user);
                setTimeout(() => showSuccess(user), 800);
            } catch (error) {
                console.error('Auth callback error:', error);
                const urlParams = new URLSearchParams(window.location.search);
                const errorMsg = urlParams.get('error') || error.message;
                showError(errorMsg);
            }
        }

        function updateProviderStatus(provider) {
            const providerElement = document.getElementById('providerStatus');
            if (providerElement) {
                let providerName = 'Secure Server';
                if (provider === 'google') providerName = 'Google OAuth';
                if (provider === 'github') providerName = 'GitHub OAuth';
                providerElement.textContent = providerName;
            }
        }

        function updateAuthStatus(status) {
            const authElement = document.getElementById('authStatus');
            if (authElement) authElement.textContent = status;
        }

        async function saveUserData(user) {
            updateAuthStatus('Syncing profile...');
            
            localStorage.setItem('nav_userId', user.$id);
            localStorage.setItem('nav_userName', user.name || user.email.split('@')[0]);
            localStorage.setItem('nav_userEmail', user.email);
            
            if (!localStorage.getItem('nav_userSettings')) {
                initializeUserSettings(user);
            }
            
            localStorage.setItem('nav_lastLogin', new Date().toISOString());
        }

        function initializeUserSettings(user) {
            const defaultSettings = {
                userName: user.name || user.email.split('@')[0],
                userEmail: user.email,
                userGoal: 'NEET',
                studyHours: 4,
                darkMode: true,
                accentColor: '#6366f1',
                progress: 0,
                streak: 1,
                stats: { courses: 0, hours: 0, badges: 0 }
            };
            Object.keys(defaultSettings).forEach(key => { localStorage.setItem(`nav_${key}`, JSON.stringify(defaultSettings[key])); });
            localStorage.setItem('nav_userSettings', JSON.stringify(defaultSettings));
        }

        // ==================== UI STATE MANAGEMENT ====================
        function switchState(stateId) {
            document.querySelectorAll('.state-view').forEach(el => el.classList.remove('active'));
            document.getElementById(stateId).classList.add('active');
        }

        function showSuccess(user) {
            switchState('successState');
            document.getElementById('userName').textContent = user.name || user.email.split('@')[0];
            startCountdown(3);
        }

        function showError(errorMsg) {
            switchState('errorState');
            document.getElementById('errorMessage').textContent = formatErrorMessage(errorMsg);
        }

        function formatErrorMessage(error) {
            const errorString = error.toString().toLowerCase();
            if (errorString.includes('network')) return 'Network error. Please check your internet connection.';
            if (errorString.includes('cancelled') || errorString.includes('cancel')) return 'Authentication was cancelled.';
            if (errorString.includes('invalid')) return 'Invalid or expired session token.';
            return 'Authentication failed. Please log in again.';
        }

        // ==================== COUNTDOWN & REDIRECT ====================
        function startCountdown(seconds) {
            const countdownElement = document.getElementById('countdown');
            let remaining = seconds;
            countdownElement.textContent = remaining;
            
            countdownInterval = setInterval(() => {
                remaining--;
                countdownElement.textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    redirectToDashboard();
                }
            }, 1000);
            
            redirectTimer = setTimeout(redirectToDashboard, seconds * 1000);
        }

        function redirectToDashboard() {
            clearTimeout(redirectTimer);
            clearInterval(countdownInterval);
            window.location.href = 'index.html';
        }

        function retryAuthentication() {
            window.location.href = 'login.html'; // Fallback to login
        }

        window.addEventListener('beforeunload', function() {
            if (redirectTimer) clearTimeout(redirectTimer);
            if (countdownInterval) clearInterval(countdownInterval);
        });
    </script>
</body>
</html>
